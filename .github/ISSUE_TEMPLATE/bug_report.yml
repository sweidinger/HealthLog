name: Bug report
description: Something is broken or behaves unexpectedly in HealthLog.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Before submitting, please:

        - Check that the issue isn't already in the [issue tracker](https://github.com/MBombeck/HealthLog/issues).
        - For security issues, do **not** open a public issue — see [SECURITY.md](https://github.com/MBombeck/HealthLog/blob/main/SECURITY.md).
        - For usage / configuration questions, the [docs](https://docs.healthlog.dev) are usually faster.
  - type: input
    id: version
    attributes:
      label: HealthLog version
      description: Output of `/api/version` or the tag of the GHCR image you're running.
      placeholder: "1.4.19"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      options:
        - Self-hosted (Docker)
        - Self-hosted (manual)
        - Local development
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps the maintainer can follow to see the bug locally.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste any relevant log output (redact secrets) or attach screenshots. Wide-event logs from `/admin/app-logs` are useful.
      render: shell
  - type: input
    id: browser
    attributes:
      label: Browser / OS (if applicable)
      placeholder: "Firefox 142 on macOS 14.5 / Chrome 128 on Android 14"
  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight checks
      options:
        - label: I confirmed this is not a duplicate of an existing issue.
          required: true
        - label: I redacted any secrets, tokens, or personal data from logs.
          required: true
