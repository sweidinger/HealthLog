name: Knip

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  knip:
    name: Dead-code gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      # v1.4.42 — exports + types tiers promoted to enforcing. The
      # `knip.json` ignore-block carries the shadcn UI surface and the
      # `src/lib/validations/**` contract types; everything else has
      # to clear or get justified there.
      - run: pnpm knip --reporter compact
