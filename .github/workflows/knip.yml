name: Knip

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  knip:
    name: Dead-code gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      # v1.4.42 — exports + types tiers promoted to enforcing. The
      # `knip.json` ignore-block carries the shadcn UI surface and the
      # `src/lib/validations/**` contract types; everything else has
      # to clear or get justified there.
      - run: pnpm knip --reporter compact
