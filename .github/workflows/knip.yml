name: Knip

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  knip:
    name: Dead-code gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      # v1.4.41 W-PROCESS-DOCS — exports + types tier staged for
      # promotion to enforcing. The W-SIMPLIFIER and W-INSIGHTS-HOT
      # cleanup waves have not yet landed on develop at the time this
      # comment was written (48 unused exports + 52 unused exported
      # types still in the tree), so the gate remains scoped to
      # files,dependencies,binaries,unlisted. Once those cleanup waves
      # merge and `pnpm knip --reporter compact` reports zero unused
      # exports + zero unused types, drop the `--include` flag below
      # to flip exports + types to enforcing. See
      # `.planning/phase-W-PROCESS-DOCS-v1441-report.md` for the
      # promotion checklist and the rollback path.
      - run: pnpm knip --reporter compact --include files,dependencies,binaries,unlisted
