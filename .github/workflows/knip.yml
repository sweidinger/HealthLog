name: Knip

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  knip:
    name: Dead-code gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      # v1.4.42 — exports + types tiers promoted to enforcing. The
      # `knip.json` ignore-block carries the shadcn UI surface and the
      # `src/lib/validations/**` contract types; everything else has
      # to clear or get justified there.
      - run: pnpm knip --reporter compact
