  /api/medications/extract:
    post:
      tags:
        - Medications
      summary: Extract scheduling fields from a free-text medication description
      description: Runs the user's free-text description through the Coach provider chain and returns a citation-guarded
        partial payload the wizard merges onto whatever the user already typed. `name` and `dose` are dropped when not
        substring-matched in the original text so the wizard cannot land a hallucinated brand or dose. `cadenceKind` /
        `doseUnit` / `weekdays` are closed enums; numeric fields are clamped. Rate-limited 10 requests / 5 minutes /
        user, gated against the daily Coach token budget.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicationExtractRequest"
      responses:
        "200":
          description: Citation-guarded partial extraction.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationExtractResponse"
        "401": *a1
        "422": *a3
        "429": *a4
        "502":
          description: Upstream provider returned an empty, unparseable, or off-schema reply.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: No AI provider configured for the calling user (or operator).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/medications/{id}/cadence:
    get:
      tags:
        - Medications
      summary: Cadence + compliance read for a medication
      description: Returns the expected-vs-actual dose timeline for the requested window plus the four compliance chip values
        that drive the detail-page section. Pure computation — no writes. Day boundaries are resolved in the user's IANA
        timezone so a Tokyo user and a Berlin user see the same chips for the same medication. The `days` query
        parameter caps at 180.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
        - in: query
          name: days
          schema:
            description: Window size in days (default 30, max 180).
            type: integer
            minimum: 1
            maximum: 180
          description: Window size in days (default 30, max 180).
      responses:
        "200":
          description: Cadence response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMedicationCadenceResponse"
        "401": *a1
        "404":
          description: Medication not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/medications/compliance:
    get:
      tags:
        - Medications
      summary: Batched adherence read for every medication of the caller
      description: Returns one compact adherence row per medication the caller owns (active + paused), ordered by `createdAt
        DESC` — the single round trip the medication cards consume instead of fanning out one
        `/api/medications/{id}/compliance` request per card. Each row carries the 7-/30-day summaries and the
        cadence-scaled display block; the per-day grid stays on the per-medication endpoint. Pure computation — no
        writes. Served through the same per-medication server cache as the per-id read, so the two endpoints warm each
        other.
      responses:
        "200":
          description: One adherence row per medication.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMedicationComplianceResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/medications/{id}/compliance:
    get:
      tags:
        - Medications
      summary: Adherence read for a medication
      description: Returns the 7- and 30-day adherence summaries, the per-day compliance grid for the history glyph track, and
        the two-row display block. Pure computation — no writes. Day boundaries are resolved in the user's IANA
        timezone, and the expected-dose denominator is cadence-aware (RRULE / rolling / one-shot / PRN / cyclic) and
        clamped to the medication's `createdAt`. Read `compliance30` for the headline 30-day taken-vs-expected
        percentage; build the per-day glyph track from `dailyCompliance` (draw a cell only where `due === true`).
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Compliance response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMedicationComplianceResponse"
