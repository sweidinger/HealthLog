      required:
        - generatedAt
        - phase
        - sleepPending
        - score
        - topSignal
        - briefingLead
        - line
        - worthALook
      additionalProperties: false
      description: The one data spine of the daily-value system — composed from already-cached data, never a fresh AI call.
        Consumed by the Today surface, the daily push, and a future iOS widget.
    DailyPriorityItem:
      type: object
      properties:
        kind:
          type: string
          enum:
            - coach_checkin
            - dose_window
            - preventive_care
            - sync_issue
            - milestone
            - ecg_new_recording
            - tension_window
          description: Closed rail-item kind.
        itemKey:
          description: Stable dismiss identity, namespaced `<kind>:...`. Present only on the observational kinds (milestone /
            ecg_new_recording / tension_window) — absent on the actionable kinds, which are never dismissible.
          type: string
        title:
          type: string
          description: Localised headline (resolved server-side).
        body:
          description: Grounded one-liner, rendered as plain text.
          type: string
        status:
          description: Semantic status wash — meaning, not decoration.
          type: string
          enum:
            - success
            - warning
            - info
            - destructive
        actions:
          maxItems: 3
          type: array
          items:
            type: object
            properties:
              labelKey:
                type: string
                description: i18n key, resolved client-side.
              intent:
                type: string
                description: Stable action token.
              href:
                description: Deep-link when navigational.
                type: string
            required:
              - labelKey
              - intent
            additionalProperties: false
          description: 1–3 one-tap actions.
        moduleKey:
          description: Provenance of the gate that admitted the item.
          type: string
      required:
        - kind
        - title
        - actions
      additionalProperties: false
      description: One 'worth a look' rail item. The single model every daily-value consumer renders through PriorityCard.
    DismissPriorityItemEnvelope:
