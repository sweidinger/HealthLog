        sections default-visible. Tile ids are a closed enum: the canonical ids are English (matching the routed
        `/insights/<slug>` sub-pages). The legacy German tile ids (blutdruck, puls, sauerstoff, koerpertemperatur,
        gewicht, aktive-energie, schlaf, ruhepuls, stimmung, medikamente) remain accepted on input for backward
        compatibility and are normalised to their English equivalents before persisting; GET responses always carry the
        canonical English ids. Section ids are English-only. The legacy tile ids are deprecated and will be removed in a
        future major version."
    CoachReminderCreate:
      type: object
      properties:
        note:
          type: string
          minLength: 1
          maxLength: 280
        when:
          type: string
          minLength: 1
          maxLength: 32
        metric:
          type: string
          minLength: 1
          maxLength: 60
          pattern: ^[A-Za-z][A-Za-z0-9_]*$
      required:
        - note
      additionalProperties: false
      description: "Create a Coach reminder manually. `note` is free text (the only writable content). `when` is an optional
        closed grammar token — an ISO date (YYYY-MM-DD), a relative offset (+Nd / +Nw), or a context cue
        (NEXT_BP_LOGGED, NEXT_WEIGHT_LOGGED, NEXT_SLEEP_LOGGED, NEXT_APP_OPEN) — resolved into the trigger server-side.
        Omit `when` for a recall-only note. Strict: unknown keys 422."
    CoachReminderPatch:
      type: object
      properties:
        status:
          type: string
          enum:
            - proposed
            - active
            - due
            - surfaced
            - done
            - dismissed
        when:
          anyOf:
            - type: string
              minLength: 1
              maxLength: 32
            - type: "null"
      additionalProperties: false
      description: "Update a Coach reminder's lifecycle. `status` confirms (proposed → active), or marks done / dismissed.
        `when` re-schedules via the closed grammar (null clears the due moment). Never carries the note text. Strict:
        unknown keys 422."
    CoachSuggestedAction:
      oneOf:
        - type: object
          properties:
            actionType:
              type: string
              const: checkup.create
            label:
              type: string
              minLength: 1
              maxLength: 120
            interval:
              type: string
              enum:
                - yearly
                - halfYearly
                - quarterly
                - monthly
          required:
            - actionType
            - label
            - interval
        - type: object
          properties:
            actionType:
              type: string
              const: reminder.note
            note:
              type: string
              minLength: 1
              maxLength: 280
            when:
              type: string
              minLength: 1
              maxLength: 32
            metric:
              type: string
              minLength: 1
              maxLength: 60
              pattern: ^[A-Za-z][A-Za-z0-9_]*$
          required:
            - actionType
            - note
      description: Confirm a Coach action card. `actionType` is from the closed allowlist (checkup.create, reminder.note);
        NEVER a medication or clinical change. `checkup.create` builds a preventive-care Vorsorge reminder (free-text
        label + a closed interval id resolved to an RRULE server-side); `reminder.note` builds a CoachReminder (note +
        optional closed `when` grammar + optional metric). Nothing is created without this explicit confirm.
      type: object
    CoachMessageFeedbackRequest:
      type: object
      properties:
        rating:
          type: string
          enum:
            - helpful
            - unhelpful
        reason:
          type: string
          minLength: 1
          maxLength: 200
      required:
        - rating
      description: Per-message helpful/unhelpful feedback (v1.4.23 H7). Optional `reason` is free-form prose, capped at 200 chars.
    InsightsPregenerateRequest:
