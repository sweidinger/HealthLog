          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/medications:
    get:
      tags:
        - Medications
      summary: List medications for the calling user
      description: Returns every medication owned by the caller (active + paused), ordered by `createdAt DESC`. Each row
        carries its nested `schedules`, the joined clinical `category`, the latest non-skipped `lastTakenAt`, and the
        count of today's actioned intake events (`todayEventCount`). The response is cached server-side for 60 s per
        user; writes flush the cache.
      responses:
        "200":
          description: Medication list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMedicationsResponse"
        "401": *a1
        "422": *a3
        "429": *a4
    post:
      tags:
        - Medications
      summary: Create a medication with at least one schedule
      description: Validates the body against `CreateMedicationRequest`, applies the v1.5 cross-field invariants (one-shot
        consistency, recurring default `FREQ=DAILY`, `timesOfDay` dual-write), and creates the medication + its
        schedules in a single Prisma write. Audits as `medication.create`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationRequest"
      responses:
        "201":
          description: Created medication with its schedules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMedicationResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/medications/layout:
    get:
      tags:
        - Medications
      summary: Read the calling user's medications list presentation
      description: Returns the per-user /medications presentation (card/table view + manual order). Falls back to the defaults
        (cards, empty order) when the user has not customised it. Mirrors the insights-layout contract.
      responses:
        "200":
          description: The resolved presentation (custom or default).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationListLayoutResponse"
        "401": *a1
        "422": *a3
        "429": *a4
    put:
      tags:
        - Medications
      summary: Update the calling user's medications list presentation
      description: "Field-scoped update: `view` and `order` are each optional, and whichever the body omits is preserved from
        the stored blob — a view toggle can never wipe the manual order and vice versa. The normalised presentation is
        returned. Invalid bodies return the multi-issue 422 envelope."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicationListLayout"
      responses:
        "200":
