    get:
      tags:
        - Insights
      summary: Derived wellness metrics (batched compute-once)
      description: v1.10.0 — resolve several derived wellness metrics in ONE request. The `metrics` CSV names the metrics (a
        `metric:type` token sub-targets a VITALS_BASELINE vital); the server fans out under a bounded limiter with the
        profile loaded once and returns a map keyed by the per-request token. Collapses the Insights cold-mount fan-out
        of 14+ independent single-metric requests — the pool-starvation class that surfaces as a hang-then-recover. The
        single-metric route stays for the per-score detail pages. Auth via cookie or Bearer.
      parameters:
        - in: query
          name: metrics
          schema:
            type: string
            minLength: 1
            maxLength: 1024
            description: Comma-separated derived-metric tokens. Each is a `<DERIVED_METRIC_ID>` or
              `<DERIVED_METRIC_ID>:<MeasurementType>` (the colon sub-targets a VITALS_BASELINE vital). An unknown id
              422s; at most 24 tokens; duplicates collapse.
          required: true
          description: Comma-separated derived-metric tokens. Each is a `<DERIVED_METRIC_ID>` or
