openapi: 3.1.0
info:
  title: HealthLog API
  version: 1.13.3
  description: >-
    Self-hosted personal-health-tracking PWA — public API surface for the iOS native client and external ingest.


    ## Date-time contract


    Every field marked `format: date-time` is an ISO-8601 instant. The schema pattern accepts both `Z` (UTC) and
    `±HH:MM` (offset) suffixes; clients must accept either. Server responses since v1.4.25 emit timestamps with the
    requesting user's display-timezone offset when a user context exists (exports, doctor-report PDF).
    Background-job-authored payloads (backups, admin tools) emit `Z`. Native iOS clients should always parse via a
    Foundation ISO-8601 formatter with the `withInternetDateTime` + `withTimeZone` options enabled.
  license:
    name: AGPL-3.0
    url: https://github.com/MBombeck/HealthLog/blob/main/LICENSE
  contact:
    name: HealthLog
    url: https://healthlog.dev
servers:
  - url: https://healthlog.bombeck.io
    description: Production
  - url: http://localhost:3000
    description: Local dev
tags:
  - name: Auth
  - name: Measurements
  - name: Medications
  - name: Mood
  - name: Analytics
  - name: Insights
  - name: Dashboard
  - name: Notifications
  - name: Devices
  - name: Export
  - name: Sync
  - name: Admin
  - name: Meta
paths:
  /api/meta/capabilities:
    get:
      tags:
        - Meta
      summary: Live server capability / id-vocabulary discovery
      description: Returns the server's REAL id vocabularies (derived-metric ids, vitals-baseline types, layout tile-ids,
        metric-status ids, the HealthKit ingest mapping, the FHIR coding constants) plus the running API contract
        version. Every list is derived server-side from the canonical registry it documents, so a client can gate its UI
        / decoder against what the server actually ships rather than a hand-maintained copy. Auth via cookie or Bearer
        (not admin).
      responses:
        "200":
          description: Capability snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesEnvelope"
        "401": &a1
          description: Authentication required or invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": &a2
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429": &a3
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/export/health-record:
    post:
      tags:
        - Export
      summary: Generate a health-record export (PDF / FHIR / package)
      description: "v1.7.0 flagship export. Returns the doctor-handover artefact in the requested `format`: `pdf` →
        application/pdf, `fhir` → application/fhir+json (HL7 FHIR R4 document Bundle), `package` → application/zip (PDF
        + FHIR + README). Auth via cookie or Bearer; shared `export:<userId>` rate bucket (10/h). Strict validation:
        unknown keys 422."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                format:
                  type: string
                  enum:
                    - pdf
                    - fhir
                    - package
                range:
                  type: object
                  properties:
                    startDate:
                      type: string
                      format: date-time
                      pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                    endDate:
                      type: string
                      format: date-time
                      pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                    days:
                      type: integer
                      minimum: 1
                      maximum: 365
                  additionalProperties: false
                sections:
                  type: object
                  properties:
                    vitals:
                      type: object
                      properties:
                        weight:
                          type: boolean
                        bp:
                          type: boolean
                        pulse:
                          type: boolean
                        oxygenSaturation:
                          type: boolean
                        bodyFat:
                          type: boolean
                        bodyComposition:
                          type: boolean
                    cardioFitness:
                      type: object
                      properties:
                        restingHeartRate:
                          type: boolean
                        hrv:
                          type: boolean
                        vo2max:
                          type: boolean
                    activity:
                      type: object
                      properties:
                        steps:
                          type: boolean
                        distance:
                          type: boolean
                        energy:
                          type: boolean
                        sleep:
                          type: boolean
                    glucose:
                      type: boolean
                    medications:
                      type: object
                      properties:
                        list:
                          type: boolean
                        compliance:
                          type: boolean
                        glp1:
                          type: boolean
                        sideEffects:
                          type: boolean
                    mood:
                      type: boolean
                    bmi:
                      type: boolean
                locale:
                  type: string
                  enum:
                    - de
                    - en
                    - fr
                    - es
                    - it
                    - pl
                practiceName:
                  type: string
                  maxLength: 120
                includeCharts:
                  type: boolean
                includeAiSummary:
                  type: boolean
                germanAtc:
                  type: boolean
              required:
                - format
              additionalProperties: false
      responses:
        "200":
          description: "Export generated. Content-Type varies by `format`: application/pdf, application/fhir+json, or
            application/zip."
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/fhir+json:
              schema:
                type: string
                format: binary
            application/zip:
              schema:
                type: string
                format: binary
        "401": *a1
        "422": *a2
        "429": *a3
  /api/share-links:
    post:
      tags:
        - Export
      summary: Create a clinician share link (v1.11.0)
      description: "Owner-only. Mints an `hls_` token (192-bit), stores only its HMAC hash, and returns the raw token EXACTLY
        ONCE in the response. Every scope column (window, sections, FHIR resource types, API toggle) is frozen
        write-once. `expiresAt` is required and capped at 90 days. Auth via cookie or Bearer; rate-limited
        (`share-link:<userId>`, 20/h). Strict: unknown keys 422."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  minLength: 1
                  maxLength: 120
                rangeStart:
                  type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                rangeEnd:
                  anyOf:
                    - type: string
                      format: date-time
                      pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                    - type: "null"
                sections:
                  type: object
                  properties:
                    vitals:
                      type: object
                      properties:
                        weight:
                          type: boolean
                        bp:
                          type: boolean
                        pulse:
                          type: boolean
                        oxygenSaturation:
                          type: boolean
                        bodyFat:
                          type: boolean
                        bodyComposition:
                          type: boolean
                    cardioFitness:
                      type: object
                      properties:
                        restingHeartRate:
                          type: boolean
                        hrv:
                          type: boolean
                        vo2max:
                          type: boolean
                    activity:
                      type: object
                      properties:
                        steps:
                          type: boolean
                        distance:
                          type: boolean
                        energy:
                          type: boolean
                        sleep:
                          type: boolean
                    glucose:
                      type: boolean
                    medications:
                      type: object
                      properties:
                        list:
                          type: boolean
                        compliance:
                          type: boolean
                        glp1:
                          type: boolean
                        sideEffects:
                          type: boolean
                    mood:
                      type: boolean
                    bmi:
                      type: boolean
                resourceTypes:
                  maxItems: 8
                  type: array
                  items:
                    type: string
                    enum:
                      - Patient
                      - Observation
                      - MedicationStatement
                      - MedicationAdministration
                allowFhirApi:
                  type: boolean
                expiresAt:
                  type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
              required:
                - label
                - rangeStart
                - expiresAt
              additionalProperties: false
      responses:
        "201":
          description: Share link created. `token` carries the raw `hls_` value and is unrecoverable after this response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLinkCreated"
        "401": *a1
        "422": *a2
        "429": *a3
    get:
      tags:
        - Export
      summary: List own clinician share links (v1.11.0)
      description: Owner-only. Returns the caller's own share links (never the raw token — it is unrecoverable after
        creation). Auth via cookie or Bearer.
      responses:
        "200":
          description: Share links owned by the caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLinkList"
        "401": *a1
        "422": *a2
        "429": *a3
  /api/share-links/{id}:
    delete:
      tags:
        - Export
      summary: Revoke a clinician share link (v1.11.0)
      description: Owner-only. Sets `revokedAt` on the caller's own link. A cross-user or unknown id is sealed as 404. Auth
        via cookie or Bearer; rate-limited.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Link revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLinkRevoked"
        "401": *a1
        "404":
          description: Link not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a2
        "429": *a3
  /api/fhir/metadata:
    get:
      tags:
        - FHIR
      summary: FHIR R4 CapabilityStatement (v1.11.0)
      description: "Read-only FHIR R4 capability statement for the REST face. Declares the served resource types (Patient,
        Observation, MedicationStatement, MedicationAdministration), the `$everything` operation, and the
        `application/fhir+json` format. Auth: `fhir:read` scope (cookie sessions also pass)."
      responses:
        "200":
          description: CapabilityStatement (application/fhir+json).
          content:
            application/fhir+json:
              schema:
                type: string
                format: binary
        "401": *a1
        "422": *a2
        "429": *a3
  /api/fhir/Patient:
    get:
      tags:
        - FHIR
      summary: FHIR R4 Patient search (v1.11.0)
      description: "Read-only `searchset` Bundle of the caller's own Patient resource. Auth: `fhir:read` scope. Offset paging
        via `_count` (clamped ≤200) / `_offset`. `userId` is narrowed from auth."
      parameters:
        - in: query
          name: _count
          schema:
            type: number
        - in: query
          name: _offset
          schema:
            type: number
      responses:
        "200":
          description: searchset Bundle (application/fhir+json).
          content:
            application/fhir+json:
              schema:
                type: string
                format: binary
        "401": *a1
        "422": *a2
        "429": *a3
  /api/fhir/Observation:
    get:
      tags:
        - FHIR
      summary: FHIR R4 Observation search (v1.11.0)
      description: "Read-only `searchset` Bundle of the caller's own Observations (vitals / activity / lab / survey). Auth:
        `fhir:read` scope. Offset paging via `_count` (clamped ≤200) / `_offset`."
      parameters:
        - in: query
          name: _count
          schema:
            type: number
        - in: query
          name: _offset
          schema:
            type: number
      responses:
        "200":
          description: searchset Bundle (application/fhir+json).
          content:
            application/fhir+json:
              schema:
                type: string
                format: binary
        "401": *a1
        "422": *a2
        "429": *a3
  /api/fhir/MedicationStatement:
    get:
      tags:
        - FHIR
      summary: FHIR R4 MedicationStatement search (v1.11.0)
      description: "Read-only `searchset` Bundle of the caller's own active-medication statements. Auth: `fhir:read` scope.
        Offset paging via `_count` (≤200) / `_offset`."
      parameters:
        - in: query
          name: _count
          schema:
            type: number
        - in: query
          name: _offset
          schema:
            type: number
      responses:
        "200":
          description: searchset Bundle (application/fhir+json).
          content:
            application/fhir+json:
              schema:
                type: string
                format: binary
        "401": *a1
        "422": *a2
        "429": *a3
  /api/fhir/MedicationAdministration:
    get:
      tags:
        - FHIR
      summary: FHIR R4 MedicationAdministration search (v1.11.0)
      description: "Read-only `searchset` Bundle of the caller's own acted intakes (completed / not-done). Auth: `fhir:read`
        scope. Offset paging via `_count` (≤200) / `_offset`."
      parameters:
        - in: query
          name: _count
          schema:
            type: number
        - in: query
          name: _offset
          schema:
            type: number
      responses:
        "200":
          description: searchset Bundle (application/fhir+json).
          content:
            application/fhir+json:
              schema:
                type: string
                format: binary
        "401": *a1
        "422": *a2
        "429": *a3
  /api/fhir/$everything:
    get:
      tags:
        - FHIR
      summary: FHIR R4 $everything (v1.11.0)
      description: "Read-only `$everything` operation: every resource in the caller's own record (Patient, Coverage,
        Observations, MedicationStatements, MedicationAdministrations) in one `searchset` Bundle. Auth: `fhir:read`
        scope. Offset paging via `_count` (≤200) / `_offset`."
      parameters:
        - in: query
          name: _count
          schema:
            type: number
        - in: query
          name: _offset
          schema:
            type: number
      responses:
        "200":
          description: searchset Bundle (application/fhir+json).
          content:
            application/fhir+json:
              schema:
                type: string
                format: binary
        "401": *a1
        "422": *a2
        "429": *a3
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Email-or-username login (password)
      description: "Browser callers receive a session cookie. Native callers (X-Client-Type: native or HealthLog-iOS UA
        prefix) additionally receive a paired access + refresh token."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 1
              required:
                - email
                - password
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401": *a1
        "422": *a2
        "429": *a3
  /api/auth/passkey/login-verify:
    post:
      tags:
        - Auth
      summary: Passkey assertion verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyLoginVerifyRequest"
      responses:
        "200":
          description: Assertion verified — session + optional bearer issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyLoginVerifyResponse"
        "401": *a1
        "422": *a2
        "429": *a3
  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotate refresh token (one-time use)
      description: >-
        Reuse of a consumed refresh token revokes every refresh token still active for the originating device
        (per-device blast radius from v1.4.23). Legacy tokens issued before v1.4.23 with a null deviceId fall back to
        revoke-all-for-user.


        On a 401, `meta.errorCode` is a stable machine code so the client can branch terminal re-auth from a transient
        blip without parsing the prose `error`: `auth.refresh.reuse` (a consumed token was replayed — device family
        revoked, re-pair required), `auth.refresh.revoked` (family revoked out-of-band — re-pair required),
        `auth.refresh.invalid` (not found / expired — drop the token and re-authenticate).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Rotation succeeded — new pair issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401": *a1
        "422": *a2
        "429": *a3
  /api/sync/state:
    get:
      tags:
        - Sync
      summary: Sync handshake + window metadata
      description: Cheap 'should I sync?' summary. Returns the previous `lastSyncedAt` checkpoint and advances it server-side
        on each call. The `sync` block carries the incremental-delta window + tombstone retention so the client reads
        them rather than hardcoding.
      responses:
        "200":
          description: Sync state summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStateEnvelope"
        "401": *a1
        "422": *a2
        "429": *a3
  /api/sync/changes:
    get:
      tags:
        - Sync
      summary: Measurements delta feed
      description: "Incremental catch-up after the first-pair backfill (never a replacement for it). Pages over an opaque
        keyset cursor; each page carries `tombstones` (soft-deleted rows, keyed on `externalId`) and `upserts` (live
        rows). Apply tombstones before upserts within a page. `cursorExpired: true` forces a clean re-init."
      parameters:
        - in: query
          name: cursor
          schema:
            description: Opaque multi-domain keyset cursor from the previous page. Treat as fully opaque — echo, never parse. Omit
              for the initial sync.
            type: string
            minLength: 1
            maxLength: 2048
          description: Opaque multi-domain keyset cursor from the previous page. Treat as fully opaque — echo, never parse. Omit
            for the initial sync.
        - in: query
          name: limit
          schema:
            description: Page size, default 200, hard cap 500.
            type: integer
            minimum: 1
            maximum: 500
          description: Page size, default 200, hard cap 500.
      responses:
        "200":
          description: Delta page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncChangesEnvelope"
        "401": *a1
        "422": *a2
        "429": *a3
  /api/measurements:
    get:
      tags:
        - Measurements
      summary: List measurements
      description: Filter by type + date range. Response is paged via offset/limit; default limit 100, hard cap 500.
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum:
              - WEIGHT
              - BLOOD_PRESSURE_SYS
              - BLOOD_PRESSURE_DIA
              - PULSE
              - BODY_FAT
              - SLEEP_DURATION
              - ACTIVITY_STEPS
              - BLOOD_GLUCOSE
              - TOTAL_BODY_WATER
              - BONE_MASS
              - OXYGEN_SATURATION
              - HEART_RATE_VARIABILITY
              - RESTING_HEART_RATE
              - ACTIVE_ENERGY_BURNED
              - FLIGHTS_CLIMBED
              - WALKING_RUNNING_DISTANCE
              - VO2_MAX
              - BODY_TEMPERATURE
              - FAT_FREE_MASS
              - FAT_MASS
              - MUSCLE_MASS
              - SKIN_TEMPERATURE
              - PULSE_WAVE_VELOCITY
              - VASCULAR_AGE
              - VISCERAL_FAT
              - AUDIO_EXPOSURE_ENV
              - AUDIO_EXPOSURE_HEADPHONE
              - TIME_IN_DAYLIGHT
              - WALKING_STEADINESS
              - AUDIO_EXPOSURE_EVENT
              - RESPIRATORY_RATE
              - BODY_MASS_INDEX
              - LEAN_BODY_MASS
              - WALKING_HEART_RATE_AVERAGE
              - WALKING_ASYMMETRY
              - WALKING_DOUBLE_SUPPORT
              - WALKING_STEP_LENGTH
              - WALKING_SPEED
              - CARDIO_RECOVERY
              - WRIST_TEMPERATURE
              - FALL_COUNT
              - SIX_MINUTE_WALK_DISTANCE
              - STAIR_ASCENT_SPEED
              - STAIR_DESCENT_SPEED
              - BREATHING_DISTURBANCES
              - IRREGULAR_RHYTHM_NOTIFICATION
              - HIGH_HEART_RATE_EVENT
              - LOW_HEART_RATE_EVENT
              - WALKING_STEADINESS_EVENT
              - BREATHING_DISTURBANCE_EVENT
              - RECOVERY_SCORE
              - STRESS_SCORE
              - STRAIN_SCORE
              - HRV_RMSSD
              - DAY_STRAIN
              - WORKOUT_STRAIN
              - SLEEP_PERFORMANCE
              - SLEEP_EFFICIENCY
              - SLEEP_CONSISTENCY
              - SLEEP_NEED
              - ENERGY_EXPENDITURE_KJ
              - AVERAGE_HEART_RATE
              - MAX_HEART_RATE
              - SLEEP_DISTURBANCE_COUNT
        - in: query
          name: from
          schema:
            type: string
            format: date-time
            pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        - in: query
          name: to
          schema:
            type: string
            format: date-time
            pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        - in: query
          name: limit
