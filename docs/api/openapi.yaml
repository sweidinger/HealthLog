            type: string
            enum:
              - asc
              - desc
      responses:
        "200":
          description: Logged values.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCustomMetricEntriesEnvelope"
        "401": *a1
        "404": *a14
        "422": *a3
        "429": *a4
    post:
      tags:
        - Custom metrics
      summary: Log a value
      description: Records a value against the custom metric, snapshotting the metric's unit. Audits as `customMetricEntry.create`.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: number
                measuredAt:
                  type: string
