        "422": *a3
        "429": *a4
  /api/medications/{id}/inventory:
    get:
      tags:
        - Medications
      summary: List a medication's supply containers
      description: Returns every inventory item (all states) for the medication, ordered by state, then `expiresAt`, then
        `createdAt`. Items count UNITS; divide by the medication's `unitsPerDose` for dose-level figures. v1.19.0
        (iOS#25) — also returns a server-computed `summary` (the canonical {`unitsRemaining`, `unitsTotal`,
        `dosesRemaining`, `dosesTotal`, `expiredUnits`}); clients render it directly rather than re-deriving the Bestand
        headline, so web and iOS agree.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Inventory item list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMedicationInventoryResponse"
        "401": *a1
        "404":
          description: Medication not found (or owned by another user).
