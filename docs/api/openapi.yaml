          minItems: 1
          maxItems: 500
          type: array
          items:
            $ref: "#/components/schemas/BulkMoodEntry"
      required:
        - entries
      description: iOS SyncMode bulk mood backfill. 1–500 entries per call; per-entry UPSERT keyed by `externalId` so re-runs
        are idempotent.
    BulkMoodEntry:
      type: object
      properties:
        mood:
          type: string
          enum:
            - SUPER_GUT
            - GUT
            - OKAY
            - SCHLECHT
            - LAUSIG
        tags:
          maxItems: 20
          type: array
          items:
            type: string
            maxLength: 50
        tagKeys:
          description: Structured-tag keys from the catalog; unknown keys dropped.
          maxItems: 30
          type: array
          items:
            type: string
            maxLength: 60
        ratedFactors:
          description: Rated mood factors; an out-of-scale rating marks THIS entry skipped, never the batch.
          maxItems: 30
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                maxLength: 60
              rating:
                type: integer
                minimum: 1
                maximum: 5
            required:
              - key
              - rating
        note:
          type: string
          maxLength: 500
        moodLoggedAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
          description: ISO instant the entry was logged.
        source:
          description: Defaults to MANUAL.
          type: string
          enum:
            - MANUAL
            - MOODLOG
            - WEB
            - TELEGRAM
            - DAYLIO
        externalId:
          description: iOS-side source-stable id for idempotent dedup on the `(userId, source, externalId)` key.
          type: string
          minLength: 1
          maxLength: 120
      required:
        - mood
        - moodLoggedAt
      description: One bulk mood entry (UPSERT keyed by `externalId`).
    MeasurementReminderCreate:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 120
        measurementType:
          anyOf:
            - $ref: "#/components/schemas/MeasurementReminderType"
            - type: "null"
        intervalDays:
          anyOf:
            - type: integer
              minimum: 1
              maximum: 3650
            - type: "null"
        rrule:
          anyOf:
            - type: string
              minLength: 1
              maxLength: 512
            - type: "null"
        anchorDate:
          anyOf:
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
            - type: "null"
        notifyHour:
