  /api/labs/ocr/extract:
    post:
      tags:
        - Labs
      summary: Extract lab readings from a photo, PDF, or OCR'd text
      description: "Read-only (NOT idempotent) extraction. Two modes by content-type. VISION (`multipart/form-data`): a `file`
        (JPEG/PNG/WebP, or PDF — read natively on Anthropic, else rasterized to page images for any other vision
        provider; ≤ 12 MiB) is run through the user's vision-capable provider; the upload lives in memory only and is
        never persisted or logged. TEXT (`application/json`, opt-in local OCR): the browser OCR's the image
        (tesseract.js) and POSTs `{ mode: \"text\", text }` — only the extracted text reaches the server, so a text-only
        provider (e.g. ChatGPT-OAuth) reaches the same review/commit flow. Both modes are gated by AI consent, a 6/hour
        rate bucket, and the per-day token budget, and return proposed rows for the mandatory human review screen —
