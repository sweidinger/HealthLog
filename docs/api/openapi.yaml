components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: 'hlk_<hex>'
      description: |
        Long-lived API token issued via `POST /api/tokens`. Accepted on all
        user endpoints (interchangeable with the session cookie) and required
        on external ingest endpoints (e.g. `/api/ingest/medication`). Tokens
        are prefixed `hlk_` and stored as HMAC-SHA-256 hashes server-side
        (keyed with `API_TOKEN_HMAC_KEY` so a DB dump alone does not allow
        precomputed-rainbow lookups). Bearer tokens never grant admin access
        — admin routes require the session cookie. Permission scopes are
        enforced from the token's `permissions` array; a token MUST declare
        either the explicit required permission for the route or the
        wildcard `"*"`.
    sessionCookie:
      type: apiKey
      in: cookie
      name: healthlog_session
      description: |
        HttpOnly session cookie set by `/api/auth/login` and the passkey
        login flow. Authenticates the web app and (optionally) the iOS
        client when used in a web view.

  parameters:
    IdPathParam:
      in: path
      name: id
      required: true
      schema:
        type: string
        description: 'CUID identifier.'
    LimitParam:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
    OffsetParam:
      in: query
      name: offset
      schema:
        type: integer
        minimum: 0
        default: 0
    LocaleParam:
      in: query
      name: locale
      schema:
        type: string
        enum: [de, en]
      description: 'Override the resolved locale for narrative text.'

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Conflict:
      description: Conflict (e.g. duplicate)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Unprocessable:
      description: Validation failure
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }

  schemas:
    # ─── Envelope / errors ─────────────────────────────────────
    ApiEnvelope:
      type: object
      description: Standard envelope. On success `error` is `null`; on failure `data` is `null` and `error` is a string.
      properties:
        data:
          description: Response payload (typed per-endpoint).
        error:
          type: [string, 'null']
      required: [data, error]

    ApiError:
      type: object
      properties:
        data:
          type: 'null'
        error:
          type: string
      required: [data, error]

    DeletedEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                deleted: { type: boolean }

    UpdatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                updated: { type: boolean }

    PageMeta:
      type: object
      properties:
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
      required: [total, limit, offset]

    # ─── Enums ─────────────────────────────────────────────────
    MeasurementType:
      type: string
      enum:
        - WEIGHT
        - BLOOD_PRESSURE_SYS
        - BLOOD_PRESSURE_DIA
        - PULSE
        - BODY_FAT
        - SLEEP_DURATION
        - ACTIVITY_STEPS
        - BLOOD_GLUCOSE
        - TOTAL_BODY_WATER
        - BONE_MASS
        - OXYGEN_SATURATION

    MeasurementSource:
      type: string
      enum: [MANUAL, WITHINGS, IMPORT]

    GlucoseContext:
      type: string
      enum: [FASTING, POSTPRANDIAL, RANDOM, BEDTIME]

    IntakeSource:
      type: string
      enum: [WEB, API, REMINDER, IMPORT]

    ReminderPhase:
      type: string
      enum: [GREEN, YELLOW, ORANGE, RED]

    PhaseMode:
      type: string
      enum: [MINUTES, PERCENT]

    UserRole:
      type: string
      enum: [ADMIN, USER]

    Gender:
      type: string
      enum: [MALE, FEMALE]

    MoodLevel:
      type: string
      enum: [SUPER_GUT, GUT, OKAY, SCHLECHT, LAUSIG]

    MedicationCategory:
      type: string
      enum:
        - BLOOD_PRESSURE
        - VITAMIN
        - SUPPLEMENT
        - PAIN_RELIEF
        - ALLERGY
        - DIGESTIVE
        - THYROID
        - HORMONE
        - SKIN
        - SLEEP_AID
        - OTHER

    NotificationChannelType:
      type: string
      enum: [TELEGRAM, NTFY, WEB_PUSH]

    AiProviderType:
      type: string
      enum: [OPENAI, ANTHROPIC, LOCAL, CHATGPT_OAUTH]

    InsightSeverity:
      type: string
      enum: [normal, mild, moderate, severe, info]

    Trend:
      type: [string, 'null']
      enum: [up, down, stable, null]

    # ─── Auth DTOs ─────────────────────────────────────────────
    RegisterInput:
      type: object
      properties:
        email: { type: string, format: email }
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[a-zA-Z0-9_-]+$'
        password:
          type: string
          minLength: 12
      required: [email, username, password]

    LoginInput:
      type: object
      properties:
        email:
          type: string
          description: Email or username.
        password: { type: string }
      required: [email, password]

    LoginResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    id: { type: string }
                    username: { type: string }
                  required: [id, username]
                token:
                  type: string
                  description: |
                    Long-lived `hlk_*` Bearer token. Only returned when the
                    request carries `X-Client-Type: native` or a User-Agent
                    starting with `HealthLog-iOS`. Use it for subsequent
                    requests as `Authorization: Bearer <token>`.
                tokenExpiresAt:
                  type: string
                  format: date-time
                  description: ISO timestamp at which the auto-issued token expires.

    RegisterResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    id: { type: string }
                    username: { type: string }
                    email: { type: [string, 'null'] }

    ProfileInput:
      type: object
      properties:
        email: { type: [string, 'null'], format: email }
        heightCm:
          type: [number, 'null']
          minimum: 50
          maximum: 300
        dateOfBirth:
          type: [string, 'null']
          format: date
        gender:
          oneOf:
            - $ref: '#/components/schemas/Gender'
            - type: 'null'

    ChangePasswordInput:
      type: object
      properties:
        currentPassword: { type: string }
        newPassword: { type: string, minLength: 12 }
        confirmPassword: { type: string }
      required: [currentPassword, newPassword, confirmPassword]

    User:
      type: object
      description: Public-facing user shape.
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: [string, 'null'], format: email }
        role: { $ref: '#/components/schemas/UserRole' }
        heightCm: { type: [number, 'null'] }
        dateOfBirth: { type: [string, 'null'], format: date-time }
        gender:
          oneOf:
            - $ref: '#/components/schemas/Gender'
            - type: 'null'
        timezone: { type: string }
      required: [id, username, role, timezone]

    CurrentUser:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            onboardingCompletedAt:
              type: [string, 'null']
              format: date-time
            gravatarUrl:
              type: [string, 'null']
            glucoseUnit:
              type: [string, 'null']
              enum: ['mg/dL', 'mmol/L', null]

    # ─── Passkey DTOs ──────────────────────────────────────────
    PasskeyRegisterOptions:
      type: object
      description: SimpleWebAuthn `PublicKeyCredentialCreationOptionsJSON` plus a server-issued challenge id.
      properties:
        options:
          type: object
          additionalProperties: true
          description: WebAuthn registration options.
        challengeId: { type: string }
      required: [options, challengeId]

    PasskeyLoginOptions:
      type: object
      properties:
        options:
          type: object
          additionalProperties: true
          description: WebAuthn authentication options.
        challengeId: { type: string }
      required: [options, challengeId]

    PasskeyVerifyRegistrationInput:
      type: object
      properties:
        challengeId: { type: string }
        credential:
          type: object
          additionalProperties: true
          description: '`RegistrationResponseJSON` from `@simplewebauthn/browser`.'
      required: [challengeId, credential]

    PasskeyVerifyLoginInput:
      type: object
      properties:
        challengeId: { type: string }
        credential:
          type: object
          additionalProperties: true
          description: '`AuthenticationResponseJSON` from `@simplewebauthn/browser`.'
      required: [challengeId, credential]

    PasskeySummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        credentialDeviceType: { type: string }
        credentialBackedUp: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, name, credentialDeviceType, credentialBackedUp, createdAt]

    # ─── Measurement DTOs ──────────────────────────────────────
    Measurement:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        type: { $ref: '#/components/schemas/MeasurementType' }
        value: { type: number }
        unit: { type: string }
        source: { $ref: '#/components/schemas/MeasurementSource' }
        measuredAt: { type: string, format: date-time }
        notes: { type: [string, 'null'], maxLength: 25 }
        externalId: { type: [string, 'null'] }
        glucoseContext:
          oneOf:
            - $ref: '#/components/schemas/GlucoseContext'
            - type: 'null'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, userId, type, value, unit, source, measuredAt, createdAt, updatedAt]

    CreateMeasurementInput:
      type: object
      properties:
        type: { $ref: '#/components/schemas/MeasurementType' }
        value: { type: number }
        measuredAt: { type: string, format: date-time }
        notes: { type: string, maxLength: 25 }
        source:
          allOf: [{ $ref: '#/components/schemas/MeasurementSource' }]
          default: MANUAL
        glucoseContext:
          $ref: '#/components/schemas/GlucoseContext'
      required: [type, value, measuredAt]

    UpdateMeasurementInput:
      type: object
      properties:
        value: { type: number, minimum: 0, maximum: 500000 }
        measuredAt: { type: string, format: date-time }
        notes: { type: [string, 'null'], maxLength: 25 }

    # ─── Medication DTOs ───────────────────────────────────────
    MedicationSchedule:
      type: object
      properties:
        id: { type: string }
        medicationId: { type: string }
        windowStart:
          type: string
          pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
          description: HH:mm
        windowEnd:
          type: string
          pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
        label: { type: [string, 'null'] }
        dose: { type: [string, 'null'], description: 'Per-schedule dose override' }
        daysOfWeek:
          type: [string, 'null']
          description: 'Serialized recurrence (CSV of 0..6, optional intervalWeeks suffix).'
      required: [id, medicationId, windowStart, windowEnd]

    Medication:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        name: { type: string }
        dose: { type: string }
        active: { type: boolean }
        notificationsEnabled: { type: boolean }
        pausedAt: { type: [string, 'null'], format: date-time }
        snoozedUntil: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, userId, name, dose, active, notificationsEnabled, createdAt, updatedAt]

    MedicationWithSchedules:
      allOf:
        - $ref: '#/components/schemas/Medication'
        - type: object
          properties:
            schedules:
              type: array
              items: { $ref: '#/components/schemas/MedicationSchedule' }
            category: { $ref: '#/components/schemas/MedicationCategory' }
            lastTakenAt:
              type: [string, 'null']
              format: date-time
            todayEventCount:
              type: integer

    MedicationScheduleInput:
      type: object
      properties:
        windowStart: { type: string, pattern: '^([01]\d|2[0-3]):([0-5]\d)$' }
        windowEnd: { type: string, pattern: '^([01]\d|2[0-3]):([0-5]\d)$' }
        label: { type: string, maxLength: 50 }
        dose: { type: string, maxLength: 50 }
        daysOfWeek:
          type: array
          items: { type: integer, minimum: 0, maximum: 6 }
        intervalWeeks:
          type: integer
          minimum: 1
          maximum: 4
      required: [windowStart, windowEnd]

    CreateMedicationInput:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        dose: { type: string, minLength: 1, maxLength: 50 }
        category: { $ref: '#/components/schemas/MedicationCategory' }
        schedules:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/MedicationScheduleInput' }
      required: [name, dose, schedules]

    UpdateMedicationInput:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        dose: { type: string, minLength: 1, maxLength: 50 }
        category: { $ref: '#/components/schemas/MedicationCategory' }
        active: { type: boolean }
        notificationsEnabled: { type: boolean }
        schedules:
          type: array
          items: { $ref: '#/components/schemas/MedicationScheduleInput' }

    MedicationIntakeEvent:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        medicationId: { type: string }
        scheduledFor: { type: string, format: date-time }
        takenAt: { type: [string, 'null'], format: date-time }
        skipped: { type: boolean }
        source: { $ref: '#/components/schemas/IntakeSource' }
        idempotencyKey: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
      required: [id, userId, medicationId, scheduledFor, skipped, source, createdAt]

    CreateIntakeInput:
      type: object
      properties:
        scheduledFor: { type: string, format: date-time }
        takenAt: { type: string, format: date-time }
        skipped: { type: boolean, default: false }
        idempotencyKey: { type: string, maxLength: 128 }

    UpdateIntakeInput:
      type: object
      properties:
        takenAt: { type: [string, 'null'], format: date-time }
        skipped: { type: boolean }
        scheduledFor: { type: string, format: date-time }

    IntakeImportEntry:
      type: object
      properties:
        datum:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: YYYY-MM-DD
        uhrzeit:
          type: string
          pattern: '^\d{2}:\d{2}:\d{2}$'
          description: HH:mm:ss
        zaehler:
          oneOf:
            - { type: integer }
            - { type: string }
      required: [datum, uhrzeit]

    IntakeImportResult:
      type: object
      properties:
        imported: { type: integer }
        skippedDuplicates: { type: integer }
        skippedInvalid: { type: integer }

    ExternalIntakeInput:
      type: object
      properties:
        medicationName: { type: string, maxLength: 200 }
        takenAt: { type: string, format: date-time }
        idempotencyKey: { type: string, maxLength: 128 }
      required: [medicationName, idempotencyKey]

    DailyComplianceEntry:
      type: object
      properties:
        expected: { type: integer }
        taken: { type: integer }
        skipped: { type: integer }
        onTime: { type: integer }
        late: { type: integer }
        veryLate: { type: integer }

    ComplianceSummary:
      type: object
      properties:
        rate: { type: number, description: 'Fraction 0..1' }
        taken: { type: integer }
        skipped: { type: integer }
        missed: { type: integer }
        streak: { type: integer }

    MedicationComplianceResponse:
      type: object
      properties:
        compliance7: { $ref: '#/components/schemas/ComplianceSummary' }
        compliance30: { $ref: '#/components/schemas/ComplianceSummary' }
        dailyCompliance:
          type: object
          additionalProperties: { $ref: '#/components/schemas/DailyComplianceEntry' }

    ReminderPhaseConfig:
      type: object
      properties:
        greenValue: { type: integer, default: 60 }
        greenMode: { allOf: [{ $ref: '#/components/schemas/PhaseMode' }], default: MINUTES }
        yellowValue: { type: integer, default: 30 }
        yellowMode: { allOf: [{ $ref: '#/components/schemas/PhaseMode' }], default: MINUTES }
        orangeValue: { type: integer, default: 0 }
        orangeMode: { allOf: [{ $ref: '#/components/schemas/PhaseMode' }], default: MINUTES }
        redValue: { type: integer, default: 240 }
        redMode: { allOf: [{ $ref: '#/components/schemas/PhaseMode' }], default: MINUTES }

    MedicationApiEndpointResponse:
      type: object
      properties:
        enabled: { type: boolean }
        activeTokenCount: { type: integer }
        token:
          type: [string, 'null']
          description: 'Plaintext token, only returned once on creation.'
        created: { type: boolean }
        revokedTokenCount: { type: integer }

    IntakeSummaryPoint:
      type: object
      properties:
        date:
          type: string
          description: YYYY-MM-DD (Berlin local).
        total: { type: integer }
        medications:
          type: object
          additionalProperties: { type: integer }
      required: [date, total]

    IntakeSummaryResponse:
      type: object
      properties:
        points:
          type: array
          items: { $ref: '#/components/schemas/IntakeSummaryPoint' }
        medications:
          type: array
          items: { type: string }

    # ─── Mood DTOs ─────────────────────────────────────────────
    MoodEntry:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        date:
          type: string
          description: YYYY-MM-DD
        mood: { $ref: '#/components/schemas/MoodLevel' }
        score:
          type: integer
          minimum: 1
          maximum: 5
        tags:
          type: array
          items: { type: string }
        source: { type: string, default: MANUAL }
        moodLoggedAt: { type: string, format: date-time }
        syncedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, userId, date, mood, score, source, moodLoggedAt]

    CreateMoodEntryInput:
      type: object
      properties:
        mood: { $ref: '#/components/schemas/MoodLevel' }
        moodLoggedAt: { type: string, format: date-time }
        tags:
          type: array
          items: { type: string }
        source: { type: string }
      required: [mood, moodLoggedAt]

    UpdateMoodEntryInput:
      type: object
      properties:
        mood: { $ref: '#/components/schemas/MoodLevel' }
        moodLoggedAt: { type: string, format: date-time }
        tags:
          type: array
          items: { type: string }

    MoodAnalytics:
      type: object
      properties:
        entries:
          type: array
          items:
            type: object
            properties:
              date: { type: string }
              score: { type: number }
              samples: { type: integer }
        summary:
          type: object
          additionalProperties: true

    # ─── Dashboard DTOs ────────────────────────────────────────
    DashboardWidget:
      type: object
      properties:
        id:
          type: string
          enum: [weight, bp, pulse, bodyFat, mood, medications, sleep, steps, glucose, bpInTarget]
        visible: { type: boolean }
        order: { type: integer, minimum: 0, maximum: 99 }
      required: [id, visible, order]

    DashboardLayout:
      type: object
      properties:
        version: { type: integer, enum: [1] }
        widgets:
          type: array
          minItems: 1
          maxItems: 20
          items: { $ref: '#/components/schemas/DashboardWidget' }
      required: [version, widgets]

    # ─── Insights DTOs ─────────────────────────────────────────
    Classification:
      type: object
      properties:
        category: { type: string }
        color: { type: string }
        severity: { $ref: '#/components/schemas/InsightSeverity' }

    SummaryStats:
      type: object
      properties:
        latest: { type: [number, 'null'] }
        avg7: { type: [number, 'null'] }
        avg30: { type: [number, 'null'] }
        min: { type: [number, 'null'] }
        max: { type: [number, 'null'] }
        count: { type: integer }
        slope30:
          type: [object, 'null']
          properties:
            slope: { type: number }
            r2: { type: number }
        anomalyCount: { type: integer }

    CorrelationResult:
      type: [object, 'null']
      properties:
        r: { type: number }
        strength: { type: string }
        n: { type: integer }

    Alert:
      type: object
      properties:
        severity: { $ref: '#/components/schemas/InsightSeverity' }
        message: { type: string }
        type: { type: string }

    BpTargets:
      type: [object, 'null']
      properties:
        sysLow: { type: integer }
        sysHigh: { type: integer }
        diaLow: { type: integer }
        diaHigh: { type: integer }

    ComprehensiveInsights:
      type: object
      properties:
        summaries:
          type: object
          additionalProperties: { $ref: '#/components/schemas/SummaryStats' }
        bmi: { type: [number, 'null'] }
        bmiClassification:
          oneOf:
            - $ref: '#/components/schemas/Classification'
            - type: 'null'
        bpClassification:
          oneOf:
            - $ref: '#/components/schemas/Classification'
            - type: 'null'
        bpPctInTarget: { type: [integer, 'null'] }
        bpTargets: { $ref: '#/components/schemas/BpTargets' }
        weightBpCorrelation: { $ref: '#/components/schemas/CorrelationResult' }
        scatterData:
          type: array
          items:
            type: object
            properties:
              weight: { type: number }
              sysBP: { type: number }
        bpMedicationCorrelation:
          type: [object, 'null']
          properties:
            r: { type: number }
            strength: { type: string }
            n: { type: integer }
            medicationCount: { type: integer }
        bpMedicationScatterData:
          type: array
          items:
            type: object
            properties:
              continuityPct: { type: integer }
              sysBP: { type: number }
        moodSummary:
          oneOf:
            - $ref: '#/components/schemas/SummaryStats'
            - type: 'null'
        moodBpCorrelation: { $ref: '#/components/schemas/CorrelationResult' }
        moodBpScatterData:
          type: array
          items:
            type: object
            properties:
              mood: { type: number }
              sysBP: { type: number }
        moodWeightCorrelation: { $ref: '#/components/schemas/CorrelationResult' }
        moodWeightScatterData:
          type: array
          items:
            type: object
            properties:
              mood: { type: number }
              weight: { type: number }
        moodPulseCorrelation: { $ref: '#/components/schemas/CorrelationResult' }
        moodPulseScatterData:
          type: array
          items:
            type: object
            properties:
              mood: { type: number }
              pulse: { type: number }
        medications:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              dose: { type: string }
              category: { $ref: '#/components/schemas/MedicationCategory' }
              compliance7: { type: number }
              compliance30: { type: number }
              streak: { type: integer }
              taken7: { type: integer }
              skipped7: { type: integer }
              missed7: { type: integer }
        alerts:
          type: array
          items: { $ref: '#/components/schemas/Alert' }
        hasProvider: { type: boolean }
        dataSpanDays: { type: integer }
        totalMeasurements: { type: integer }

    InsightTargetItem:
      type: object
      properties:
        type: { type: string }
        label: { type: string }
        current: { type: [number, 'null'] }
        average30: { type: [number, 'null'] }
        trend: { $ref: '#/components/schemas/Trend' }
        unit: { type: string }
        range:
          type: [object, 'null']
          properties:
            min: { type: number }
            max: { type: number }
        classification:
          oneOf:
            - $ref: '#/components/schemas/Classification'
            - type: 'null'
        source: { type: string }
        details:
          type: object
          properties:
            medications:
              type: array
              items:
                type: object
                properties:
                  name: { type: string }
                  compliance7: { type: number }
                  compliance30: { type: number }

    InsightTargetsResponse:
      type: object
      properties:
        targets:
          type: array
          items: { $ref: '#/components/schemas/InsightTargetItem' }
        bpDiastolic:
          type: object
          properties:
            current: { type: [number, 'null'] }
            average30: { type: [number, 'null'] }
            range:
              type: [object, 'null']
              properties:
                min: { type: number }
                max: { type: number }
        profile:
          type: object
          properties:
            heightCm: { type: [number, 'null'] }
            age: { type: [integer, 'null'] }
            gender:
              oneOf:
                - $ref: '#/components/schemas/Gender'
                - type: 'null'
            glucoseUnit: { type: string }

    InsightStatusBundle:
      type: object
      description: Narrative status payload (shape varies per status route).
      additionalProperties: true

    InsightGenerateResult:
      type: object
      properties:
        insights:
          type: object
          additionalProperties: true
        cached: { type: boolean }
        cachedAt: { type: string, format: date-time }

    InsightsSettings:
      type: object
      properties:
        codexStatus: { type: string, enum: [connected, disconnected] }
        codexConnectedAt: { type: [string, 'null'], format: date-time }
        hasAdminKey: { type: boolean }
        privacyMode: { type: string, enum: [aggregated, raw] }
        lastInsightAt: { type: [string, 'null'], format: date-time }

    # ─── Achievements ──────────────────────────────────────────
    Achievement:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        target: { type: integer }
        progress: { type: integer }
        unlocked: { type: boolean }
        completedAt:
          type: [string, 'null']
          format: date-time

    AchievementsResult:
      type: object
      properties:
        achievements:
          type: array
          items: { $ref: '#/components/schemas/Achievement' }
        unlockedCount: { type: integer }
        totalCount: { type: integer }

    # ─── Doctor report ─────────────────────────────────────────
    DoctorReportResponse:
      type: object
      properties:
        period:
          type: object
          properties:
            days: { type: integer }
            since: { type: string, format: date-time }
        patient:
          type: object
          properties:
            username: { type: [string, 'null'] }
            dateOfBirth: { type: [string, 'null'], format: date-time }
            gender:
              oneOf:
                - $ref: '#/components/schemas/Gender'
                - type: 'null'
            heightCm: { type: [number, 'null'] }
        measurements:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              properties:
                value: { type: number }
                measuredAt: { type: string, format: date-time }
        stats:
          type: object
          additionalProperties:
            type: object
            properties:
              avg: { type: number }
              min: { type: number }
              max: { type: number }
              count: { type: integer }
              latest: { type: number }
        glucoseStats:
          type: object
          additionalProperties:
            type: object
            properties:
              avg: { type: number }
              min: { type: number }
              max: { type: number }
              count: { type: integer }
              latest: { type: number }
        glucoseRanges:
          type: object
          additionalProperties:
            type: object
            properties:
              min: { type: number }
              max: { type: number }
        glucoseUnit: { type: string }
        bmi: { type: [number, 'null'] }
        compliance:
          type: object
          additionalProperties:
            type: object
            properties:
              total: { type: integer }
              taken: { type: integer }
              skipped: { type: integer }
              missed: { type: integer }
        medications:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              dose: { type: string }
              schedules:
                type: array
                items:
                  type: object
                  properties:
                    windowStart: { type: string }
                    windowEnd: { type: string }
                    label: { type: [string, 'null'] }
        mood:
          type: [object, 'null']
          properties:
            avg: { type: number }
            min: { type: number }
            max: { type: number }
            count: { type: integer }
            distribution:
              type: object
              additionalProperties: { type: integer }

    # ─── Onboarding ────────────────────────────────────────────
    OnboardingInput:
      type: object
      properties:
        heightCm: { type: number, minimum: 50, maximum: 300 }
        dateOfBirth: { type: string, format: date }
        gender: { $ref: '#/components/schemas/Gender' }

    # ─── Health probe ──────────────────────────────────────────
    HealthStatus:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded] }
        timestamp: { type: string, format: date-time }
        database: { type: string }
        worker: { type: string }
        workerLastHeartbeat: { type: string, format: date-time }

    # ─── Tokens ────────────────────────────────────────────────
    ApiTokenSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        permissions:
          type: array
          items: { type: string }
        lastUsedAt: { type: [string, 'null'], format: date-time }
        expiresAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
        revoked: { type: boolean }

    CreateTokenInput:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        expiresInDays: { type: integer, minimum: 1, maximum: 365 }
      required: [name]

    # ─── Notifications ─────────────────────────────────────────
    NotificationChannel:
      type: object
      properties:
        id: { type: string }
        type: { $ref: '#/components/schemas/NotificationChannelType' }
        label: { type: string }
        enabled: { type: boolean }
        globallyEnabled: { type: boolean }

    NotificationPreference:
      type: object
      properties:
        channelId: { type: string }
        eventType: { type: string }
        enabled: { type: boolean }

    NotificationPreferencesResponse:
      type: object
      properties:
        channels:
          type: array
          items: { $ref: '#/components/schemas/NotificationChannel' }
        preferences:
          type: array
          items: { $ref: '#/components/schemas/NotificationPreference' }
        eventTypes:
          type: array
          items: { type: string }

    UpdateNotificationPreferenceInput:
      type: object
      properties:
        channelId: { type: string }
        eventType: { type: string }
        enabled: { type: boolean }
      required: [channelId, eventType, enabled]

    WebPushSubscribeInput:
      type: object
      properties:
        endpoint: { type: string, format: uri }
        keys:
          type: object
          properties:
            p256dh: { type: string }
            auth: { type: string }
          required: [p256dh, auth]
      required: [endpoint, keys]

    # ─── User config ───────────────────────────────────────────
    UserAiProvider:
      type: object
      properties:
        provider:
          oneOf:
            - $ref: '#/components/schemas/AiProviderType'
            - type: 'null'
        model: { type: [string, 'null'] }
        baseUrl: { type: [string, 'null'] }
        hasAnthropicKey: { type: boolean }
        anthropicKeyPreview: { type: [string, 'null'] }
        hasLocalKey: { type: boolean }

    UpdateUserAiProviderInput:
      type: object
      properties:
        provider:
          oneOf:
            - $ref: '#/components/schemas/AiProviderType'
            - type: 'null'
        model: { type: [string, 'null'] }
        baseUrl: { type: [string, 'null'] }
        anthropicKey: { type: [string, 'null'] }
        localKey: { type: [string, 'null'] }

    ThresholdRange:
      type: object
      properties:
        greenMin: { type: number }
        greenMax: { type: number }
        orangeMin: { type: number }
        orangeMax: { type: number }
        redMin: { type: number }
        redMax: { type: number }

    EffectiveRange:
      type: object
      properties:
        range:
          oneOf:
            - $ref: '#/components/schemas/ThresholdRange'
            - type: 'null'
        isOverride: { type: boolean }
        defaultRange:
          oneOf:
            - $ref: '#/components/schemas/ThresholdRange'
            - type: 'null'

    ThresholdOverrides:
      type: object
      description: 'Map of metric name → `{ min, max }` override.'
      additionalProperties:
        type: object
        properties:
          min: { type: number }
          max: { type: number }

    ThresholdsResponse:
      type: object
      properties:
        effective:
          type: object
          additionalProperties: { $ref: '#/components/schemas/EffectiveRange' }
        overrides: { $ref: '#/components/schemas/ThresholdOverrides' }

    # ─── Analytics ─────────────────────────────────────────────
    AnalyticsResponse:
      type: object
      properties:
        summaries:
          type: object
          additionalProperties: { $ref: '#/components/schemas/SummaryStats' }
        bmi: { type: [number, 'null'] }
        bpInTargetPct: { type: [integer, 'null'] }
        glucoseByContext:
          type: object
          additionalProperties: { $ref: '#/components/schemas/SummaryStats' }

    AiTestResult:
      type: object
      properties:
        ok: { type: boolean }
        providerType: { $ref: '#/components/schemas/AiProviderType' }
        model: { type: string }
        tokensUsed:
          type: object
          properties:
            input: { type: integer }
            output: { type: integer }
        sample: { type: string }

    # ─── Export / Import ───────────────────────────────────────
    ImportInput:
      type: object
      properties:
        measurements:
          type: array
          maxItems: 10000
          items:
            type: object
            properties:
              type: { $ref: '#/components/schemas/MeasurementType' }
              value: { type: number }
              unit: { type: string }
              measuredAt: { type: string, format: date-time }
              source: { type: string }
              notes: { type: string }
            required: [type, value, unit, measuredAt]
        moodEntries:
          type: array
          maxItems: 10000
          items:
            type: object
            properties:
              date: { type: string }
              mood: { $ref: '#/components/schemas/MoodLevel' }
              score: { type: integer, minimum: 1, maximum: 5 }
              tags: { type: string }
              loggedAt: { type: string, format: date-time }
            required: [date, mood, score]

    ImportResult:
      type: object
      properties:
        measurements: { type: integer }
        moodEntries: { type: integer }
        skipped: { type: integer }

    # ─── Audit log ─────────────────────────────────────────────
    AuditLogEntry:
      type: object
      properties:
        id: { type: string }
        action: { type: string }
        ipAddress: { type: [string, 'null'] }
        location: { type: [string, 'null'] }
        details: { type: [string, 'null'], description: 'JSON string' }
        createdAt: { type: string, format: date-time }

    AuditLogResponse:
      type: object
      properties:
        entries:
          type: array
          items: { $ref: '#/components/schemas/AuditLogEntry' }
        meta: { $ref: '#/components/schemas/PageMeta' }

    # ─── Feedback ──────────────────────────────────────────────
    FeedbackCategory:
      type: string
      enum: [BUG, FEATURE_REQUEST, QUESTION, OTHER]

    FeedbackStatus:
      type: string
      enum: [OPEN, ACKNOWLEDGED, RESOLVED, ARCHIVED]

    FeedbackSummary:
      type: object
      properties:
        id: { type: string }
        category: { $ref: '#/components/schemas/FeedbackCategory' }
        subject: { type: string }
        status: { $ref: '#/components/schemas/FeedbackStatus' }
        adminNote: { type: [string, 'null'] }
        gitHubIssueUrl: { type: [string, 'null'], format: uri }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateFeedbackInput:
      type: object
      properties:
        category: { $ref: '#/components/schemas/FeedbackCategory' }
        subject: { type: string }
        description: { type: string }
        screenshot:
          type: string
          description: 'Base64-encoded PNG/JPG (≤5 MB).'
        metadata:
          type: object
          additionalProperties: true
      required: [category, subject, description]

    BugReportInput:
      type: object
      properties:
        description: { type: string, minLength: 10, maxLength: 5000 }
        screenshot:
          type: string
          description: '`data:image/(png|jpeg|webp|gif);base64,...` data URL.'
      required: [description]

    # ─── Settings ──────────────────────────────────────────────
    GlobalServicesFlags:
      type: object
      properties:
        telegram: { type: boolean }
        ntfy: { type: boolean }
        webPush: { type: boolean }
        api: { type: boolean }
        moodLog: { type: boolean }

    MoodLogSettingsInput:
      type: object
      properties:
        url: { type: [string, 'null'], format: uri }
        apiKey: { type: [string, 'null'] }
        enabled: { type: boolean }
        webhookSecret: { type: [string, 'null'] }

    NtfySettings:
      type: object
      properties:
        configured: { type: boolean }
        enabled: { type: boolean }
        topic: { type: [string, 'null'] }
        serverUrl: { type: [string, 'null'] }

    NtfySettingsInput:
      type: object
      properties:
        topic: { type: [string, 'null'] }
        serverUrl: { type: [string, 'null'], format: uri }
        enabled: { type: boolean }
        accessToken: { type: [string, 'null'] }

    TelegramSettings:
      type: object
      properties:
        configured: { type: boolean }
        enabled: { type: boolean }
        chatId: { type: [string, 'null'] }

    TelegramSettingsInput:
      type: object
      properties:
        botToken: { type: [string, 'null'] }
        chatId: { type: [string, 'null'] }
        enabled: { type: boolean }

    ReminderThresholds:
      type: object
      properties:
        reminderLateMinutes: { type: integer }
        reminderMissedMinutes: { type: integer }

    # ─── Withings + moodLog status ─────────────────────────────
    WithingsCredentialsInput:
      type: object
      properties:
        clientId: { type: string }
        clientSecret: { type: string }
      required: [clientId, clientSecret]

    WithingsStatus:
      type: object
      properties:
        connected: { type: boolean }
        configured: { type: boolean }
        lastSyncedAt: { type: [string, 'null'], format: date-time }
        connectedAt: { type: string, format: date-time }
        tokenExpired: { type: boolean }
        tokenRefreshFailed: { type: boolean }
        tokenExpiresAt: { type: string, format: date-time }

    MoodLogStatus:
      type: object
      properties:
        configured: { type: boolean }
        enabled: { type: boolean }
        lastSyncedAt: { type: [string, 'null'], format: date-time }
        entryCount: { type: integer }
        webhookSecret: { type: [string, 'null'] }

    PublicMonitoringSettings:
      type: object
      properties:
        umamiEnabled: { type: boolean }
        umamiScriptUrl: { type: [string, 'null'] }
        umamiWebsiteId: { type: [string, 'null'] }
        glitchtipEnabled: { type: boolean }
        glitchtipDsn: { type: [string, 'null'] }
        glitchtipEnvironment: { type: [string, 'null'] }

    # ─── iOS adapter DTOs (v1.3) ──────────────────────────────
    # Used by /api/dashboard/summary (`MetricCard.kind`) and the
    # /api/measurements/series adapter. Extended in v1.3.3 to cover the
    # body-composition + SpO2 measurements that the server already emits.
    # iOS clients SHOULD decode unknown values defensively; we still
    # publish the canonical list here so generated codecs stay accurate.
    MetricKind:
      type: string
      enum:
        - weight
        - bloodPressure
        - pulse
        - bodyFat
        - glucose
        - sleep
        - steps
        - totalBodyWater
        - boneMass
        - oxygenSaturation

    InsightSeverityIos:
      type: string
      enum: [alert, caution, info, good]

    DashboardSummaryGreeting:
      type: object
      properties:
        salutation: { type: string }
        date: { type: string, format: date-time }
      required: [salutation, date]

    DashboardSummaryStreak:
      type: object
      properties:
        currentDays: { type: integer }
        longest: { type: integer }
        label: { type: string }
      required: [currentDays, longest, label]

    DashboardSummaryCompliance:
      type: object
      properties:
        scheduledToday: { type: integer }
        takenToday: { type: integer }
      required: [scheduledToday, takenToday]

    DashboardMetricCard:
      type: object
      properties:
        id: { type: string }
        kind: { $ref: '#/components/schemas/MetricKind' }
        title: { type: string }
        latestValue: { type: [number, 'null'] }
        secondaryValue: { type: [number, 'null'] }
        unit: { type: string }
        trend:
          type: string
          enum: [up, down, flat, unknown]
        sparkline:
          type: array
          items: { type: number }
        updatedAt: { type: [string, 'null'], format: date-time }
      required: [id, kind, title, unit, trend, sparkline]

    DashboardSummary:
      type: object
      properties:
        greeting: { $ref: '#/components/schemas/DashboardSummaryGreeting' }
        streak: { $ref: '#/components/schemas/DashboardSummaryStreak' }
        compliance: { $ref: '#/components/schemas/DashboardSummaryCompliance' }
        highlightInsight:
          oneOf:
            - { type: 'null' }
            - { $ref: '#/components/schemas/InsightCard' }
        metrics:
          type: array
          items: { $ref: '#/components/schemas/DashboardMetricCard' }
        lastUpdated: { type: string, format: date-time }
      required: [greeting, streak, compliance, metrics, lastUpdated]

    MeasurementSeriesPoint:
      type: object
      properties:
        id: { type: string }
        at: { type: string, format: date-time }
        value: { type: number }
        secondary: { type: [number, 'null'] }
      required: [id, at, value]

    MeasurementSeriesStats:
      type: object
      properties:
        mean: { type: number }
        min: { type: number }
        max: { type: number }
        stdDev: { type: number }
        count: { type: integer }
      required: [mean, min, max, stdDev, count]

    MeasurementSeries:
      type: object
      properties:
        kind: { $ref: '#/components/schemas/MetricKind' }
        points:
          type: array
          items: { $ref: '#/components/schemas/MeasurementSeriesPoint' }
        stats: { $ref: '#/components/schemas/MeasurementSeriesStats' }
      required: [kind, points, stats]

    HealthKitDirection:
      type: string
      enum: [bidirectional, readOnly, writeOnly, disabled]

    HealthKitEntry:
      type: object
      properties:
        id: { type: string }
        kind: { type: string }
        direction: { $ref: '#/components/schemas/HealthKitDirection' }
        enabled: { type: boolean }
      required: [id, kind, direction, enabled]

    HealthKitConfig:
      type: object
      properties:
        entries:
          type: array
          items: { $ref: '#/components/schemas/HealthKitEntry' }
        lastSyncedAt: { type: [string, 'null'], format: date-time }
      required: [entries]

    HealthKitConfigPatch:
      type: object
      properties:
        entries:
          type: array
          maxItems: 50
          items:
            type: object
            properties:
              id: { type: string }
              kind: { type: string }
              direction: { $ref: '#/components/schemas/HealthKitDirection' }
              enabled: { type: boolean }
            required: [id, direction]
      required: [entries]

    IosUserProfile:
      type: object
      properties:
        username: { type: string }
        displayName: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email }
        dateOfBirth: { type: [string, 'null'], format: date-time }
        gender: { $ref: '#/components/schemas/Gender' }
        heightCm: { type: [number, 'null'] }
        locale: { type: [string, 'null'] }
        timezone: { type: string }
      required: [username, timezone]

    IosUserProfilePatch:
      type: object
      properties:
        displayName: { type: [string, 'null'], minLength: 1, maxLength: 80 }
        email: { type: [string, 'null'], format: email }
        dateOfBirth: { type: [string, 'null'] }
        gender:
          oneOf:
            - { type: 'null' }
            - { $ref: '#/components/schemas/Gender' }
        heightCm: { type: [number, 'null'], minimum: 50, maximum: 300 }
        locale:
          type: [string, 'null']
          enum: [de, en, null]
        timezone: { type: string, minLength: 1, maxLength: 64 }

    DeviceRegisterInput:
      type: object
      properties:
        token: { type: string, minLength: 8, maxLength: 512 }
        bundleId: { type: string, minLength: 1, maxLength: 128 }
        locale: { type: string }
        appVersion: { type: string }
        model: { type: string }
      required: [token, bundleId]

    IntakeUpdateInput:
      type: object
      properties:
        intakeId: { type: string }
        status:
          type: string
          enum: [taken, skipped, snoozed]
        takenAt: { type: string, format: date-time }
        snoozedUntil: { type: string, format: date-time }
      required: [intakeId, status]

    InsightRecommendation:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        actionURL: { type: [string, 'null'] }
      required: [id, label]

    InsightCard:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        summary: { type: string }
        body: { type: [string, 'null'] }
        severity: { $ref: '#/components/schemas/InsightSeverityIos' }
        recommendations:
          type: array
          items: { $ref: '#/components/schemas/InsightRecommendation' }
        generatedAt: { type: string, format: date-time }
        provider: { type: string }
      required: [id, title, summary, severity, recommendations, generatedAt, provider]

    InsightCorrelation:
      type: object
      properties:
        id: { type: string }
        leftMetric: { type: string }
        rightMetric: { type: string }
        coefficient: { type: number }
        sampleSize: { type: integer }
      required: [id, leftMetric, rightMetric, coefficient, sampleSize]

    # ─── Admin DTOs ────────────────────────────────────────────
    AdminUpdateUserInput:
      type: object
      properties:
        username: { type: string, minLength: 3, maxLength: 30 }
        email: { type: [string, 'null'], format: email }
        role: { $ref: '#/components/schemas/UserRole' }
