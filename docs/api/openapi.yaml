      description: Partial profile update — every field is optional. An explicit null (or empty string) clears a field. A
        non-empty `insurerIkNumber` must be exactly 9 digits (422 otherwise); a non-empty `insuranceNumber` (KVNR) must
        pass the mod-10 check. `userId` is never accepted from the body.
