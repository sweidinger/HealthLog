          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Lab × outcome pairs assessed.
        fdrQ:
          type: number
          description: The FDR target the pass used.
        minDraws:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
