              - order
            additionalProperties: false
        tiles:
          minItems: 1
          maxItems: 62
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                enum:
                  - overview
                  - blood-pressure
                  - pulse
                  - oxygen
                  - body-temperature
                  - respiratory-rate
                  - pain
                  - weight
                  - bmi
                  - body-water
                  - bone-mass
                  - fat-free-mass
                  - fat-mass
                  - muscle-mass
                  - visceral-fat
                  - lean-body-mass
                  - waist
                  - waist-to-height
                  - steps
                  - active-energy
                  - workouts
                  - flights-climbed
                  - walking-distance
                  - walking-steadiness
                  - walking-heart-rate
                  - walking-asymmetry
                  - double-support-time
                  - step-length
                  - walking-speed
                  - cardio-fitness
                  - falls
                  - six-minute-walk
                  - stair-ascent-speed
                  - stair-descent-speed
                  - grip-strength
                  - sleep
                  - breathing-disturbances
                  - resting-pulse
                  - hrv
                  - pulse-wave-velocity
                  - vascular-age
                  - cardio-recovery
                  - environmental-audio
                  - headphone-audio
                  - audio-events
                  - daylight
                  - blood-glucose
                  - skin-temperature
                  - wrist-temperature
                  - mood
                  - medications
                  - nutrients
                  - blutdruck
                  - puls
                  - sauerstoff
                  - koerpertemperatur
                  - gewicht
                  - aktive-energie
                  - schlaf
                  - ruhepuls
                  - stimmung
                  - medikamente
              visible:
