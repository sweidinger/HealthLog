          type: "null"
        meta:
          type: object
          properties:
            requestId:
              type: string
          additionalProperties: false
      required:
        - data
        - error
      additionalProperties: false
    AdminDiagnosticData:
      type: object
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/AdminDiagnosticDevice"
        notificationChannels:
          type: array
          items:
            $ref: "#/components/schemas/AdminDiagnosticChannel"
        recentPushAttempts:
          type: array
          items:
            $ref: "#/components/schemas/AdminDiagnosticPushAttempt"
      required:
        - devices
        - notificationChannels
        - recentPushAttempts
      additionalProperties: false
      description: Admin notification diagnostic snapshot for the calling user — what the dispatcher would see when targeting
        this account. Surfaces device tokens (masked), channel state, and recent push attempts so an operator can debug
        an iOS / Web Push / Telegram / ntfy issue without DB shell access.
    AdminDiagnosticDevice:
      type: object
      properties:
        id:
          type: string
        platform:
          type: string
        hasApnsToken:
          type: boolean
        apnsTokenPrefix:
          anyOf:
            - type: string
            - type: "null"
        apnsTokenSuffix:
          anyOf:
            - type: string
            - type: "null"
        apnsEnvironment:
          anyOf:
            - type: string
            - type: "null"
        lastSeenAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
      required:
        - id
        - platform
        - hasApnsToken
        - apnsTokenPrefix
        - apnsTokenSuffix
        - apnsEnvironment
        - lastSeenAt
      additionalProperties: false
      description: Per-device APNs registration snapshot. The APNs token is masked to its 8-char hex prefix + 8-char suffix so
        an operator can correlate with iOS-side logs without disclosing the delivery target.
    AdminDiagnosticChannel:
      type: object
      properties:
        type:
          type: string
        enabled:
          type: boolean
        configPresent:
          type: boolean
      required:
        - type
        - enabled
        - configPresent
      additionalProperties: false
      description: Per-channel state. `configPresent` is true when the channel's encrypted-JSON config blob carries the field
        the corresponding sender will read (chatId+botToken for TELEGRAM, topic for NTFY); WEB_PUSH/APNS rely on sibling
        tables so the row's existence is the signal.
    AdminDiagnosticPushAttempt:
      type: object
      properties:
        eventType:
          type: string
        channel:
          type: string
        result:
          type: string
        reason:
          anyOf:
            - type: string
            - type: "null"
        at:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
      required:
        - eventType
        - channel
        - result
        - reason
        - at
      additionalProperties: false
      description: Single push delivery attempt. Reserved for the v1.4.48+ follow-up that adds the dedicated PushAttempt table
        — currently always returned as an empty array so the response shape stays stable for iOS consumers.
    InsightsComprehensiveResponseEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/InsightsComprehensiveResponse"
        error:
          type: "null"
        meta:
          type: object
          properties:
            requestId:
              type: string
          additionalProperties: false
      required:
        - data
        - error
      additionalProperties: false
    InsightsComprehensiveResponse:
      type: object
      properties:
        summary:
          type: string
        recommendations:
          type: array
          items:
            type: object
            propertyNames:
              type: string
            additionalProperties: {}
        citations:
          type: array
          items:
            type: object
            propertyNames:
              type: string
            additionalProperties: {}
        warnings:
          type: array
          items:
            type: object
            propertyNames:
              type: string
            additionalProperties: {}
        dailyBriefing:
          anyOf:
            - type: object
              propertyNames:
                type: string
              additionalProperties: {}
            - type: "null"
        trendAnnotations:
          anyOf:
            - type: object
              propertyNames:
                type: string
              additionalProperties: {}
            - type: "null"
        storyboardAnnotations:
          type: array
          items:
            type: object
            propertyNames:
              type: string
            additionalProperties: {}
        metricSource:
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
      required:
        - summary
        - recommendations
        - citations
        - warnings
      additionalProperties: false
      description: AI-generated insights bundle. Strict-schema validated server-side; Coach-routed when the insight surface
        needs day-level grounding.
    DisableCoachFlagOutput:
      type: object
      properties:
        disableCoach:
          type: boolean
      required:
