        "429": *a4
  /api/insights/chat/fenced:
    post:
      tags:
        - Insights
      summary: Send a FENCED multi-document coach turn (streaming reply)
      description: "v1.29.x (S7) — sends a user turn and streams a grounded prose reply about the documents attached to a
        coach conversation, as Server-Sent Events (`text/event-stream`: one `data: <json>\\n\\n` frame per event;
        `token` / `done` / `error`, HTTP 200 even for a provider/refusal outcome). FENCED by construction: NO tools, NO
        health snapshot; every attached document is fenced as untrusted DATA (per-document header fields
        marker-scrubbed); the single picked provider is egress-consent-checked once per attached document (403
        `consent.ai.required` if any fails); the reply is numerically grounded against the LIVE attachments' figures
        only. `conversationId` continues an existing fenced thread; `attachmentIds` (first-turn ONLY, min 1, max 5)
        creates a fresh fenced thread — supplying BOTH is a 422. The body is `.strict()`: `scope` / `guidedQuestion` /
        `prefill` / `userId` are rejected. A plain tool conversation 404s here. Module-gated on `inboundDocuments`;
        rate-limited (shared `document-chat` bucket). Renders as plain text (no markdown). Auth via cookie or Bearer."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FencedCoachChatRequest"
      responses:
        "200":
          description: Server-Sent Events stream of `token` / `done` / `error` frames.
          content:
            text/event-stream:
              schema:
                type: string
                description: "SSE frames: `data: <json>\\n\\n`. See the operation description for the per-`type` frame shapes."
        "401": *a1
        "403":
          description: "AI consent required for an external provider (`errorCode: consent.ai.required`). A 422 (`stdResponses`)
            covers an un-indexed / unavailable attachment (`coach.fenced.attachmentUnavailable`), the attachment cap
            (`coach.fenced.attachmentLimit`), or `attachmentIds` sent with a `conversationId`
            (`coach.fenced.attachmentConflict`)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/insights/chat/{id}/attachments:
    post:
      tags:
        - Insights
      summary: Attach a document to a coach conversation
      description: "v1.29.x (S7) — attaches one already-stored, content-indexed document to an existing conversation and sets
        its sticky `documentScoped` flag TRUE (the one legal, privilege-reducing tool→fenced transition; audit-logged
        when a flip occurs). Validates the document is owned + live + indexed + within the 5-document cap. Idempotent:
        attaching an already-attached document is a 200. A foreign / unknown conversation or document maps to 404.
        Module-gated on `inboundDocuments`; rate-limited. Auth via cookie or Bearer."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Conversation id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachAttachmentCreateRequest"
      responses:
        "200":
          description: The refreshed live attachment set + the fenced flag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachAttachmentsResponse"
        "401": *a1
        "404":
          description: Conversation or document not found / not owned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/insights/chat/{id}/attachments/{documentId}:
    delete:
      tags:
        - Insights
      summary: Detach a document from a coach conversation
      description: v1.29.x (S7) — removes the document from the conversation. The conversation stays FENCED (the sticky flag
        is never cleared — a thread whose history may contain document-derived text must never regain the tool loop).
        Detaching the last document leaves a fenced conversation with zero attachments. A missing row / foreign
        conversation maps to 404. Module-gated on `inboundDocuments`; rate-limited. Auth via cookie or Bearer.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Conversation id.
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          description: The attached document's id.
      responses:
        "200":
          description: The refreshed live attachment set + the fenced flag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachAttachmentsResponseDetach"
        "401": *a1
        "404":
          description: Attachment or conversation not found / not owned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
