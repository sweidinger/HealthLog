              maximum: 9007199254740991
            minWeeksPerSide:
              type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            markers:
              type: object
              properties:
                start:
                  anyOf:
                    - type: string
                    - type: "null"
                startSource:
                  anyOf:
                    - type: string
                      enum:
                        - startsOn
