        - error
      type: object
    DeviceRegisterRequest:
      description: Native device registration. Re-registering an APNs token belonging to another user returns 409
        (cross-user-hijack guard).
      properties:
        apnsEnvironment:
          description: Gateway the iOS client received `apnsToken` from. Server never auto-detects.
          enum:
            - sandbox
            - production
          type: string
        apnsToken:
          description: Hex-encoded APNs device token. Must be paired with `apnsEnvironment`.
          maxLength: 256
          minLength: 8
          pattern: ^[A-Fa-f0-9]+$
          type: string
        appVersion:
          maxLength: 32
          minLength: 1
          type: string
        bundleId:
          maxLength: 128
          minLength: 1
          type: string
        locale:
          maxLength: 16
          minLength: 2
          type: string
        model:
          maxLength: 64
          minLength: 1
          type: string
        token:
          description: Generic device identifier (legacy; APNs token below).
          maxLength: 512
          minLength: 8
          pattern: ^[A-Za-z0-9+/=._:-]+$
          type: string
      required:
        - token
        - bundleId
      type: object
    DeviceRegisterResponse:
      additionalProperties: false
      properties:
        data:
          additionalProperties: false
          properties:
            id:
              type: string
          required:
            - id
          type: object
        error:
          type: "null"
        meta:
          additionalProperties: false
          properties:
            requestId:
              type: string
          type: object
      required:
        - data
        - error
      type: object
    ErrorEnvelope:
      additionalProperties: false
      description: "Standard error response: data is null, error is human prose."
      properties:
        data:
          type: "null"
        error:
          type: string
        meta:
          additionalProperties: false
          properties:
            errorCode:
              type: string
            requestId:
              type: string
          type: object
      required:
        - data
        - error
      type: object
