            properties:
              id:
                type: string
                enum:
                  - wellness-scores
                  - daily-briefing
                  - vitals
                  - trends
                  - period-review
                  - cycle-summary
                  - signals
                  - rhythm-events
                  - health-status
                  - breathing
                  - labs-changes
                  - ecg
              visible:
                type: boolean
              order:
                type: integer
                minimum: 0
                maximum: 99
            required:
