      summary: File a bug report (creates a GitHub issue when configured)
      operationId: submitBugReport
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BugReportInput' }
      responses:
        '200':
          description: Issue created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
