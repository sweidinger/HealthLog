    SleepRhythmResource:
      type: object
      properties:
        sleepDebt:
          type: object
          properties:
            state:
              type: string
              enum:
                - partial
                - ready
              description: "`partial` until enough tracked nights exist (calm 'still learning'); `ready` once the rolling window can
                assert a cumulative debt."
            debtMinutes:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: Cumulative sleep debt over the window, in minutes, after caps.
            needMinutes:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: Age-based sleep need (minutes) used for the per-night deficit.
            nightsCounted:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            windowNights:
              type: integer
              exclusiveMinimum: 0
              maximum: 9007199254740991
              description: Rolling window length in nights.
            nightsUntilReady:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: Nights still needed before the debt is asserted (0 when ready).
            source:
              type: string
              enum:
                - MANUAL
                - WITHINGS
                - IMPORT
                - APPLE_HEALTH
                - COMPUTED
                - WHOOP
                - FITBIT
                - NIGHTSCOUT
                - POLAR
                - OURA
                - TELEGRAM
                - MCP
                - GOOGLE_HEALTH
                - STRAVA
              description: v1.25.0 — the active source the debt is resolved FROM, picked off the user's `sleepDebt` source ladder.
                `COMPUTED` is HealthLog's own rolling-balance estimate (the only producer today); a provider value would
                be a device-native debt. Clients explain the figure when it is `COMPUTED`.
          required:
            - state
            - debtMinutes
            - needMinutes
            - nightsCounted
            - windowNights
            - nightsUntilReady
            - source
          additionalProperties: false
        chronotype:
          type: object
          properties:
            state:
              type: string
              enum:
                - learning
                - ready
              description: "`learning` until enough free-day nights exist (no band asserted); `ready` once the free-day sample is
                large enough."
            msfMinutes:
              anyOf:
                - type: number
                - type: "null"
              description: Mid-sleep on free days (minutes-of-day), null while learning.
            msfScMinutes:
              anyOf:
                - type: number
                - type: "null"
              description: Sleep-debt-corrected mid-sleep on free days (MSFsc, minutes-of-day), null while learning.
            band:
              anyOf:
                - type: string
                  enum:
                    - extreme_early
                    - early
                    - intermediate
                    - late
                    - extreme_late
                - type: "null"
              description: MCTQ chronotype band off MSFsc, null while learning.
            socialJetlagMinutes:
              anyOf:
                - type: number
                - type: "null"
              description: Social jetlag = circular |MSF_work − MSF_free| in minutes, null when one side is missing.
            freeNightsCounted:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            workNightsCounted:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            freeNightsUntilReady:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: Free-day nights still needed before a band is asserted.
          required:
            - state
            - msfMinutes
            - msfScMinutes
            - band
            - socialJetlagMinutes
            - freeNightsCounted
            - workNightsCounted
            - freeNightsUntilReady
          additionalProperties: false
        averagePerNight:
          type: object
          properties:
            state:
              type: string
              enum:
                - partial
                - ready
            averageMinutes:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: Mean asleep minutes per scorable night (0 while partial).
            nightsCounted:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            nightsUntilReady:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: Scorable nights still needed before the average is asserted.
          required:
            - state
            - averageMinutes
            - nightsCounted
            - nightsUntilReady
          additionalProperties: false
      required:
        - sleepDebt
        - chronotype
        - averagePerNight
      additionalProperties: false
      description: "Server-authoritative sleep-rhythm read: cumulative sleep debt over the rolling window + MCTQ chronotype
        (MSF/MSFsc band, social jetlag). Free vs work nights default to weekend = free in the user's timezone (no work
        calendar). A view over existing per-stage SLEEP_DURATION rows — no schema, no new type."
