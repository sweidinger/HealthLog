        - error
      additionalProperties: false
    MedicationCadenceResponse:
      type: object
      properties:
        windowDays:
          type: integer
          exclusiveMinimum: 0
          maximum: 9007199254740991
        anchorIso:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        next:
          anyOf:
            - type: object
              properties:
                windowStart:
                  type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                windowEnd:
                  type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                scheduleIndex:
                  type: integer
                  minimum: 0
                  maximum: 9007199254740991
              required:
                - windowStart
                - windowEnd
                - scheduleIndex
              additionalProperties: false
            - type: "null"
        chips:
          $ref: "#/components/schemas/MedicationCadenceChips"
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/MedicationCadenceTimelinePoint"
      required:
        - windowDays
        - anchorIso
        - next
        - chips
        - timeline
      additionalProperties: false
      description: Cadence + compliance read for a single medication. `next` is the upcoming-dose envelope (null when the
        course has ended or the rolling clock has no pinning intake yet); `timeline` walks the requested `windowDays`
        worth of slots in ascending time order.
    MedicationCadenceChips:
      type: object
      properties:
        adherenceRate:
          type: number
        streakDays:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        expectedSlots:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        actualDoses:
          type: integer
          minimum: 0
          maximum: 9007199254740991
      required:
        - adherenceRate
        - streakDays
        - expectedSlots
        - actualDoses
      additionalProperties: false
      description: Four compliance summary values for the medication detail page chip row.
    MedicationCadenceTimelinePoint:
      type: object
      properties:
        day:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        windowStart:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        windowEnd:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        scheduleIndex:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        status:
          type: string
      required:
        - day
        - windowStart
        - windowEnd
        - scheduleIndex
        - status
