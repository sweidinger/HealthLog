              minimum: 0
              maximum: 100
            taken:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            expected:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: v1.15.9 rate denominator over the long window (`taken + missed`).
            missed:
              type: integer
              minimum: 0
              maximum: 9007199254740991
