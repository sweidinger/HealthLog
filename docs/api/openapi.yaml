        - aiAvailable
        - managedBy
        - hasAnthropicKey
        - anthropicKeyPreview
        - hasLocalKey
        - hasOpenaiKey
        - openaiKeyPreview
        - responseTimeoutSeconds
        - ocrEnabled
        - ocrProvider
        - ocrModel
        - ocrBaseUrl
        - hasOcrKey
        - ocrKeyPreview
