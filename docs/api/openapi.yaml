        - WHO5_SCORE
        - SCI_SCORE
      description: Auto-resolve target metric (vitals + body-composition family + the PHQ-9 / GAD-7 / WHO-5 / SCI screenings).
        BP resolves on BLOOD_PRESSURE_SYS (the SYS row is the 'a BP was measured' sentinel); a screening reminder
        resolves on the server-written *_SCORE row when a check-in completes. Omit for a free-text Vorsorge that
        resolves only on a manual satisfy or a matching lab result.
    MeasurementReminderUpdate:
