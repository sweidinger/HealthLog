      summary: Update per-user notification preferences
      description: 'Deep-merges the supplied partial shape over the persisted row — a PATCH touching only one category leaves
        the siblings intact. Always returns the fully-resolved next state so clients can hard-set their optimistic
        update. `medication.clientManaged: true` (or `deliveryDefault: "client"`) suppresses server-side
        MEDICATION_REMINDER APNs; `medication.lowStockRunwayDays` (1–60, nullable, default 7) tunes the low-stock alert
