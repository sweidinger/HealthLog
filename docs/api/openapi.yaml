          name: id
          schema:
            type: string
          required: true
        - in: query
          name: date
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            maximum: 9007199254740991
        - in: query
          name: sortDir
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        "200":
          description: "With `date`: the day-log or null. Without `date`: the paged day-log list."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIllnessDayLogEnvelope"
        "401": *a1
        "404": *a11
        "422": *a3
        "429": *a4
    post:
      tags:
        - Illness
      summary: Upsert an episode day-log (v1.18.1)
      description: "Upserts the day's symptom / functional-impact / fever timeline row on `(episodeId, date)`: 201 on insert,
        200 on update. The parent episode must be owned + live; the optional note is encrypted at rest. Audits as
        `illness.day-log.upsert`. Born-gated."
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
