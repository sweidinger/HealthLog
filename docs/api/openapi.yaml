        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  minItems: 1
                  maxItems: 100
                  type: array
                  items:
                    type: string
                    minLength: 1
                    maxLength: 40
                action:
                  type: string
                  enum:
                    - setKind
                    - linkEpisode
                    - unlinkEpisode
                    - delete
                    - restore
                kind:
                  type: string
                  enum:
                    - DOCTOR_REPORT
                    - DISCHARGE_LETTER
                    - LAB_RESULT
                    - IMAGING
                    - PRESCRIPTION
                    - REFERRAL
                    - INSURANCE
                    - VACCINATION
                    - OTHER
                episodeId:
                  type: string
                  minLength: 1
                  maxLength: 40
              required:
                - ids
                - action
      responses:
        "200":
          description: Per-id outcomes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentBulkEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
