      summary: Read per-user notification preferences
      description: Returns the fully-resolved preferences with the documented defaults filled in. A null persisted row
        resolves to the defaults (server-managed reminders, low-stock threshold 7 days, mood reminder 22:00, Coach
        nudges on).
