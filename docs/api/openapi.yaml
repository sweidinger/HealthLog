    AnalyticsRangeResponse:
      type: object
      properties:
        range:
          type: string
          enum:
            - 7d
            - 30d
            - 90d
            - 1y
          description: The range that was read (echoes the request).
        windowDays:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Trailing-window length in days for the chosen range.
        granularity:
          type: string
          description: Rollup granularity the read resolved against (`DAY` / `WEEK` / `MONTH` / `YEAR`, or `none` on a coverage
            miss).
        current:
          description: Aggregate over the current window `[now-N, now)`.
          $ref: "#/components/schemas/AnalyticsWindowAggregate"
        previous:
          description: Aggregate over the previous comparable window `[now-2N, now-N)`.
          $ref: "#/components/schemas/AnalyticsWindowAggregate"
        delta:
          anyOf:
            - type: number
            - type: "null"
          description: "`current.mean - previous.mean`; null when either window has no data (never a misleading 0)."
        deltaPct:
          anyOf:
            - type: number
            - type: "null"
          description: "`delta / previous.mean` as a fraction (0.03 = +3 %); null when the prior window has no / zero mean (no
            divide-by-zero). The client shows 'no prior-period data' in that case."
      required:
        - range
        - windowDays
        - granularity
        - current
        - previous
        - delta
        - deltaPct
      additionalProperties: false
      description: Single-metric period-over-period aggregate. Reads the current and previous comparable windows from the WMY
        rollup tier and composes a count-weighted-mean delta. `count/min/max/mean/sum` are linearly composable across
        buckets; SD/slope/r² are intentionally excluded (not composable).
