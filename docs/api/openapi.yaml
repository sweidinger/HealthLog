        `briefingStale: true`. `layoutCatalogue` (full 27-id widget catalogue) and `metricStates` (latest reading per
        metric, keyed by iOS `MetricKind` raw value) are additive cold-launch seeds for the native client; both derive
        in-process from data already fetched, adding no DB round-trip."
