        n:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Draws paired with a usable contemporaneous outcome window.
        r:
          type: number
          description: Pearson r over (draw value, contemporaneous outcome window-mean).
        pValue:
          type: number
          description: Two-sided exact Student-t p-value (< 0.05).
        qValue:
          type: number
          description: Benjamini-Hochberg FDR-adjusted q-value (≤ the surface threshold).
        windowDays:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Trailing days each draw's outcome window spanned.
        interpretation:
