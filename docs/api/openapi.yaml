  /api/documents/inbound:
    get:
      tags:
        - Documents
      summary: List stored documents
      description: The caller's stored documents with title/filename search, category filter, a `documentDate` range, sort,
        and keyset pagination. Owner-scoped; gated on the opt-in `inboundDocuments` module.
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
          description: Case-insensitive search over title + filename.
        - name: kind
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              enum:
                - DOCTOR_REPORT
                - DISCHARGE_LETTER
                - LAB_RESULT
                - IMAGING
                - PRESCRIPTION
                - REFERRAL
                - INSURANCE
                - VACCINATION
                - OTHER
          description: Category filter — OR inside the facet. Repeat the parameter (or send a comma-separated value).
        - name: episodeId
          in: query
          required: false
          schema:
            type: string
          description: Only documents linked to this illness/condition episode.
        - name: year
          in: query
          required: false
          schema:
            type: integer
            minimum: 1900
            maximum: 9999
          description: Only documents whose filing date falls in this calendar year (UTC). Takes precedence over from/to.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Inclusive lower bound on documentDate (YYYY-MM-DD).
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Inclusive upper bound on documentDate (YYYY-MM-DD).
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum:
              - documentDate
              - createdAt
              - title
            default: documentDate
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Keyset cursor (the `nextCursor` from a prior page).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: A page of documents.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboundDocumentListEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
    post:
      tags:
        - Documents
      summary: Store a document (no extraction)
      description: "STORE-ONLY upload. Stores the raw document ENCRYPTED at rest with `status: STORED` and runs NO extraction
        — provider-free, no AI consent / budget / egress. A file is always filable, even with no document-scan provider
        configured. `multipart/form-data`: a `file` plus optional `title`, `kind`, `documentDate` (YYYY-MM-DD), and
        repeated `episodeIds` form fields (pre-link to the caller's illness/condition episodes). Accepted types
        (magic-byte sniffed, never the wire Content-Type): PDF/JPEG/PNG/WebP/GIF render inline; Office
        (docx/xlsx/pptx/doc/xls/ppt), text/CSV/Markdown/RTF, TIFF, HEIC/HEIF, XML/JSON are stored verbatim and served
        download-only. HEIC is stored as-is but attachment-only — prefer transcoding to JPEG client-side for inline
        preview parity. Error contract: `413` with `meta.reason = \"fileTooLarge\"` (+ `maxFileBytes`) or
        `\"quotaExceeded\"` (+ `quotaBytes`, `usedBytes`); `415` with `meta.reason = \"unsupportedType\"`. A same-user
        duplicate (same bytes) returns 200 + `meta.duplicate: true` with the existing row — not an error.
        `Idempotency-Key` honoured. Read `GET /api/documents/inbound/usage` for the effective limits before offering an
        upload. AI extraction is a separate opt-in action — see `POST /api/documents/inbound/{id}/extract`."
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The document. Validated by magic-byte MIME sniff, not the wire Content-Type.
                title:
                  description: Optional user label.
                  type: string
                kind:
                  description: Optional category.
                  type: string
                  enum:
                    - DOCTOR_REPORT
                    - DISCHARGE_LETTER
                    - LAB_RESULT
                    - IMAGING
                    - PRESCRIPTION
                    - REFERRAL
                    - INSURANCE
                    - VACCINATION
                    - OTHER
                documentDate:
                  description: Optional user filing date (YYYY-MM-DD). Defaults to the upload day when omitted so the library
                    sort/filter/display stay aligned.
                  type: string
                episodeIds:
                  description: Optional condition pre-links (repeat the field per id). Every id must be a live episode of the caller.
                  type: array
                  items:
                    type: string
              required:
                - file
      responses:
        "200":
          description: "Duplicate — the same bytes are already stored: the existing row, with `meta.duplicate: true` at the
            envelope level."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboundDocumentEnvelope"
        "201":
          description: The stored document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboundDocumentEnvelope"
        "401": *a1
        "413":
          description: "Too large: `meta.reason` is `fileTooLarge` (with `maxFileBytes`) or `quotaExceeded` (with `quotaBytes` +
            `usedBytes`)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          description: Unsupported or unidentifiable type (`meta.reason = "unsupportedType"`). Executables, HTML/SVG, and generic
            archives are always refused.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/documents/inbound/capability:
    get:
      tags:
        - Documents
      summary: Probe document-AI availability + egress
      description: "Cheap probe (no provider call) the vault uses to decide the AI transport and whether to warn before a read
        leaves the machine. Resolved over the DOCUMENT provider order (local-first, ChatGPT-subscription OAuth last), so
        `mode` / `pdfSupported` / `egress` match exactly what the document AI routes do. `egress` is vendor-blind:
        `\"local\"` (a self-hosted model — the document never leaves the operator's machine) or `\"external\"` (a
        third-party AI service). The vault shows a per-egress notice before any external document read; sending a
        document to any external provider also requires an active AI-consent receipt."
      responses:
        "200":
          description: Document-AI capability flags + egress class.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentAiCapabilityEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
