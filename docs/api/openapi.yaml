        schema version. Tile ids are a closed enum: the canonical ids are English (matching the routed
        `/insights/<slug>` sub-pages). The legacy German ids (blutdruck, puls, sauerstoff, koerpertemperatur, gewicht,
        aktive-energie, schlaf, ruhepuls, stimmung, medikamente) remain accepted on input for backward compatibility and
        are normalised to their English equivalents before persisting; GET responses always carry the canonical English
        ids. The legacy ids are deprecated and will be removed in a future major version."
