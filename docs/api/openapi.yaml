        "200":
          description: Custom-metric catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCustomMetricsEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
    post:
      tags:
        - Custom metrics
      summary: Define a custom metric
      description: Creates a user-scoped custom metric. Re-creating a name that was previously soft-deleted revives that
        definition. Audits as `customMetric.create`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 120
                unit:
                  type: string
                  minLength: 1
                  maxLength: 40
                targetLow:
                  type: number
                targetHigh:
                  type: number
                decimals:
                  type: integer
                  minimum: 0
                  maximum: 6
                description:
                  type: string
                  maxLength: 2000
              required:
                - name
                - unit
      responses:
        "201":
          description: Created custom metric.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomMetricResponse"
        "401": *a1
        "409": &a15
          description: A custom metric with this name already exists for the caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/custom-metrics/{id}:
    get:
      tags:
        - Custom metrics
      summary: Fetch a single custom metric
      description: Returns the custom-metric definition. Cross-user rows surface as 404.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Custom-metric detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCustomMetricResponse"
        "401": *a1
        "404": &a14
          description: Custom metric not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
    patch:
      tags:
        - Custom metrics
      summary: Edit a custom metric
      description: Partial edit; omitted fields are untouched, an explicit null clears a target bound / decimals /
        description. Audits as `customMetric.update`.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 120
                unit:
                  type: string
                  minLength: 1
                  maxLength: 40
                targetLow:
                  anyOf:
                    - type: number
                    - type: "null"
                targetHigh:
                  anyOf:
                    - type: number
                    - type: "null"
                decimals:
                  anyOf:
                    - type: integer
                      minimum: 0
                      maximum: 6
                    - type: "null"
                description:
                  anyOf:
                    - type: string
                      maxLength: 2000
                    - type: "null"
      responses:
        "200":
          description: Updated custom metric.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCustomMetricResponse"
        "401": *a1
        "404": *a14
        "409": *a15
        "422": *a3
        "429": *a4
    delete:
      tags:
        - Custom metrics
      summary: Delete a custom metric
