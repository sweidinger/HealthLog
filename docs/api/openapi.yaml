              properties:
                date:
                  type: string
                  pattern: ^\d{4}-\d{2}-\d{2}$
                functionalImpact:
                  anyOf:
                    - type: integer
                      minimum: 0
                      maximum: 3
                    - type: "null"
                feverC:
                  anyOf:
                    - type: number
