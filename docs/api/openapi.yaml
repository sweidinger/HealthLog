      description: Create a Vorsorge reminder. Exactly one of intervalDays (rolling, every N days) or rrule (RFC-5545, e.g.
        FREQ=YEARLY) is required. measurementType enables auto-resolve from an incoming reading; omit it for a free-text
        checklist reminder.
    MeasurementReminderType:
      type: string
      enum:
        - WEIGHT
        - BLOOD_PRESSURE_SYS
        - PULSE
        - BLOOD_GLUCOSE
        - OXYGEN_SATURATION
        - BODY_TEMPERATURE
        - BODY_FAT
        - FAT_MASS
        - FAT_FREE_MASS
        - MUSCLE_MASS
        - LEAN_BODY_MASS
        - BONE_MASS
