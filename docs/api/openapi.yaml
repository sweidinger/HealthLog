                $ref: "#/components/schemas/DeleteCoachAboutMeQuestionsResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/coach/plans:
    get:
      tags:
        - Insights
      summary: List the caller's Coach goal / if-then plans
      description: v1.21.3 (B1) — returns the durable plans the Coach has proposed for the caller, newest first, each
        decrypted on the fly. A plan is an "if-then" implementation intention tied to one metric, with an optional
        target. The Coach extractor writes a plan as `proposed`; only `PATCH /api/coach/plans/{id}` activates it. Pass
        `?status=` to filter to one lifecycle status, or `?scope=` for a named group (open = proposed + active +
        review_due, past = met + abandoned + reviewed, all = every non-deleted plan) — mutually exclusive. Both omitted
        returns the non-terminal set (proposed + active). Coach-gated (`requireModuleEnabled("coach")`); a disabled
        surface 403s. Auth via cookie or Bearer; the owner is always narrowed from the session, never the body.
        Undecryptable rows are omitted rather than failing the read.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - proposed
              - active
              - met
              - abandoned
              - review_due
              - reviewed
          description: Filter to a single lifecycle status. Mutually exclusive with `scope`. Omit both for the non-terminal set
            (proposed + active).
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum:
              - open
              - past
              - all
          description: "Named status group: open (proposed + active + review_due), past (met + abandoned + reviewed), or all.
            Mutually exclusive with `status`."
      responses:
        "200":
          description: The caller's plans.
          content:
            application/json:
              schema:
