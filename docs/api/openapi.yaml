          exclusiveMinimum: 0
          maximum: 9007199254740991
        expectedShort:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        expectedLong:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        minStableDoses:
          type: integer
          minimum: 0
          maximum: 9007199254740991
