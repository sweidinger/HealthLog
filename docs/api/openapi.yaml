        provenance:
          $ref: "#/components/schemas/DerivedProvenance"
        reason:
          anyOf:
            - type: string
            - type: "null"
          description: Why the value could not be produced; null when status is 'ok'.
        assessment:
          anyOf:
            - $ref: "#/components/schemas/DerivedAssessment"
            - type: "null"
          description: "v1.13.2 — short 'why is this score what it is' explanation, keyed to the SAME requested id (only for the
            per-score ids READINESS, SLEEP_SCORE, RECOVERY_SCORE, STRAIN_SCORE, STRESS_SCORE). Null for any other metric
            and whenever status !== 'ok'. Always non-empty when present: a deterministic text fills it (so provider-less
            accounts + the demo always get one) and warmer AI prose overrides it once cached."
      required:
