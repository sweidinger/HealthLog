              type: string
            id:
              type: string
          required:
            - id
            - createdAt
          type: object
        error:
          type: "null"
        meta:
          additionalProperties: false
          properties:
            requestId:
              type: string
          type: object
      required:
        - data
        - error
      type: object
    CreateMeasurementResponse:
      additionalProperties: false
      properties:
