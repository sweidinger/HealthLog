      summary: Download the full backup as a passphrase-encrypted archive
      description: v1.23. Same restore-compatible payload as the plaintext full backup, sealed into an `HLX1` archive
        (Argon2id-derived key + AES-256-GCM) under the supplied `passphrase`. Returns `application/octet-stream` (a
        `.hlx` file). When the account has a second factor enrolled, the call is step-up gated (`requireFreshMfa`,
        cookie-only) and returns 401 `auth.stepup.required` without a fresh factor; single-factor accounts use a normal
        session or Bearer. Shared `export:<userId>` rate bucket (10/h). The passphrase is never stored — a forgotten
        passphrase makes the archive unrecoverable.
      requestBody:
        required: true
        content:
