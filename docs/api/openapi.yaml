                        t:
                          type: string
                        value:
                          type: number
                        status:
                          type: string
                          enum:
                            - in-range
                            - below
                            - above
                            - unknown
                      required:
                        - t
                        - value
                      additionalProperties: false
                  beforeAfter:
                    type: object
                    properties:
                      present:
                        type: boolean
                      reason:
                        type: string
                        enum:
                          - insufficient_before
                          - insufficient_after
                          - no_start
                          - no_data
                      before:
                        type: object
                        properties:
                          mean:
                            type: number
                          count:
                            type: integer
                            minimum: -9007199254740991
                            maximum: 9007199254740991
                          from:
                            type: string
                          to:
                            type: string
                        required:
                          - mean
                          - count
                          - from
                          - to
                        additionalProperties: false
                      after:
                        type: object
                        properties:
                          mean:
                            type: number
                          count:
                            type: integer
                            minimum: -9007199254740991
                            maximum: 9007199254740991
                          from:
                            type: string
                          to:
                            type: string
                        required:
                          - mean
                          - count
                          - from
                          - to
                        additionalProperties: false
                      delta:
                        anyOf:
                          - type: object
                            properties:
                              mean:
                                type: number
                              pct:
                                anyOf:
                                  - type: number
                                  - type: "null"
                            required:
                              - mean
                              - pct
                            additionalProperties: false
                          - type: "null"
                    required:
                      - present
                    additionalProperties: false
                  levelShift:
                    anyOf:
                      - type: object
                        properties:
                          present:
                            type: boolean
                          at:
