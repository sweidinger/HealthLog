                - aboutMe
      responses:
        "200":
          description: The effective (trimmed) state echoed back plus the freshly derived pending questions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutCoachAboutMeResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/coach/about-me/questions:
    get:
      tags:
        - Insights
      summary: Read the pending clarifying questions
      description: v1.16.0 — the up-to-3 clarifying questions derived after the last self-context save. The Coach composer
        renders them as tappable suggestion chips. Stored encrypted; an undecryptable payload reads as an empty list
        (fail closed).
      responses:
