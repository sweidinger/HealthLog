          schema:
            type: string
      responses:
        "200":
          description: Discarded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboundDiscardEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/documents/inbound/{id}/restore:
    post:
      tags:
        - Documents
      summary: Restore a discarded document
      description: Clears the soft-delete tombstone within the 30-day undo grace. 409 when the tombstone is already purged
        (the undo window is over) or when an identical live document blocks the restore (`meta.reason =
        "duplicateExists"`). Restoring an already-live document is a no-op success.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The restored document + its staged facts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboundRestoreEnvelope"
        "401": *a1
        "409":
          description: "Not restorable: purged past the grace window, or an identical live document exists."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/documents/inbound/{id}/original:
    get:
      tags:
        - Documents
      summary: View / download the original document
      description: "Decrypts and serves the raw uploaded document (the bytes stored encrypted at rest under
        `InboundDocument.contentEncrypted`). Owner-scoped + gated on the opt-in `inboundDocuments` module. Serving
        posture follows the document's `servingClass`: inline types (PDF/JPEG/PNG/WebP/GIF) come with their true
        Content-Type, `Content-Disposition: inline`, `nosniff`, and a `Content-Security-Policy: sandbox` header;
        attachment types (Office/text/TIFF/HEIC/XML/JSON) ALWAYS come as `application/octet-stream` +
        `Content-Disposition: attachment` + `nosniff` — never inline. A non-ASCII filename is carried via RFC 5987
        `filename*`. Fails closed (500) on a decrypt error — it never returns the ciphertext."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The decrypted original document bytes. Inline types carry the stored MIME type; attachment types are served
            as application/octet-stream.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            image/*:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401": *a1
        "422": *a3
        "429": *a4
  /api/documents/inbound/{id}/thumbnail:
    get:
      tags:
        - Documents
      summary: View the document preview thumbnail
      description: "Decrypts and serves the document's small JPEG preview thumbnail (~320px long edge), rendered in the
        background from the original and stored encrypted at rest under `DocumentThumbnail.thumbnailEncrypted`.
        Owner-scoped + gated on the opt-in `inboundDocuments` module. Always `Content-Type: image/jpeg` + `nosniff` +
        `Cache-Control: private, no-store`; loaded as an `<img>` subresource. 404 when no thumbnail exists yet (freshly
        uploaded / still rendering / unsupported type) — the caller shows a placeholder. Fails closed (500) on a decrypt
        error — it never returns the ciphertext."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The decrypted JPEG preview thumbnail bytes.
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "401": *a1
        "422": *a3
        "429": *a4
  /api/documents/inbound/{id}/extract:
    post:
      tags:
        - Documents
      summary: Extract facts from a stored document
      description: "Optional AI enhancement on an already-stored document. Runs the dedicated OCR/vision provider over the
        stored original and stages STRUCTURED FACTS for review. AI-consent / rate / budget gated. With no provider
        configured this returns 422 (`documents.inbound.providerUnsupported`) — the stored document is untouched, only
        the enhancement fails. Two modes by content-type: VISION (empty body) decrypts and scans the stored original
        (PDF needs an Anthropic vision provider); TEXT (`application/json`, opt-in local OCR) `{ mode: \"text\", text }`
        structures browser-OCR'd text. Extraction reproduces what the document states — it never interprets. Nothing
        reaches the structured stores here; the confirm route is the only write path."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InboundTextExtractRequest"
      responses:
        "200":
          description: The document with its newly staged facts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboundExtractEnvelope"
        "401": *a1
        "409":
          description: "Re-extraction refused: at least one fact on this document is already APPROVED. `meta.errorCode` =
            `documents.inbound.alreadyPartlyConfirmed`. Re-extracting would sever committed-record provenance and
            duplicate committed records, so the user must finish reviewing or discard the document first."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/documents/inbound/{id}/suggest:
    post:
      tags:
        - Documents
      summary: Suggest filing metadata (drafts only)
      description: "Optional AI assist on an already-stored document. Runs ONE provider call over the stored original (VISION,
        empty body) or browser-OCR'd text (TEXT, `application/json` `{ mode: \"text\", text }`, opt-in local OCR) and
        returns a `{ title, kind, documentDate }` DRAFT for the edit form. AI-consent / rate / budget gated (shares the
        6/hour extract bucket). WRITES NOTHING — never stages facts, never flips status; the user reviews and saves. 422
        (`documents.inbound.providerUnsupported`) with no provider configured. Never interprets or diagnoses; the title
        is a neutral filing label."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  const: text
                text:
                  type: string
                kind:
                  type: string
                  enum:
                    - DOCTOR_REPORT
                    - DISCHARGE_LETTER
                    - LAB_RESULT
                    - IMAGING
                    - PRESCRIPTION
                    - REFERRAL
                    - INSURANCE
                    - VACCINATION
                    - OTHER
              required:
                - mode
                - text
      responses:
        "200":
          description: The filing-metadata suggestion (drafts).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSuggestEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/documents/inbound/{id}/summary:
    post:
      tags:
        - Documents
      summary: Summarise or transcribe a document (session-only)
      description: 'On-demand, SESSION-ONLY description of a stored document. `?mode=summary` (default) returns a short
        plain-language summary of WHAT the document is; `?mode=text` returns its raw transcribed text. The result is
        transient — nothing is persisted except the AI-budget ledger + audit log; it never reaches coach memory,
        snapshots, the structured stores, or the search index. The summary is descriptive only and never a diagnosis.
        Same VISION (empty body) / TEXT (`application/json` `{ mode: "text", text }`, opt-in local OCR) dispatch as
        extract. AI-consent / rate / budget gated. 422 with no provider.'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum:
              - summary
              - text
            default: summary
          description: "`summary` (plain-language description) or `text` (raw)."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  const: text
                text:
                  type: string
                kind:
                  type: string
                  enum:
                    - DOCTOR_REPORT
                    - DISCHARGE_LETTER
                    - LAB_RESULT
                    - IMAGING
                    - PRESCRIPTION
                    - REFERRAL
                    - INSURANCE
                    - VACCINATION
                    - OTHER
              required:
                - mode
                - text
      responses:
        "200":
          description: The session-only summary (`{ summary }`) or extracted text (`{ text }`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSummaryEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/documents/inbound/{id}/index:
    post:
      tags:
        - Documents
      summary: Build / refresh the content-search index
      description: "Populates or refreshes one document's content-search index so search matches INSIDE its body. VISION
        (empty body) decrypts the stored original and runs one provider transcription (AI-consent / rate / budget
        gated); TEXT (`application/json` `{ mode: \"text\", text }`, opt-in local OCR) indexes browser-OCR'd text with
        no provider egress. Persists ONLY AES-256-GCM ciphertext of the text plus opaque HMAC token hashes — no
        plaintext body, no plaintext token. Gated on the existing AI consent (no separate per-user toggle). Idempotent;
        re-indexing overwrites in place."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  const: text
                text:
                  type: string
                kind:
                  type: string
                  enum:
                    - DOCTOR_REPORT
                    - DISCHARGE_LETTER
                    - LAB_RESULT
                    - IMAGING
                    - PRESCRIPTION
                    - REFERRAL
                    - INSURANCE
                    - VACCINATION
                    - OTHER
              required:
                - mode
                - text
      responses:
        "200":
          description: The document was indexed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentIndexEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/documents/inbound/{id}/chat:
    post:
      tags:
        - Documents
      summary: Chat about a document (streaming reply)
      description: "v1.27.33 — sends a user turn and streams a grounded prose reply about ONE stored document as Server-Sent
        Events (`text/event-stream`, not JSON: one `data: <json>\\n\\n` frame per event). Frame `type` is `token` (a
        chunk of reply text), `done` (`{ type, conversationId, messageId, usage? }`), or `error` (`{ type, code, message
        }`); HTTP status is 200 even for a provider/refusal outcome (dispatch on the `error` frame). The reply is
        grounded ONLY in the document's indexed text — NO health snapshot, NO tools, NO other document. The document
        text is fenced as untrusted DATA (prompt-injection defence); the inbound message + every prior turn are
        injection-screened and the reply is dose/risk-screened + numerically grounded against the document's own
        figures. Available only for a content-indexed document (422 `documents.inbound.notIndexed` otherwise).
        AI-consent-gated (403 `consent.ai.required` for an external provider), budget- and rate-limited. Omitting
        `conversationId` starts a new thread. Renders as plain text on the client (no markdown). Auth via cookie or
        Bearer."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentChatRequest"
      responses:
        "200":
          description: Server-Sent Events stream of `token` / `done` / `error` frames.
          content:
            text/event-stream:
              schema:
                type: string
                description: "SSE frames: `data: <json>\\n\\n`. See the operation description for the per-`type` frame shapes."
        "401": *a1
        "403":
          description: "AI consent required for an external provider (`errorCode: consent.ai.required`)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
    get:
      tags:
        - Documents
      summary: Read a document's chat history
      description: v1.27.33 — with `conversationId`, returns that one thread's messages (decrypted server-side, oldest-first,
        document- and owner-scoped); without it, the paginated list of the document's chat threads for the sheet's rail.
        A foreign / unknown id maps to 404 (never 403). Auth via cookie or Bearer.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: query
          required: false
          schema:
            type: string
          description: When set, returns that thread's messages.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: List pagination cursor (id of the last item).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Either the conversation detail (with `messages`) or the paginated conversation list for the document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentChatHistoryEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/documents/inbound/reindex:
    post:
      tags:
        - Documents
      summary: Index all documents for content search
      description: Enqueues a background job that content-indexes the caller's not-yet-indexed documents (one provider
        transcription each, bounded + resumable). Gated on the module, a configured vision provider (422
        `documents.inbound.providerUnsupported` otherwise), and the existing AI consent (403 otherwise). Returns
        immediately; the work runs off-request on the queue.
      responses:
        "200":
          description: Whether a backfill job was enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentReindexEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/documents/inbound/{id}/facts/{factId}:
    patch:
      tags:
        - Documents
      summary: Edit a staged fact before approval
      description: Corrects OCR / units / dates / codes on a pending fact. Clears `needsReview` (the values become
        user-asserted). The fact's resource type cannot change.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: factId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    factType:
                      type: string
                      const: CONDITION
                    label:
                      type: string
                      minLength: 1
                      maxLength: 300
                    code:
                      anyOf:
                        - type: string
                          maxLength: 64
                        - type: "null"
                    codeSystem:
                      anyOf:
                        - type: string
                          enum:
                            - SNOMED
                            - ICD10
                            - LOINC
                            - RXNORM
                            - ATC
                        - type: "null"
                    clinicalStatus:
                      anyOf:
                        - type: string
                          maxLength: 64
                        - type: "null"
                    verificationStatus:
                      anyOf:
                        - type: string
                          maxLength: 64
                        - type: "null"
                    onsetDate:
                      anyOf:
                        - type: string
                          pattern: ^\d{4}-\d{2}-\d{2}$
                        - type: "null"
                  required:
                    - factType
                    - label
                - type: object
                  properties:
                    factType:
                      type: string
                      const: OBSERVATION
                    label:
                      type: string
                      minLength: 1
                      maxLength: 300
                    code:
                      anyOf:
                        - type: string
                          maxLength: 64
                        - type: "null"
                    codeSystem:
                      anyOf:
                        - type: string
                          enum:
                            - SNOMED
                            - ICD10
                            - LOINC
                            - RXNORM
                            - ATC
                        - type: "null"
                    value:
                      anyOf:
                        - type: number
                        - type: "null"
                    valueText:
                      anyOf:
                        - type: string
                          maxLength: 300
                        - type: "null"
                    unit:
                      anyOf:
                        - type: string
                          maxLength: 80
                        - type: "null"
                    referenceLow:
                      anyOf:
                        - type: number
                        - type: "null"
                    referenceHigh:
                      anyOf:
                        - type: number
                        - type: "null"
                    effectiveDate:
                      anyOf:
                        - type: string
                          pattern: ^\d{4}-\d{2}-\d{2}$
                        - type: "null"
                  required:
                    - factType
                    - label
                - type: object
                  properties:
                    factType:
                      type: string
                      const: MEDICATION_STATEMENT
                    name:
                      type: string
                      minLength: 1
                      maxLength: 200
                    dose:
                      anyOf:
                        - type: string
                          maxLength: 120
                        - type: "null"
                    rxNormCode:
                      anyOf:
                        - type: string
                          maxLength: 20
                        - type: "null"
                    atcCode:
                      anyOf:
                        - type: string
                          maxLength: 16
                        - type: "null"
                    statusStated:
                      anyOf:
                        - type: string
                          maxLength: 64
                        - type: "null"
                    effectiveDate:
                      anyOf:
                        - type: string
                          pattern: ^\d{4}-\d{2}-\d{2}$
                        - type: "null"
                  required:
                    - factType
                    - name
              type: object
      responses:
        "200":
          description: The updated fact.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractedFactEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/documents/inbound/{id}/confirm:
    post:
      tags:
        - Documents
      summary: Confirm the review decisions
      description: The ONLY write path out of staging. Commits the user's approvals into the structured stores (labs /
        conditions / medications) and discards rejections. A low-confidence fact that was never edited cannot be
        approved (fail-closed). Idempotent (Idempotency-Key). Audits as `documents.inbound.confirm`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                decisions:
                  minItems: 1
                  maxItems: 120
                  type: array
                  items:
                    type: object
                    properties:
                      factId:
                        type: string
                        minLength: 1
                        maxLength: 40
                      action:
                        type: string
                        enum:
                          - approve
                          - reject
                    required:
                      - factId
                      - action
              required:
                - decisions
      responses:
        "200":
          description: Per-decision outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboundConfirmEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/custom-metrics:
    get:
      tags:
        - Custom metrics
      summary: List the caller's custom metrics
      description: Returns every custom metric the caller has defined, name-ordered, each with its latest logged value and
        total value count.
