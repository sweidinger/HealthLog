                $ref: "#/components/schemas/DeleteCustomMetricResponse"
        "401": *a1
        "404": *a14
        "422": *a3
        "429": *a4
  /api/custom-metrics/{id}/entries:
    get:
      tags:
        - Custom metrics
      summary: List a custom metric's logged values
      description: Offset-paginated value feed for one custom metric (the chart + history read). Cross-user / unknown metric
        ids surface as 404.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            maximum: 9007199254740991
        - in: query
