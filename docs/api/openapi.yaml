  /api/auth/me/modules:
    get:
      tags:
        - Auth
      summary: Read the resolved per-user module enable/disable map
      description: "Returns the fully-resolved `{ <moduleKey>: boolean }` map for every toggleable module. `cycle` reflects
        the cycle gate, `coach` reflects the resolved per-user opt-out + operator master flag, and the rest read the
        per-user disabled-allowlist (`modulePreferencesJson`). Default-on: a fresh account reads every module enabled.
        iOS/web read this to hide a whole module surface end-to-end."
      responses:
        "200":
          description: Resolved module map.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetModulesResponse"
        "401": *a1
        "422": *a3
        "429": *a4
    patch:
      tags:
        - Auth
      summary: Update per-user module enable/disable preferences
      description: Merges the supplied keys into the persisted disabled-allowlist (`modulePreferencesJson`) field-by-field — a
        PATCH touching only one module leaves the siblings intact. Refuses to disable a core module (`weight`,
        `bloodPressure`, `pulse`, `medications`) or any unknown key with a 422. `userId` is never accepted from the
        body. Always returns the fully-resolved next-state map so clients can hard-set their optimistic update.
        Rate-limit 60/min per user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModulePrefsPatchRequest"
      responses:
        "200":
          description: Resolved next-state module map echoed back.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchModulesResponse"
        "401": *a1
        "422": *a3
        "429": *a4
