        "401": *a1
        "422": *a3
        "429": *a4
    delete:
      tags:
        - Auth
      summary: Sign out everywhere else
      description: v1.23 — revokes every OTHER web session plus all native refresh tokens, keeping the caller's current
        session. API tokens are not touched (manage those under /settings/api-tokens).
      responses:
        "200":
          description: Other sessions revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignOutEverywhereEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
