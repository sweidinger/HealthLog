  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Email-or-username login (password)
      description: >-
        Browser callers receive a session cookie. Native callers (X-Client-Type: native or HealthLog-iOS UA prefix)
        additionally receive a paired access + refresh token.


        v1.23 — when the account has a confirmed second factor, the response carries no session/token. It returns HTTP
        200 with `data: null, error: null` and `meta.mfaRequired: true` plus a single-use `meta.mfaTicket` and the
        `meta.methods` list. The client must POST the ticket + a code to `/api/auth/mfa/verify` to obtain the token
        bundle. Accounts without MFA are unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 1
              required:
                - email
                - password
      responses:
        "200":
          description: Login succeeded (token bundle / cookie) — or a second factor is required (`meta.mfaRequired`).
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/LoginResponse"
                  - $ref: "#/components/schemas/MfaRequiredResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/auth/mfa/verify:
    post:
      tags:
        - Auth
      summary: Complete a second-factor login challenge
      description: Presents the `mfaTicket` from the login `meta.mfaRequired` response plus a TOTP or recovery code. On
        success returns the SAME token bundle / session the password path issues, with the session marked
        second-factor-verified. The ticket is single-use; wrong codes are throttled and the ticket is burned at the
        attempt cap.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifyRequest"
      responses:
        "200":
          description: Second factor verified — session + optional bearer issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaVerifyResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/auth/oidc/native/token:
    post:
      tags:
        - Auth
      summary: Exchange a native OIDC handoff code for the token bundle
      description: >-
        The cookie-less native leg of the OIDC SSO flow. The iOS app opens `GET
        /api/auth/oidc/login?client=native&code_challenge=<S256>` inside an `ASWebAuthenticationSession`; the callback
        returns a one-time handoff code on `healthlog://oidc-callback?code=hlh_…` (or an `mfa_ticket` when the account
        has a second factor, completed at /api/auth/mfa/verify). This endpoint exchanges the code + its PKCE
        `codeVerifier` for the SAME native bundle password login issues.


        Requires the native transport (no cookie, non-browser UA) — a browser is rejected. The code is single-use and
        expires in ~90 seconds; a replay of a consumed code revokes the pair the first exchange issued. A single generic
        401 covers every invalid/expired/used/PKCE-mismatch case.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OidcNativeTokenRequest"
      responses:
        "200":
          description: Handoff accepted — native access + refresh bundle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OidcNativeTokenResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/auth/me/mfa/totp/setup:
    post:
      tags:
        - Auth
      summary: Begin TOTP enrollment (cookie session only)
      description: Generates and stores a pending (encrypted) TOTP secret and returns the otpauth URI + Base32 secret. MFA is
        not active until /confirm. Cookie-only — a Bearer token cannot enrol MFA.
      responses:
        "200":
          description: Pending secret created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpSetupEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/auth/me/mfa/totp/confirm:
    post:
      tags:
        - Auth
      summary: Confirm TOTP enrollment (cookie session only)
      description: Verifies a code against the pending secret, activates the factor, and returns the one-time recovery codes.
        Cookie-only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  pattern: ^\d{6}$
              required:
                - code
