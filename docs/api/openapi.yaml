      summary: Grant AI consent (signed artefact)
      description: Persist a fresh AI-consent receipt. Required before server-managed AI egress (the operator's global LLM
        key); BYOK / local / ChatGPT-OAuth chains are the user's own egress and are not gated. Append-only audit trail.
