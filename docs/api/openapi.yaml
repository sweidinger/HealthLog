      description: One expected-vs-actual dose slot for the cadence timeline chart. `status` is one of `taken | skipped |
        missed | pending | future` and drives the chip colour.
    ListMedicationComplianceResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MedicationComplianceSummaryEntry"
        error:
          type: "null"
        meta:
          type: object
          properties:
            requestId:
              type: string
          additionalProperties: false
      required:
        - data
        - error
      additionalProperties: false
    MedicationComplianceSummaryEntry:
      type: object
      properties:
        medicationId:
          type: string
        compliance7:
          $ref: "#/components/schemas/ComplianceResult"
        compliance30:
          $ref: "#/components/schemas/ComplianceResult"
        complianceDisplay:
          $ref: "#/components/schemas/ComplianceDisplay"
      required:
        - medicationId
        - compliance7
        - compliance30
        - complianceDisplay
      additionalProperties: false
      description: "Compact per-medication adherence row for the batched card read: the 7-/30-day summaries plus the
        cadence-scaled display block. The per-day `dailyCompliance` grid is NOT on this shape — read the per-medication
        `/compliance` endpoint for the history glyph track."
    ComplianceResult:
      type: object
      properties:
        totalExpected:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: "Full denominator over the window: `taken + skipped + missed`. Cadence-aware and clamped to the
            medication's `createdAt`."
        taken:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        skipped:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: Doses the user explicitly skipped — excluded from the `rate` denominator.
        missed:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        rate:
          type: integer
          minimum: 0
          maximum: 100
          description: Adherence percentage `round(taken / (taken + missed) * 100)` — `skipped` is excluded from the denominator.
        streak:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: Consecutive days with every due dose taken.
      required:
        - totalExpected
        - taken
        - skipped
        - missed
        - rate
        - streak
      additionalProperties: false
      description: Rolling-window adherence summary. `compliance30` is the authoritative 'last 30 days, taken vs expected'
        read — clients should display `rate` and use `totalExpected` as the denominator rather than re-deriving it from
        the daily map.
    ComplianceDisplay:
      type: object
      properties:
        shortDays:
          type: integer
          exclusiveMinimum: 0
          maximum: 9007199254740991
        longDays:
          type: integer
          exclusiveMinimum: 0
          maximum: 9007199254740991
        expectedShort:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        expectedLong:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        minStableDoses:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        short:
          type: object
          properties:
            rate:
              type: integer
              minimum: 0
              maximum: 100
            taken:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            expected:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: v1.15.9 rate denominator over the short window (`taken + missed`); user skips are excluded. Render `taken /
                expected · rate%`.
            missed:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: v1.15.9 doses counted against the rate over the short window — includes forgotten doses the auto-miss cron
                flipped.
            streak:
              type: integer
              minimum: 0
              maximum: 9007199254740991
          required:
            - rate
            - taken
            - expected
            - missed
            - streak
          additionalProperties: false
        long:
          type: object
          properties:
            rate:
              type: integer
              minimum: 0
              maximum: 100
            taken:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            expected:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: v1.15.9 rate denominator over the long window (`taken + missed`).
            missed:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: v1.15.9 doses counted against the rate over the long window.
          required:
            - rate
            - taken
            - expected
            - missed
          additionalProperties: false
        currentCycle:
          type: object
          properties:
            state:
              type: string
              enum:
                - on_track
                - due
                - missed
                - none
              description: "Open-cycle state, decoupled from the percentage rows: `on_track` = next dose not yet due; `due` = due now
                / in grace; `missed` = past grace with no logged intake (the only red state); `none` = no projected next
                dose (PRN / paused / ended)."
            nextDueAt:
              anyOf:
                - type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                - type: "null"
              description: The open cycle's due instant. Null when `state` is `none`.
            graceUntil:
              anyOf:
                - type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                - type: "null"
              description: End of the due slot's grace window. Null when `state` is `none`.
            hasClosedCycles:
              type: boolean
              description: False for a brand-new sparse med with zero closed dose cycles — the percentage rows are vacuous and the
                card should show a neutral 'not enough data yet' state.
          required:
            - state
            - nextDueAt
            - graceUntil
            - hasClosedCycles
          additionalProperties: false
          description: v1.13.x — the current (open) dose cycle, surfaced so a between-doses sparse med renders a neutral 'next
            dose in N days' line instead of a scary red 0%. The percentage rows above already exclude the open forward
            cycle from their denominator.
        currentDose:
          type: object
          properties:
            status:
              type: string
              enum:
                - upcoming
                - on_time_window
                - overdue
                - missed
                - taken_on_time
                - taken_late
                - skipped
              description: Per-dose state of the open cycle, server-derived from the window model so the card renders the take-window
                (green) / overdue / heavily-overdue escalation from one authority. `upcoming` when no dose is open (PRN
                / paused / ended).
            targetAt:
              anyOf:
                - type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                - type: "null"
              description: Target instant of the open dose. Null when no dose is open.
          required:
            - status
            - targetAt
          additionalProperties: false
          description: v1.15.9 — the open dose's per-dose status + target, so the card highlights the actionable take-window green
            and escalates an overdue dose without re-deriving the window math client-side.
      required:
        - shortDays
        - longDays
        - expectedShort
        - expectedLong
        - minStableDoses
        - short
        - long
        - currentCycle
        - currentDose
      additionalProperties: false
      description: The two-row card block whose windows scale with dosing cadence (dense meds keep 7 / 30 days, sparse meds
        step both windows up). NOT the 30-day denominator — read `compliance30.totalExpected` for that.
    GetMedicationComplianceResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/MedicationComplianceResponse"
        error:
          type: "null"
        meta:
          type: object
          properties:
            requestId:
              type: string
          additionalProperties: false
      required:
        - data
        - error
      additionalProperties: false
    MedicationComplianceResponse:
      type: object
      properties:
        compliance7:
          $ref: "#/components/schemas/ComplianceResult"
        compliance30:
          $ref: "#/components/schemas/ComplianceResult"
        dailyCompliance:
          type: object
          propertyNames:
            type: string
          additionalProperties:
            $ref: "#/components/schemas/DailyComplianceEntry"
          description: Flat per-day map keyed `YYYY-MM-DD` in the user timezone, one entry per day for up to 90 days back, clamped
            to the medication's `createdAt` (so a recently-created med has fewer entries). No weekly/monthly collapse —
            this is the raw daily grid.
        complianceDisplay:
          $ref: "#/components/schemas/ComplianceDisplay"
      required:
        - compliance7
        - compliance30
        - dailyCompliance
        - complianceDisplay
      additionalProperties: false
      description: Adherence read for a single medication. `compliance30` is the authoritative 30-day taken-vs-expected
        summary; `dailyCompliance` is the per-day grid for the history glyph track. The graded raw→week→month→year
        series used elsewhere for AI prompts does NOT apply here — this response is never downsampled.
    DailyComplianceEntry:
      type: object
      properties:
        expected:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: Engine-computed due-slot count for the day. Equals `expectedCount`; kept for existing consumers.
        expectedCount:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: True due-slot count for the day (additive field clients key off so they don't infer due-ness from
            `expected`).
        due:
          type: boolean
          description: "`expectedCount > 0`. Paint a per-day glyph as expected/missed ONLY when `due === true`; off-cadence /
            pre-creation / PRN days are not misses."
        taken:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        skipped:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        onTime:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: Doses taken in the on-time band, including the `early` bucket (early counts as compliant).
        late:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        veryLate:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        early:
          description: Doses taken before the on-time band's grace start; already folded into `onTime`, surfaced separately for
            consumers that differentiate.
          type: integer
          minimum: 0
          maximum: 9007199254740991
      required:
        - expected
        - expectedCount
        - due
        - taken
        - skipped
        - onTime
        - late
        - veryLate
      additionalProperties: false
      description: Per-day compliance cell with the timing breakdown that drives the history glyph track.
    GetMedicationEfficacyResponse:
      type: object
