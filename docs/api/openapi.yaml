            - type: "null"
          description: Custom base URL (LOCAL OCR provider only); null otherwise.
        hasOcrKey:
          type: boolean
        ocrKeyPreview:
          anyOf:
            - type: string
            - type: "null"
          description: "`...` + last 4 chars of the stored document-scan provider key, or null."
      required:
