          description: "Number of ACTIONED intake events for today (user-local day window): rows with a recorded `takenAt` or an
            explicit skip. Pending projector-minted rows do not count — the card overdue-pill suppression compares this
            against the passed-dose count, and a pending mint must not read as covered."
        stockUnitsRemaining:
