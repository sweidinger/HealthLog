      tags:
        - Documents
      summary: Storage usage + effective limits
      description: "The caller's vault usage and effective limits: `usedBytes` (every non-purged row — tombstones inside the
        30-day undo grace still count), `quotaBytes` (per-user override ?? instance default), `maxFileBytes`
        (admin-tunable per-file cap), `acceptedExtensions` for picker `accept` lists, and `linkedEpisodes` (episodes
        carrying at least one live document link — the condition-filter chips). Read this before offering an upload."
      responses:
        "200":
          description: Usage + limits.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentUsageEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/documents/inbound/bulk:
    post:
      tags:
        - Documents
      summary: Bulk action over documents
      description: Applies one action to up to 100 owner-scoped documents and returns a per-id result array — a partial
        failure never aborts the batch. `error` is `notFound` (unknown / foreign / tombstoned where liveness is
        required) or `conflict` (restore blocked by a live duplicate of the same bytes).
