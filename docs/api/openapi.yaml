                        minLength: 1
                        maxLength: 80
                      severity:
                        type: integer
                        minimum: 1
                        maximum: 3
                    required:
                      - key
                note:
                  anyOf:
                    - type: string
                      maxLength: 2000
                    - type: "null"
                loggedAt:
                  type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
              required:
                - date
      responses:
        "200":
          description: Existing day-log updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpsertIllnessDayLogUpdatedEnvelope"
        "201":
          description: New day-log created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpsertIllnessDayLogCreatedEnvelope"
        "401": *a1
        "404": *a11
        "422": *a3
        "429": *a4
  /api/illness/episodes/{id}/correlation:
    get:
      tags:
        - Illness
      summary: Per-episode retrospective correlation (v1.18.1)
      description: "Returns the coverage-gated `Derived<T>` correlation for one episode: the pre-onset anomaly scan, the
        nadir, per-vital physiological returns, the headline recovery-gap, and any red flags. The findings derive from
        the user's OWN baseline (median ± MAD) over a contamination-guarded window — never a population constant.
        `status:\"insufficient\"` carries coverage + a reason. Retrospective ONLY — never a predictor or diagnoser.
        Owner-scoped + module-gated."
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: The correlation Derived DTO (ok or insufficient).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IllnessCorrelationEnvelope"
        "401": *a1
        "404": *a11
        "422": *a3
        "429": *a4
  /api/illness/insights:
    get:
      tags:
        - Illness
      summary: Cross-episode retrospective insights (v1.18.1)
      description: "Returns the cross-episode retrospective summary over a trailing window: 'sick N times · typical recovery
        gap X days', a recurrence-by-month tally, and a per-type breakdown. The typical gap is withheld (null) below the
        min-sample floor (asserts nothing thin). Retrospective ONLY — the recurrence figure is a count of the past,
        never a forecast. Born-gated + owner-scoped."
      parameters:
        - in: query
          name: windowDays
          schema:
            type: integer
            minimum: 30
            maximum: 1095
        - in: query
          name: includeRecoveryGap
          schema:
            type: string
            enum:
              - "true"
              - "false"
      responses:
        "200":
          description: The cross-episode retrospective summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IllnessInsightsEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/onboarding/disclaimer:
    post:
      tags:
        - Onboarding
      summary: Acknowledge the one-time medical disclaimer
      description: "Stamps the user's medical-disclaimer acknowledgment. Idempotent: a repeat acknowledgment of the same
        version refreshes the timestamp. The body version is a freshness signal so a stale shell cannot record copy it
        never rendered; the server persists its own canonical version."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisclaimerAckRequest"
      responses:
        "200":
          description: Disclaimer acknowledged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisclaimerAckEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/onboarding/tour:
    post:
      tags:
        - Onboarding
      summary: Update module-tour completion + resume point
      description: Persists the module-tour state. The client posts a fire-and-forget `progress` checkpoint on each step so a
        reload resumes at the right module, and a terminal `completed:true` with `outcome` when the tour ends.
        `completed:false` is a replay reset that also clears the resume point.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourUpdateRequest"
      responses:
        "200":
          description: Tour state updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourUpdateEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
components:
  schemas:
    PasskeyLoginVerifyRequest:
      type: object
      properties:
        challengeId:
          type: string
          minLength: 1
          description: Server-issued WebAuthn challenge id.
        credential:
          type: object
          properties:
            id:
              type: string
            rawId:
              type: string
            type:
              type: string
              const: public-key
            response:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
            authenticatorAttachment:
              type: string
              enum:
                - platform
                - cross-platform
            clientExtensionResults:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
          required:
            - id
            - rawId
            - type
            - response
          description: SimpleWebAuthn-style assertion response payload.
      required:
        - challengeId
        - credential
      description: Passkey assertion verification. Same native-client token issuance as the password path.
    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
          description: Caller-presented refresh token (`hlr_<64hex>`).
        revoke:
          description: When true, revoke the supplied token instead of rotating.
          type: boolean
      required:
        - refreshToken
      description: Exchange a one-time-use refresh token for a fresh access + refresh pair.
    AppleHealthBatchRequest:
      type: object
      properties:
        entries:
          minItems: 1
          maxItems: 500
          type: array
          items:
            $ref: "#/components/schemas/AppleHealthBatchEntry"
      required:
        - entries
      description: Apple Health batch ingest. ≤500 entries per call; idempotent via `Idempotency-Key`.
    AppleHealthBatchEntry:
      type: object
      properties:
        hkIdentifier:
          type: string
          minLength: 1
          maxLength: 120
          description: HealthKit identifier (e.g. `HKQuantityTypeIdentifierBodyMass`).
        value:
          type: number
          description: Raw HealthKit reading in Apple's native unit; the server applies any canonical scaling at ingest. For an
            hourly heart-rate bucket (see `externalId`) this is the hour's AVERAGE bpm; the hour's spread rides
            `valueMin` / `valueMax`.
        valueMin:
          description: "v1.19.2 (iOS #34 extension) — the hour's MINIMUM bpm for an hourly heart-rate bucket (see `externalId`).
            Persisted ONLY on a well-formed `stats:HKQuantityTypeIdentifierHeartRate:<hour>` row; ignored (stored null)
            on every other entry. Omit on a pre-v1.19.2 client — the bucket keeps the avg-only contract."
          type: number
        valueMax:
          description: "v1.19.2 (iOS #34 extension) — the hour's MAXIMUM bpm for an hourly heart-rate bucket (see `externalId`).
            Persisted ONLY on a well-formed `stats:HKQuantityTypeIdentifierHeartRate:<hour>` row; ignored (stored null)
            on every other entry. Omit on a pre-v1.19.2 client — the bucket keeps the avg-only contract."
          type: number
        unit:
          type: string
          minLength: 1
          maxLength: 60
        startDate:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        endDate:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        sleepStage:
          description: HKCategoryValueSleepAnalysis codepoint; only for sleep samples.
          type: integer
          minimum: 0
          maximum: 20
        categoryValue:
          description: v1.10.0 — `HKCategoryValue` codepoint for an EVENT-class category sample (irregular-rhythm, high/low-HR,
            walking-steadiness, breathing-disturbance). Carries the device's own classification verdict / severity,
            which the server resolves to a stored `rhythmClassification`. HealthLog stores ONLY the device's result — it
            never re-classifies. Ignored for non-event identifiers.
          type: integer
          minimum: 0
          maximum: 20
        externalId:
          type: string
          minLength: 1
          maxLength: 120
          description: >-
            Dedup key for the `(userId, type, source, externalId)` composite index. Three shapes:

            • `HKSample.uuid` — a per-sample reading. First-write-wins: a re-post returns `duplicate` and the stored row
            is immutable.

            • `stats:<HKQuantityTypeIdentifier>:<YYYY-MM-DD>` — a per-day cumulative total (Steps, Active Energy, Sleep
            Duration, Walking/Running Distance, Flights Climbed). A re-post OVERWRITES the row and returns `updated`.

            • `stats:HKQuantityTypeIdentifierHeartRate:<bucket-start-hour>` — v1.19.0 (iOS #34) hourly heart-rate bucket
            carrying the hour's AVERAGE bpm as one PULSE row. `<bucket-start-hour>` is the ISO-8601 UTC hour boundary
            with zeroed minutes/seconds/millis and a trailing `Z` (e.g. `2026-06-21T14:00:00.000Z`). A re-post within
            the hour OVERWRITES the row and returns `updated`, so iOS uploads ~24 rows/day instead of one per raw HR
            sample. A row that targets this prefix with a malformed hour suffix is `skipped` with reason
            `malformed_hr_bucket_id`.
        externalSourceVersion:
          type: string
          minLength: 1
          maxLength: 120
        source:
          description: Source attribution for the row. Defaults to `APPLE_HEALTH` when omitted. Send `MANUAL` to tag rows the user
            entered by hand on-device (e.g. the standalone adopt-on-pair backfill). Part of the `(userId, type, source,
            externalId)` dedup key, so the same externalId under a different source is a distinct row. `WITHINGS` /
            `IMPORT` are not accepted here.
          type: string
          enum:
            - APPLE_HEALTH
            - MANUAL
        deviceType:
          description: Device class mapped from `HKDevice.model`. Used by the analytics aggregator to break ties when the same
            source contributed multiple devices for the same day. Omit (or send null) on legacy clients — the server
            treats it as `unknown` and the picker falls through.
          anyOf:
            - type: string
              enum:
                - watch
                - band
                - ring
                - phone
                - scale
                - other
                - unknown
            - type: "null"
      required:
        - hkIdentifier
        - value
        - unit
        - startDate
        - endDate
        - externalId
    MeasurementsDeleteByExternalIdsRequest:
      type: object
      properties:
        externalIds:
          minItems: 0
          maxItems: 500
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 120
      required:
        - externalIds
      description: iOS deletion-sync. Up to 500 externalIds per call; matching rows owned by other users are silently skipped
        (cross-user 404 guard).
    MeasurementsBulkDeleteRequest:
      type: object
      properties:
        ids:
          minItems: 1
          maxItems: 200
          type: array
          items:
            type: string
            minLength: 1
      required:
        - ids
      description: 1..200 measurement ids, scoped to the caller. Forged / foreign ids are silently skipped (no existence leak).
    MeasurementsRestoreRequest:
      type: object
      properties:
        ids:
          minItems: 1
          maxItems: 200
          type: array
          items:
            type: string
            minLength: 1
      required:
        - ids
      description: 1..200 measurement ids, scoped to the caller. Forged / foreign / not-deleted ids are silently skipped (no
        existence leak).
    DeviceRegisterRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 8
          maxLength: 512
          pattern: ^[A-Za-z0-9+/=._:-]+$
          description: Generic device identifier (legacy; APNs token below).
        bundleId:
          type: string
          minLength: 1
          maxLength: 128
        locale:
          type: string
          minLength: 2
          maxLength: 16
        appVersion:
          type: string
          minLength: 1
          maxLength: 32
        model:
          type: string
          minLength: 1
          maxLength: 64
        apnsToken:
          description: Hex-encoded APNs device token. Must be paired with `apnsEnvironment`.
          type: string
          minLength: 8
          maxLength: 256
          pattern: ^[A-Fa-f0-9]+$
        apnsEnvironment:
          description: Gateway the iOS client received `apnsToken` from. Server never auto-detects.
          type: string
          enum:
            - sandbox
            - production
        medicationDelivery:
          description: v1.7.0 per-device medication-delivery override. NULL / omitted = inherit the user-level roaming default.
            "server" forces server APNs for this device; "client" forces local. Stored + echoed; cron suppression stays
            user-level.
          anyOf:
            - type: string
              enum:
                - server
                - client
            - type: "null"
        liveActivityPushToken:
          description: v1.17.1 (#22) hex-encoded ActivityKit Live Activity push token (distinct from the device APNs token). The
            server addresses a Live Activity update / end push on a medication-intake mutation. Omitted = keep the prior
            value; null = clear it when the Activity ends.
          anyOf:
            - type: string
              minLength: 8
              maxLength: 256
              pattern: ^[A-Fa-f0-9]+$
            - type: "null"
      required:
        - token
        - bundleId
      description: Native device registration. Re-registering an APNs token belonging to another user returns 409
        (cross-user-hijack guard).
    CreateMedicationRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        dose:
          type: string
          minLength: 1
          maxLength: 50
        category:
          type: string
          enum:
            - BLOOD_PRESSURE
            - VITAMIN
            - SUPPLEMENT
            - PAIN_RELIEF
            - ALLERGY
            - DIGESTIVE
            - THYROID
            - HORMONE
            - SKIN
            - SLEEP_AID
            - DIABETES
            - ANTIBIOTIC
            - OTHER
        treatmentClass:
          type: string
          enum:
            - GENERIC
            - GLP1
        dosesPerUnit:
          type: integer
          minimum: 1
          maximum: 1000
        unitsPerDose:
          description: Inventory units consumed per dose. A whole number 1–100 (e.g. 2 tablets of 2 mg for a 4 mg dose) or a
            supported fraction for a split pill (¼ / ⅓ / ½ / ⅔ / ¾). Default 1. The intake consumption hook decrements
            this many units per taken dose; dose-derived readouts divide unit counts by it.
          type: number
        reorderLeadDays:
          description: Per-medication reorder lead time in days (0–60). The low-stock alert fires the supply early enough to
            reorder before the last dose. Omitted = inherit the user-level reorderLeadDays default (10).
          type: integer
          minimum: 0
          maximum: 60
        deliveryForm:
          type: string
          enum:
            - ORAL
            - INJECTION
            - OTHER
        trackInjectionSites:
          description: Per-medication injection-site tracking opt-in. Default false. Only meaningful for an INJECTION delivery
            form; when true the client prompts (skippably) for the site after a taken dose.
          type: boolean
        allowedInjectionSites:
          description: Per-medication allowed / preferred injection sites. Empty array = no per-medication restriction (every site
            offered). The effective pickable set is this list minus the user's global exclusion.
          maxItems: 8
          type: array
          items:
            type: string
            enum:
              - ABDOMEN_LEFT
              - ABDOMEN_RIGHT
              - ABDOMEN_UPPER_LEFT
              - ABDOMEN_UPPER_RIGHT
              - THIGH_LEFT
              - THIGH_RIGHT
              - UPPER_ARM_LEFT
              - UPPER_ARM_RIGHT
        notificationsEnabled:
          type: boolean
        liveActivityEnabled:
          description: iOS Live Activity opt-in for this medication's reminders. Default false. The iOS client owns the
            ActivityKit lifecycle; the server only stores + echoes the flag.
          type: boolean
        criticalAlarmEnabled:
          description: iOS 26 AlarmKit critical-reminder opt-in. Default false. Critical alarms bypass the device mute switch /
            Focus; the server stores the preference only and hangs no server-side behaviour off it.
          type: boolean
        atcCode:
          description: Optional WHO ATC classification code (active-substance class, 7 chars, e.g. `A10BX10`).
            User/clinician-asserted; never machine-guessed. Emitted on the FHIR `medicationCodeableConcept` under
            `http://www.whocc.no/atc`. NULL clears it; absent leaves it untouched.
          anyOf:
            - type: string
              pattern: ^[A-Z]\d{2}[A-Z]{2}\d{2}$
            - type: "null"
        rxNormCode:
          description: Optional RxNorm RxCUI (numeric, US identifier, e.g. `2601723`). Secondary coding emitted under
            `http://www.nlm.nih.gov/research/umls/rxnorm` alongside any ATC code, never instead of the free-text name.
            NULL clears it; absent leaves it untouched.
          anyOf:
            - type: string
              maxLength: 20
              pattern: ^\d+$
            - type: "null"
        startsOn:
          description: Date the medication course begins (ISO `YYYY-MM-DD`). Anchors RRULE BYDAY / BYMONTHDAY patterns and the
            rolling-interval countdown's first window. NULL = active from creation (the legacy implicit behaviour).
            Required when `oneShot` is true.
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: "null"
        endsOn:
          description: Date the medication course ends (ISO `YYYY-MM-DD`). NULL = no end date (chronic). When `oneShot` is true
            the route normalises `endsOn` to equal `startsOn`.
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: "null"
        oneShot:
          description: Single-administration medication (e.g. flu shot, post-op single dose). When true the medication has at most
            one schedule with no `rrule` / `rollingIntervalDays`, and `active` auto-flips to false once the dose is
            logged (non-skipped).
          type: boolean
        asNeeded:
          description: "As-needed (PRN) medication (pain relief, rescue inhaler). When true the medication carries NO schedules
            (supplying any schedule entry is a 422): it is never due, never reminded, and excluded from compliance
            rates/streaks, but intakes still log (ad-hoc), inventory still consumes, and the history renders. Stays
            active indefinitely. Mutually exclusive with `oneShot`."
          type: boolean
        schedules:
          type: array
          items:
            $ref: "#/components/schemas/MedicationScheduleInput"
      required:
        - name
        - dose
      description: 'Create-medication body. The route enforces the v1.5 cross-field invariants on top of the per-schedule
        `rrule_xor_rolling` Zod refine: a `oneShot:true` medication may carry at most one schedule and that schedule
        must not declare a recurrence; `endsOn` is normalised to equal `startsOn` for one-shot doses; a recurring
        schedule with no `rrule`, `rollingIntervalDays`, or legacy `daysOfWeek` defaults to `rrule = "FREQ=DAILY"`; and
        `timesOfDay` is dual-written from `windowStart` when the caller omits it. v1.16.11 — `asNeeded: true` creates a
        PRN medication with ZERO schedules (`schedules` must be absent or empty, 422 otherwise); a scheduled medication
        still requires at least one schedule entry.'
    MedicationScheduleInput:
      type: object
      properties:
        windowStart:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
          description: Legacy single-time-of-intake (HH:mm, user local). v1.5 keeps the field for backwards compatibility with
            pre-wizard iOS clients; the new `timesOfDay` array supersedes it.
        windowEnd:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
          description: Legacy reminder-window upper bound (HH:mm). Used to derive the late-classification grace span when
            `reminderGraceMinutes` is null.
        label:
          description: Optional human label (e.g. "Morning", "Evening").
          type: string
          maxLength: 50
        dose:
          description: Per-schedule dose override. NULL means the schedule inherits `Medication.dose`.
          type: string
          maxLength: 50
        daysOfWeek:
          description: Legacy day-of-week filter (0=Sunday..6=Saturday). v1.5 reads new writes through `rrule` first; this field
            is preserved for pre-v1.5 rows and is the input the route serialises into the persisted `days_of_week`
            string.
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 6
        intervalWeeks:
          description: Legacy multi-week stride (1..4). Bi-weekly + tri-weekly were broken in the pre-v1.5 reminder worker; new
            writes encode the same intent via `rrule` (e.g. `FREQ=WEEKLY;INTERVAL=2;BYDAY=WE`).
          type: integer
          minimum: 1
          maximum: 4
        timesOfDay:
          description: v1.5 first-class points-in-time the dose is taken (HH:mm, user local). Up to 8 entries. Absent or empty
            means the route stamps `[windowStart]` so the new engine always sees a populated array.
          maxItems: 8
          type: array
          items:
            type: string
            pattern: ^([01]\d|2[0-3]):([0-5]\d)$
        reminderGraceMinutes:
          description: Reminder grace window in minutes. Caps at 24h. NULL falls back to the legacy `windowEnd - windowStart` span.
          type: integer
          minimum: 1
          maximum: 1440
        rrule:
          description: "RFC 5545 RRULE string (subset). Use for daily / weekly-with-BYDAY / multi-week / monthly / yearly
            cadences. Mutually exclusive with `rollingIntervalDays`. Examples: `FREQ=DAILY`,
            `FREQ=WEEKLY;BYDAY=MO,WE,FR`, `FREQ=WEEKLY;INTERVAL=2;BYDAY=WE`, `FREQ=MONTHLY;BYMONTHDAY=1`,
            `FREQ=YEARLY;BYMONTH=1;BYMONTHDAY=1`."
          type: string
          maxLength: 200
          pattern: ^FREQ=(?:DAILY|WEEKLY|MONTHLY|YEARLY)(?:;(?:INTERVAL=\d{1,3}|BYDAY=(?:MO|TU|WE|TH|FR|SA|SU)(?:,(?:MO|TU|WE|TH|FR|SA|SU))*|BYMONTHDAY=-?\d{1,2}(?:,-?\d{1,2})*|BYMONTH=\d{1,2}(?:,\d{1,2})*|COUNT=\d{1,4}|UNTIL=\d{8}T\d{6}Z))*$
        rollingIntervalDays:
          description: Flexible-rolling interval in days, counted forward from the latest `MedicationIntakeEvent.takenAt` (the
            dose re-anchors when logged). Mutually exclusive with `rrule`. Range 1..365.
          type: integer
          minimum: 1
          maximum: 365
        scheduleType:
          description: Schedule type. SCHEDULED (default) = rrule / rolling / legacy cadence. PRN = as-needed (never projected,
            reminded, or counted in compliance expected; still loggable via the intake route). CYCLIC = N weeks on / M
            weeks off, gating whichever inner cadence the rrule / legacy fields describe.
          type: string
          enum:
            - SCHEDULED
            - PRN
            - CYCLIC
        cyclicOnWeeks:
          description: Cyclic "on" weeks (1..52). Required when `scheduleType` is CYCLIC; ignored otherwise.
          type: integer
          minimum: 1
          maximum: 52
        cyclicOffWeeks:
          description: Cyclic "off" weeks (0..52). Required when `scheduleType` is CYCLIC; ignored otherwise.
          type: integer
          minimum: 0
          maximum: 52
        doseWindows:
          description: Per-dose on-time intake windows. Each `{ timeOfDay, start, end }` HH:mm triple sets the explicit on-time
            band for the matching dose time; a dose time with no entry keeps the symmetric ±1h default. `timeOfDay` must
            match one of `timesOfDay` (or `windowStart`); `start <= end`. Up to 8 entries. Absent leaves every slot on
            the default derivation. The late tail stays cadence-derived.
          maxItems: 8
          type: array
          items:
            $ref: "#/components/schemas/DoseWindowEntry"
      required:
        - windowStart
        - windowEnd
      description: Single schedule entry on a medication. v1.5 introduces `timesOfDay`, `rrule`, `rollingIntervalDays`, and
        `reminderGraceMinutes` as first-class fields; `windowStart`, `windowEnd`, `daysOfWeek`, and `intervalWeeks` are
        preserved through the v1.5.x line for backwards compatibility. **`rrule` and `rollingIntervalDays` are mutually
        exclusive** — supplying both fails 422 (`rrule_xor_rolling`). The DB enforces the same invariant via a CHECK
        constraint.
    DoseWindowEntry:
      type: object
      properties:
        timeOfDay:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
          description: The dose time this window applies to (matches a `timesOfDay` entry).
        start:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
          description: On-time band lower bound (HH:mm, user local).
        end:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
          description: On-time band upper bound (HH:mm, user local). Must be >= `start`.
      required:
        - timeOfDay
        - start
        - end
      description: One explicit per-dose on-time intake window. `timeOfDay` matches a schedule dose time; `[start, end]`
        (HH:mm, user local, `start <= end`) is the on-time band. Outside it the cadence-derived late tail applies, then
        ad-hoc.
    MedicationListLayout:
      type: object
      properties:
        version:
          type: number
          const: 1
        view:
          description: Which presentation /medications renders in. Default "cards". Optional on PUT — when omitted the stored
            value is preserved (preserve-when-absent, like `heroVisible` on the dashboard layout). Always present on
            responses.
          type: string
          enum:
            - cards
            - table
        order:
          description: User-defined manual medication order (medication ids, first = top), shared by both views. Display-only —
            unknown / deleted ids are ignored at render time, never 422. Optional on PUT (preserve-when-absent); always
            present on responses.
          maxItems: 200
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 64
      required:
        - version
      description: "Per-user /medications presentation: the card/table view choice plus the manual medication order shared by
        both views. Mirrors the dashboard-widgets / insights-layout contract."
    UpdateMedicationRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        dose:
          type: string
          minLength: 1
          maxLength: 50
        category:
          type: string
          enum:
            - BLOOD_PRESSURE
            - VITAMIN
            - SUPPLEMENT
            - PAIN_RELIEF
            - ALLERGY
            - DIGESTIVE
            - THYROID
            - HORMONE
            - SKIN
            - SLEEP_AID
            - DIABETES
            - ANTIBIOTIC
            - OTHER
        treatmentClass:
          type: string
          enum:
            - GENERIC
            - GLP1
        dosesPerUnit:
          anyOf:
            - type: integer
              minimum: 1
              maximum: 1000
            - type: "null"
        unitsPerDose:
          description: Inventory units consumed per dose — a whole number 1–100 or a supported split-pill fraction (¼ / ⅓ / ½ / ⅔
            / ¾). The intake consumption hook decrements this many units per taken dose; already-stamped intake events
            keep their recorded consumption.
          type: number
        reorderLeadDays:
          description: Per-medication reorder lead time in days (0–60). null clears the override and reverts to the user-level
            reorderLeadDays default.
          anyOf:
            - type: integer
              minimum: 0
              maximum: 60
            - type: "null"
        deliveryForm:
          type: string
          enum:
            - ORAL
            - INJECTION
            - OTHER
        trackInjectionSites:
          description: Per-medication injection-site tracking opt-in. Only meaningful for an INJECTION delivery form. Set false to
            deactivate tracking.
          type: boolean
        allowedInjectionSites:
          description: Per-medication allowed / preferred injection sites. Empty array clears the restriction. The effective
            pickable set subtracts the user's global exclusion (deny wins).
          maxItems: 8
          type: array
          items:
            type: string
            enum:
              - ABDOMEN_LEFT
              - ABDOMEN_RIGHT
              - ABDOMEN_UPPER_LEFT
              - ABDOMEN_UPPER_RIGHT
              - THIGH_LEFT
              - THIGH_RIGHT
              - UPPER_ARM_LEFT
              - UPPER_ARM_RIGHT
        active:
          type: boolean
        notificationsEnabled:
          type: boolean
        liveActivityEnabled:
          description: iOS Live Activity opt-in for this medication's reminders. The iOS client owns the ActivityKit lifecycle;
            the server only stores + echoes the flag.
          type: boolean
        criticalAlarmEnabled:
          description: iOS 26 AlarmKit critical-reminder opt-in. Critical alarms bypass the device mute switch / Focus; the server
            stores the preference only.
          type: boolean
        atcCode:
          description: Optional WHO ATC classification code (active-substance class, 7 chars, e.g. `A10BX10`).
            User/clinician-asserted; never machine-guessed. Emitted on the FHIR `medicationCodeableConcept` under
            `http://www.whocc.no/atc`. NULL clears it; absent leaves it untouched.
          anyOf:
            - type: string
              pattern: ^[A-Z]\d{2}[A-Z]{2}\d{2}$
            - type: "null"
        rxNormCode:
          description: Optional RxNorm RxCUI (numeric, US identifier, e.g. `2601723`). Secondary coding emitted under
            `http://www.nlm.nih.gov/research/umls/rxnorm` alongside any ATC code, never instead of the free-text name.
            NULL clears it; absent leaves it untouched.
          anyOf:
            - type: string
              maxLength: 20
              pattern: ^\d+$
            - type: "null"
        startsOn:
          description: Date the medication course begins (ISO `YYYY-MM-DD`). Anchors RRULE BYDAY / BYMONTHDAY patterns and the
            rolling-interval countdown's first window. NULL = active from creation (the legacy implicit behaviour).
            Required when `oneShot` is true.
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: "null"
        endsOn:
          description: Date the medication course ends (ISO `YYYY-MM-DD`). NULL = no end date (chronic). When `oneShot` is true
            the route normalises `endsOn` to equal `startsOn`.
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: "null"
        oneShot:
          description: Single-administration medication (e.g. flu shot, post-op single dose). When true the medication has at most
            one schedule with no `rrule` / `rollingIntervalDays`, and `active` auto-flips to false once the dose is
            logged (non-skipped).
          type: boolean
        asNeeded:
          description: "As-needed (PRN) medication (pain relief, rescue inhaler). When true the medication carries NO schedules
            (supplying any schedule entry is a 422): it is never due, never reminded, and excluded from compliance
            rates/streaks, but intakes still log (ad-hoc), inventory still consumes, and the history renders. Stays
            active indefinitely. Mutually exclusive with `oneShot`."
          type: boolean
        schedules:
          type: array
          items:
            $ref: "#/components/schemas/MedicationScheduleInput"
        reminderGraceMinutes:
          description: "Detail-page bridge: primary-schedule reminder-window in minutes. The route maps the value onto the primary
            schedule's `reminderGraceMinutes` field; ignored when a full `schedules` array is also supplied."
          anyOf:
            - type: integer
              minimum: 0
              maximum: 1440
            - type: "null"
      description: "Update-medication body. Every field is optional; omitted fields are left untouched. Supplying `schedules`
        REPLACES the medication's full schedule list (the route deletes existing rows before re-creating). Flipping
        `active` to false records the current timestamp on `pausedAt`; flipping back to true clears it. v1.5 invariants
        on the `schedules` array match the create path. v1.16.11 — `asNeeded: true` requires the medication to end
        schedule-less: supply `schedules: []` to clear an existing plan (any schedule entry is a 422); an empty
        `schedules` array without `asNeeded: true` is likewise a 422."
    MedicationIntakeRequest:
      type: object
      properties:
        medicationId:
          type: string
          minLength: 1
          description: Server-narrowed from the URL path. The route layer overwrites whatever the body supplies before Zod parsing
            so a caller cannot log an intake against another medication.
        scheduledFor:
          description: Slot the dose belongs to. Defaults to `takenAt` (or `now()` when both are absent) so the compliance pairing
            logic can pin the dose to a schedule slot.
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        takenAt:
          description: When the dose was actually taken. NULL when `skipped` is true; defaults to `now()` for non-skipped intakes.
            Must not lie in the future (5-minute clock-skew allowance) nor more than 5 years in the past.
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        skipped:
          default: false
          description: True to log a skipped slot (no consumption, no inventory decrement, one-shot medications stay active).
          type: boolean
        idempotencyKey:
          description: Caller-issued de-dup key. A second POST with the same key returns the original event without creating a new
            row.
          type: string
          maxLength: 128
        injectionSite:
          description: Optional injection site for a taken dose. Honoured only when the medication is an INJECTION with
            site-tracking enabled; validated against the medication's effective allowed set (per-medication allowed
            sites minus the user's global exclusion). A disallowed site returns 422. Omit to record the dose without a
            site.
          type: string
          enum:
            - ABDOMEN_LEFT
            - ABDOMEN_RIGHT
            - ABDOMEN_UPPER_LEFT
            - ABDOMEN_UPPER_RIGHT
            - THIGH_LEFT
            - THIGH_RIGHT
            - UPPER_ARM_LEFT
            - UPPER_ARM_RIGHT
        forceSlotInstant:
          description: "Late-take override: pin this taken dose onto the named scheduled slot instead of orphaning it to an ad-hoc
            row. Must be a real scheduled slot of this medication on its day (validated server-side against the
            dose-window band anchors); an instant that is not a slot returns 422. Absent applies the default window-band
            attribution."
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        doseTaken:
          description: Dose actually consumed for THIS intake when it deviates from (or documents) the medication's configured
            dose, e.g. a half tablet or a titration step. Free text, max 50 characters. Omit to record the take under
            the medication's configured dose.
          type: string
          minLength: 1
          maxLength: 50
      required:
        - medicationId
      description: Per-medication intake log body. Idempotent via `idempotencyKey`; the server also dedupes by a 60-second
        sliding window when the key is absent. Non-skipped intakes auto-decrement pen inventory (best-effort), refresh
        the per-day compliance rollup, and — for one-shot medications — flip `active` to false. The optional
        `injectionSite` is persisted only for an INJECTION medication with site-tracking enabled and is validated
        against the medication's effective allowed set (422 on a disallowed value).
    CreateMedicationInventoryItemRequest:
      type: object
      properties:
        unitsTotal:
          type: number
          minimum: 1
          maximum: 1000
          description: Units the container ships with (tablets / ampoules / puffs; 1–1000, fractional allowed for split-pill
            packs). Dose-derived readouts divide by the medication's `unitsPerDose`.
        containerType:
          description: Kind of physical container (PEN / AMPOULE / BLISTER / INHALER / BOTTLE / OTHER). Display-level only;
            defaults to OTHER.
          type: string
          enum:
            - PEN
            - AMPOULE
            - BLISTER
            - INHALER
            - BOTTLE
            - OTHER
        printedExpiry:
          anyOf:
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
            - type: "null"
        purchasedAt:
          anyOf:
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
            - type: "null"
        notes:
          anyOf:
            - type: string
              maxLength: 200
            - type: "null"
      required:
        - unitsTotal
      description: Register a new supply container (pen / blister pack / bottle). `unitsTotal` counts UNITS (1–1000); the item
        starts ACTIVE with `unitsRemaining = unitsTotal` and the intake consumption hook decrements it per taken dose.
    UpdateMedicationInventoryItemRequest:
      type: object
      properties:
        markAsFirstUseAt:
          description: Manually start the 30-day in-use clock (the user opened the container without logging an intake). ACTIVE
            flips to IN_USE; a backdated instant whose window already lapsed lands EXPIRED.
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        markAsUsedUp:
          description: "Terminal override: zero the remaining units and mark the container USED_UP (physically discarded)."
          type: boolean
        printedExpiry:
          anyOf:
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
            - type: "null"
        unitsRemaining:
          description: Absolute remaining-unit correction (0–1000, fractional allowed). Clamped server-side to the item's
            `unitsTotal`; the canonical state machine re-derives the state (0 ⇒ USED_UP).
          type: number
          minimum: 0
          maximum: 1000
        notes:
          anyOf:
            - type: string
              maxLength: 200
            - type: "null"
      description: "Per-item inventory mutation: manual first-use, used-up override, printed-expiry correction, absolute
        remaining-unit correction, notes. Every field is optional and commutative."
    MedicationExtractRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 2000
          description: Free-text medication description (any locale). Up to 2 000 characters. The model never echoes the text back
            into another tenant — it is only used to produce the structured fields.
        locale:
          description: Optional UI locale hint for the model.
          type: string
          enum:
            - en
            - de
            - es
            - fr
            - it
            - pl
        today:
          description: "Optional override of the reference date used to resolve relative phrases (\"tomorrow\", \"next Monday\").
            Format: `YYYY-MM-DD`. Defaults to the server's UTC day."
          type: string
          pattern: ^\d{4}-\d{2}-\d{2}$
      required:
        - text
      description: Free-text medication description payload. The route runs the text through the Coach provider chain and
        returns a partial structured payload the wizard merges. Rate-limited 10 requests / 5 minutes / user;
        budget-gated against the daily Coach token ceiling.
    CreateScheduleRevisionRequest:
      type: object
      properties:
        validFrom:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
          description: Inclusive start instant of the manual era (ISO 8601).
        validUntil:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
          description: Exclusive end instant of the manual era (ISO 8601). Must precede the current plan.
        timesOfDay:
          description: Daily dose times (HH:mm, user local) the era ran at. 1–8 entries; duplicates are collapsed.
          minItems: 1
          maxItems: 8
          type: array
          items:
            type: string
            pattern: ^([01]\d|2[0-3]):([0-5]\d)$
      required:
        - validFrom
        - validUntil
        - timesOfDay
      description: "Manual schedule-era payload: era bounds plus the daily dose times that were live during the era."
    UpdateScheduleRevisionRequest:
      description: "Corrected schedule-era payload: replacement era bounds plus the daily dose times that were live during the era."
      $ref: "#/components/schemas/CreateScheduleRevisionRequest"
    DisableCoachFlag:
      type: object
      properties:
        disableCoach:
          type: boolean
      required:
        - disableCoach
      description: Per-account Coach opt-out toggle (v1.4.47 W3). `true` hides the Coach FAB and short-circuits its API gates.
    DiabetesFlag:
      type: object
      properties:
        hasDiabetes:
          type: boolean
      required:
        - hasDiabetes
      description: Per-account diabetes opt-in (v1.18.6). `true` selects the ADA glycemic GOAL bands (fasting 80–130,
        postprandial < 180) for glucose targets instead of the general non-diabetic bands. A user-declared preference
        only — never inferred from a value, never a diagnosis.
    ModulePrefsPatchRequest:
      type: object
      properties:
        mood:
          type: boolean
        sleep:
          type: boolean
        glucose:
          type: boolean
        workouts:
          type: boolean
        recovery:
          type: boolean
        labs:
          type: boolean
        illness:
          type: boolean
        achievements:
          type: boolean
        insights:
          type: boolean
        medications:
          type: boolean
        doctorReport:
          type: boolean
      additionalProperties: false
      description: Partial module enable/disable update. Each key is an optional boolean; an omitted key is left untouched,
        `false` disables the module, `true` (re-)enables it. Only the toggleable "secondary domains" are accepted — a
        core-domain key (`weight`, `bloodPressure`, `pulse`, `medications`) or any unknown key is a 422, so the
        measurement engine + medications can never be disabled here. `cycle`/`coach` are accepted for forward-compat but
        their real enabled-state is owned elsewhere (the cycle gate / `disableCoach` + the operator assistant flag).
    ProfileUpdateRequest:
      type: object
      properties:
        email:
          anyOf:
            - type: string
              format: email
              pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
