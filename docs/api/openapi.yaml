      description: Returns every inventory item (all states) for the medication, ordered by state, then `expiresAt`, then
        `createdAt`. Items count UNITS; divide by the medication's `unitsPerDose` for dose-level figures. v1.19.0
        (iOS#25) — also returns a server-computed `summary` (the canonical {`unitsRemaining`, `unitsTotal`,
