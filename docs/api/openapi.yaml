  /api/measurements/batch:
    post:
      tags:
        - Measurements
      summary: Apple Health batch ingest
      description: Up to 500 HealthKit entries per call. Idempotent via the `Idempotency-Key` header (replay window 24h).
        Per-entry status lets the iOS client advance its sync cursor accurately. v1.4.25 W8c adds an optional
        `deviceType` per entry — feed it from `HKDevice.model` so the cross-source canonical picker can break
        Apple-Watch-vs-iPhone ties; null/absent stays backward-compatible with v1.4.23 clients.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppleHealthBatchRequest"
      responses:
        "200":
          description: Batch processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchMeasurementsResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/measurements/by-external-ids:
    delete:
      tags:
        - Measurements
      summary: Delete measurements by external ID (iOS deletion-sync)
      description: Removes the user's measurement rows whose externalId is in the request list. Rows owned by another user are
        silently skipped (cross-user 404 guard). Up to 500 externalIds per call.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeasurementsDeleteByExternalIdsRequest"
      responses:
        "200":
          description: Delete batch processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeasurementsDeleteByExternalIdsResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/measurements/bulk-delete:
    post:
      tags:
        - Measurements
      summary: Bulk soft-delete measurements
      description: Soft-deletes (tombstones) up to 200 of the caller's measurement rows in one call, mirroring the
        single-DELETE contract. Idempotent via the `Idempotency-Key` header; rate-limited
        `measurements:bulk-delete:<userId>`. Forged / foreign / already-deleted ids are silently skipped — `deleted` is
        the count of rows actually tombstoned. The deletions surface in `/api/sync/changes` as tombstones.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeasurementsBulkDeleteRequest"
      responses:
        "200":
          description: Bulk delete processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeasurementsBulkDeleteResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/measurements/restore:
    post:
      tags:
        - Measurements
      summary: Restore soft-deleted measurements
      description: Un-tombstones up to 200 of the caller's soft-deleted measurement rows in one call — the delete-Undo
        counterpart to `/api/measurements/bulk-delete`. Idempotent via the `Idempotency-Key` header; rate-limited
        `measurements:restore:<userId>`. Forged / foreign / not-deleted ids are silently skipped — `restored` is the
        count of rows actually un-tombstoned. The restored rows re-surface in `/api/sync/changes` as upserts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeasurementsRestoreRequest"
      responses:
        "200":
          description: Restore processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeasurementsRestoreResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/sleep/night:
    get:
      tags:
        - Measurements
      summary: Reconstructed sleep night (hypnogram source, v1.11.5)
      description: "Returns one night's reconstructed sleep session for the phase-progression (hypnogram) view: the canonical
        source's stage segments (each with an absolute start/end), the per-stage breakdown, asleep/in-bed/awake totals,
        the mid-sleep awakenings count, and same-wake-day naps surfaced separately. Session-clustered, keyed by the
        local wake day, collapsed to one source via the sleep priority ladder so two sources never overlay. `date`
        omitted returns the most recent night. A read-only view over existing per-stage SLEEP_DURATION rows — no schema,
        no new measurement type."
      parameters:
        - in: query
          name: date
          schema:
            description: Wake-day key (YYYY-MM-DD). Omit for the most recent night.
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          description: Wake-day key (YYYY-MM-DD). Omit for the most recent night.
      responses:
        "200":
          description: Reconstructed night.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SleepNightResponse"
        "401": *a1
        "403": &a5
          description: 'Module disabled for this account: the user (or operator) has the module turned off. `meta.errorCode` =
            `module.disabled` and `meta.module` carries the disabled module key (e.g. "sleep"). Returned even for a
            valid Bearer token. Clients hide the whole module surface end-to-end rather than retry.'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/sleep/rhythm:
    get:
      tags:
        - Measurements
      summary: Sleep rhythm — sleep-debt + chronotype (v1.17.0)
      description: "Returns the two server-authoritative sleep-timing signals the Sleep page + iOS render off the same
        canonical night reconstruction the Sleep Score uses: cumulative `sleepDebt` over the rolling window (calm
        `partial` state under the night threshold) and MCTQ `chronotype` (MSF/MSFsc band + social jetlag, `learning`
        state until enough free-day nights exist). Free vs work nights default to weekend = free in the user's timezone
        (no work calendar). A read-only view over existing per-stage SLEEP_DURATION rows — no schema, no new measurement
        type."
      responses:
        "200":
          description: Sleep-debt + chronotype DTO.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SleepRhythmResponse"
        "401": *a1
        "403": *a5
        "422": *a3
        "429": *a4
