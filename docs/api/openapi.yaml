          description: Updated inventory item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMedicationInventoryItemResponse"
        "401": *a1
        "404":
          description: Inventory item not found (or owned by another user / medication).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
    delete:
      tags:
        - Medications
      summary: Delete a supply container
      description: Hard-deletes the inventory item. The audit log captures the before-state (`medication.inventory.delete`) so
        a row can be reconstructed if needed. Consumption stamps on intake events that reference the item stay in place;
        a later restore skips the missing container.
