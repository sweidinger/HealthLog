    NotificationPrefs:
      type: object
      properties:
        medication:
          type: object
          properties:
            clientManaged:
              type: boolean
              description: True when the iOS app owns local medication reminders; the server-side MEDICATION_REMINDER APNs cron is
                suppressed.
            deliveryDefault:
              type: string
              enum:
                - server
                - client
              description: 'Roaming user-level delivery default. "client" implies clientManaged: true.'
            lowStockRunwayDays:
              anyOf:
                - type: integer
                  minimum: 1
                  maximum: 60
                - type: "null"
              description: Low-stock alert threshold as remaining runway days (1–60). null = alert off. Default 7.
            reorderLeadDays:
              type: integer
              minimum: 0
              maximum: 60
              description: Reorder lead time in days (0–60) the low-stock alert assumes. The alert fires this lead plus one
                dose-interval before the supply runs out so a refill arrives before the last dose. Default 10; a
                per-medication reorderLeadDays overrides it.
          required:
            - clientManaged
            - deliveryDefault
            - lowStockRunwayDays
            - reorderLeadDays
          additionalProperties: false
        mood:
          type: object
          properties:
            reminderHour:
              type: integer
              minimum: 0
              maximum: 23
              description: Local-time hour for the daily mood reminder. Default 22.
          required:
            - reminderHour
          additionalProperties: false
        cycle:
          type: object
          properties:
            clientManaged:
              type: boolean
              description: True when the iOS app owns local cycle reminders; the server-side cycle APNs cron is suppressed.
          required:
            - clientManaged
          additionalProperties: false
        coach:
          type: object
          properties:
            nudgesEnabled:
              type: boolean
              description: Master switch for the proactive Coach nudge cron.
            nudgeMedication:
              type: boolean
              description: Medication-group nudge triggers (compliance).
            nudgeVitals:
              type: boolean
              description: Vitals-group nudge triggers (bp / score / weight / sleep).
            nudgeRoutine:
              type: boolean
              description: Routine-group nudge triggers (measurement gap / self-context).
            nudgeFrequency:
              type: string
              enum:
                - weekly
                - biweekly
              description: "Nudge frequency cap: one per 7 or per 14 days."
          required:
            - nudgesEnabled
            - nudgeMedication
            - nudgeVitals
            - nudgeRoutine
            - nudgeFrequency
          additionalProperties: false
      required:
        - medication
        - mood
        - cycle
        - coach
      additionalProperties: false
      description: Fully-resolved per-user notification preferences. Every key is present — a null / drifted persisted row
        resolves to the documented defaults.
