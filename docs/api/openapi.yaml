          type: "null"
        meta:
          type: object
          properties:
            requestId:
              type: string
          additionalProperties: false
      required:
        - data
        - error
      additionalProperties: false
    WebConsentGrantResponseEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/WebConsentGrantResponse"
        error:
          type: "null"
        meta:
          type: object
          properties:
            requestId:
              type: string
          additionalProperties: false
      required:
        - data
        - error
      additionalProperties: false
    WebConsentGrantResponse:
      type: object
      properties:
        minted:
          type: boolean
          description: True when a new `ai_full` receipt was minted; false when an active one already existed (idempotent no-op).
        kind:
          type: string
          const: ai_full
      required:
        - minted
        - kind
      additionalProperties: false
      description: Outcome of the idempotent web `ai_full` grant. Safe to call on every AI-settings mount.
    MedicationScheduleOutput:
      type: object
      properties:
        id:
          type: string
        medicationId:
          type: string
        windowStart:
          type: string
          description: Legacy single-time-of-intake (HH:mm, user local). Preserved for backwards compatibility; the new
            `timesOfDay` array supersedes it.
        windowEnd:
          type: string
          description: Legacy reminder-window upper bound (HH:mm). Used to derive the late-classification grace span when
            `reminderGraceMinutes` is null.
        label:
          anyOf:
            - type: string
            - type: "null"
        dose:
          anyOf:
            - type: string
            - type: "null"
          description: Per-schedule dose override. NULL means the schedule inherits `Medication.dose`.
        daysOfWeek:
          anyOf:
            - type: string
            - type: "null"
          description: Legacy persisted recurrence encoding (`null` | `1,3,5` | `i2;1,3,5`). v1.5 readers consult `rrule` first;
            the field is kept for pre-v1.5 rows. v1.6.0 drops the column.
        timesOfDay:
          type: array
          items:
            type: string
          description: v1.5 first-class points-in-time the dose is taken (HH:mm, user local). Backfilled to `[windowStart]` for
            every pre-v1.5 row.
        reminderGraceMinutes:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
          description: Reminder grace window in minutes. NULL falls back to the legacy `windowEnd - windowStart` span.
        rrule:
          anyOf:
            - type: string
            - type: "null"
          description: RFC 5545 RRULE string (subset). Used for calendar-anchored cadences. **Mutually exclusive with
            `rollingIntervalDays`** — exactly one of the two is non-null on any v1.5+ schedule (or both are null on
            legacy rows that haven't been touched since the migration).
        rollingIntervalDays:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
          description: Flexible-rolling interval in days, counted forward from the latest `MedicationIntakeEvent.takenAt`.
            **Mutually exclusive with `rrule`.**
        scheduleType:
          type: string
          enum:
            - SCHEDULED
            - PRN
            - CYCLIC
          description: v1.7.0 schedule-type discriminator. SCHEDULED = rrule / rolling / legacy cadence. PRN = as-needed (never
            projected, reminded, or counted in compliance expected; still loggable via the intake route). CYCLIC = N
            weeks on / M weeks off, gating whichever inner cadence the rrule / legacy fields describe.
        cyclicOnWeeks:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
          description: v1.7.0 cyclic "on" weeks. Only meaningful when `scheduleType` is CYCLIC; null otherwise.
        cyclicOffWeeks:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
          description: v1.7.0 cyclic "off" weeks. Only meaningful when `scheduleType` is CYCLIC; null otherwise.
      required:
        - id
        - medicationId
        - windowStart
        - windowEnd
        - label
        - dose
        - daysOfWeek
        - timesOfDay
        - reminderGraceMinutes
        - rrule
        - rollingIntervalDays
        - scheduleType
        - cyclicOnWeeks
        - cyclicOffWeeks
      additionalProperties: false
      description: Schedule entry attached to a medication. v1.5 promotes `timesOfDay` to first-class and introduces `rrule`
        (calendar-anchored cadences) and `rollingIntervalDays` (flexible-rolling cadences). The two recurrence
        primitives are mutually exclusive — enforced by the Zod refine on writes, the route layer, and a DB CHECK
        constraint (`medication_schedules_rrule_xor_rolling`). v1.7.0 adds `scheduleType` (SCHEDULED / PRN / CYCLIC) and
        the cyclic on/off-week fields.
    MedicationListLayoutOutput:
      type: object
      properties:
        version:
          type: number
          const: 1
        view:
          description: Which presentation /medications renders in. Default "cards". Optional on PUT — when omitted the stored
            value is preserved (preserve-when-absent, like `heroVisible` on the dashboard layout). Always present on
            responses.
          type: string
          enum:
            - cards
            - table
        order:
          description: User-defined manual medication order (medication ids, first = top), shared by both views. Display-only —
            unknown / deleted ids are ignored at render time, never 422. Optional on PUT (preserve-when-absent); always
            present on responses.
          maxItems: 200
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 64
      required:
        - version
      additionalProperties: false
      description: "Per-user /medications presentation: the card/table view choice plus the manual medication order shared by
        both views. Mirrors the dashboard-widgets / insights-layout contract."
    DisableCoachFlagOutput:
      type: object
      properties:
        disableCoach:
          type: boolean
      required:
        - disableCoach
      additionalProperties: false
      description: Per-account Coach opt-out toggle (v1.4.47 W3). `true` hides the Coach FAB and short-circuits its API gates.
    InsightsLayoutBodyOutput:
      type: object
      properties:
        version:
          anyOf:
            - type: number
              const: 1
            - type: number
              const: 2
        sections:
          maxItems: 50
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                enum:
                  - wellness-scores
                  - daily-briefing
                  - vitals
                  - trends
                  - period-review
                  - cycle-summary
                  - signals
                  - rhythm-events
              visible:
                type: boolean
              order:
                type: integer
                minimum: 0
                maximum: 99
            required:
              - id
              - visible
              - order
            additionalProperties: false
        tiles:
          minItems: 1
          maxItems: 50
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                enum:
                  - overview
                  - blood-pressure
                  - pulse
                  - oxygen
                  - body-temperature
                  - respiratory-rate
                  - weight
                  - bmi
                  - body-water
                  - bone-mass
                  - fat-free-mass
                  - fat-mass
                  - muscle-mass
                  - visceral-fat
                  - lean-body-mass
                  - steps
                  - active-energy
                  - workouts
                  - flights-climbed
                  - walking-distance
                  - walking-steadiness
                  - walking-heart-rate
                  - walking-asymmetry
                  - double-support-time
                  - step-length
                  - walking-speed
                  - cardio-fitness
                  - falls
                  - six-minute-walk
                  - stair-ascent-speed
                  - stair-descent-speed
                  - sleep
                  - breathing-disturbances
                  - resting-pulse
                  - hrv
                  - pulse-wave-velocity
                  - vascular-age
                  - cardio-recovery
                  - environmental-audio
                  - headphone-audio
                  - audio-events
                  - daylight
                  - blood-glucose
                  - skin-temperature
                  - wrist-temperature
                  - mood
                  - medications
                  - blutdruck
                  - puls
                  - sauerstoff
                  - koerpertemperatur
                  - gewicht
                  - aktive-energie
                  - schlaf
                  - ruhepuls
                  - stimmung
                  - medikamente
              visible:
                type: boolean
              order:
                type: integer
                minimum: 0
                maximum: 99
            required:
              - id
              - visible
              - order
            additionalProperties: false
      required:
        - version
      additionalProperties: false
      description: "Per-user Insights layout (v2). `tiles` is the per-metric pill list (ordered, with a visibility flag);
        `sections` is the additive v2 list of the overview's big semantic blocks (wellness-scores, daily-briefing,
        vitals, trends, period-review, cycle-summary, signals, rhythm-events), each with order + visibility. `version`
        is the layout schema version: BOTH 1 and 2 are accepted on input (a pre-v2 iOS client still PUTs `version: 1`);
        the server always normalises to the canonical v2 blob before persisting, and GET responses always carry
        `version: 2`. Both arrays are optional on input — a client sending only `tiles` (the pre-v2 contract) still
        validates, and the server fills missing defaults; a v1 blob with no `sections` resolves forward with all
        sections default-visible. Tile ids are a closed enum: the canonical ids are English (matching the routed
        `/insights/<slug>` sub-pages). The legacy German tile ids (blutdruck, puls, sauerstoff, koerpertemperatur,
        gewicht, aktive-energie, schlaf, ruhepuls, stimmung, medikamente) remain accepted on input for backward
        compatibility and are normalised to their English equivalents before persisting; GET responses always carry the
        canonical English ids. Section ids are English-only. The legacy tile ids are deprecated and will be removed in a
        future major version."
    Medication:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        dose:
          type: string
        treatmentClass:
          $ref: "#/components/schemas/MedicationTreatmentClass"
        dosesPerUnit:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
          description: Doses per pen / vial for inventory tracking. NULL = inventory tracking off.
        unitsPerDose:
          type: number
          description: v1.16.10 — inventory units one dose consumes (e.g. 2 tablets of 2 mg for a 4 mg dose). v1.16.12 — may be a
            split-pill fraction (¼ / ⅓ / ½ / ⅔ / ¾); thirds carry as ≈0.3333 / 0.6667. Default 1. The intake consumption
            hook decrements this many units per taken dose; dose-derived readouts divide unit counts by it.
        active:
          type: boolean
        notificationsEnabled:
          type: boolean
        liveActivityEnabled:
          type: boolean
          description: v1.7.0 iOS Live Activity opt-in for this medication's reminders. Default false. The iOS client owns the
            ActivityKit lifecycle; the server only stores + echoes the flag.
        criticalAlarmEnabled:
          type: boolean
          description: v1.7.0 iOS 26 AlarmKit critical-reminder opt-in. Default false. Critical alarms bypass the device mute
            switch / Focus; the server stores the preference only.
        atcCode:
          anyOf:
            - type: string
            - type: "null"
          description: v1.9.0 optional WHO ATC classification code (active-substance class, e.g. `A10BX10`).
            User/clinician-asserted; never machine-guessed. Emitted on the FHIR `medicationCodeableConcept` under
            `http://www.whocc.no/atc`. NULL = no code captured.
        rxNormCode:
          anyOf:
            - type: string
            - type: "null"
          description: v1.9.0 optional RxNorm RxCUI (numeric, US identifier, e.g. `2601723`). Secondary FHIR coding under
            `http://www.nlm.nih.gov/research/umls/rxnorm`, alongside any ATC code. NULL = no code captured.
        pausedAt:
          anyOf:
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
            - type: "null"
        snoozedUntil:
          anyOf:
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
            - type: "null"
        nextDueAt:
          anyOf:
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
            - type: "null"
          description: "v1.7.0 server-computed next due instant across all the medication's schedules (earliest
            `nextOccurrenceAfter`). Read-only — computed, not stored. NULL when no schedule has an upcoming slot
            (paused, one-shot in the past, `endsOn` crossed, every schedule PRN). v1.16.4 — when an unresolved slot's
            anchor has passed but the catch-up band is still open (`anchor < now <= overdueEnd`, current schedule era),
            this carries THAT slot (a past instant) with `nextDueOverdue: true` instead of jumping to the next future
            slot. The list GET is cached 60 s, so a 60 s staleness is accepted."
        nextDueOverdue:
          type: boolean
          description: "v1.16.4 — true when `nextDueAt` is an OPEN overdue slot: its anchor has passed, `now` is still inside the
            slot's catch-up band, and no taken / skipped / auto-missed row resolves it. False for a regular future
            next-due (and when `nextDueAt` is null). Read-only — computed, not stored."
        startsOn:
          anyOf:
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
            - type: "null"
          description: v1.5 course start (ISO date). Anchors RRULE BYDAY / BYMONTHDAY patterns and the rolling-interval
            countdown's first window. NULL means active from creation.
        endsOn:
          anyOf:
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
            - type: "null"
          description: v1.5 course end (ISO date). NULL means chronic. Equals `startsOn` when `oneShot` is true.
        oneShot:
          type: boolean
          description: v1.5 single-administration flag. When true the medication has at most one schedule (no `rrule` /
            `rollingIntervalDays`), and `active` auto-flips to false once the dose is logged.
        asNeeded:
          type: boolean
          description: "v1.16.11 as-needed (PRN) flag. When true the medication carries ZERO schedules (the write routes 422 on
            any schedule entry alongside the flag): it is never due (`nextDueAt` stays null), never reminded, and
            excluded from every compliance rate/streak — but intakes still log as ad-hoc rows, inventory still consumes
            per `unitsPerDose`, and the history renders. Stays active indefinitely. Mutually exclusive with `oneShot`."
        createdAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        updatedAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        schedules:
          type: array
          items:
            $ref: "#/components/schemas/MedicationScheduleOutput"
      required:
        - id
        - name
        - dose
        - treatmentClass
        - dosesPerUnit
        - unitsPerDose
        - active
        - notificationsEnabled
        - liveActivityEnabled
        - criticalAlarmEnabled
        - atcCode
        - rxNormCode
        - pausedAt
        - snoozedUntil
        - nextDueAt
        - nextDueOverdue
        - startsOn
        - endsOn
        - oneShot
        - asNeeded
        - createdAt
        - updatedAt
        - schedules
      additionalProperties: false
      description: Server-shaped medication row returned by GET / POST / PUT endpoints. Carries the v1.5 course-window fields
        (`startsOn`, `endsOn`, `oneShot`) at the medication level and the per-schedule cadence fields on the nested
        `schedules` array.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: hlk_<64hex>
      description: Native-client API token. Use the `token` field returned by /api/auth/login on a native client.
    cookieAuth:
      type: apiKey
      in: cookie
      name: healthlog_session
      description: Browser session cookie — set by /api/auth/login.
