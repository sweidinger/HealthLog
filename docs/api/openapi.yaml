        presentInputs:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Inputs actually present in the user's data.
        historyDays:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Distinct days of history backing the value (the gating floor).
        missing:
