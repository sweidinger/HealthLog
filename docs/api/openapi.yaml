    InsightsLayoutBody:
      type: object
      properties:
        version:
          anyOf:
            - type: number
              const: 1
            - type: number
              const: 2
        sections:
          maxItems: 50
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                enum:
                  - wellness-scores
                  - daily-briefing
                  - vitals
                  - trends
                  - period-review
                  - cycle-summary
                  - signals
                  - rhythm-events
              visible:
                type: boolean
              order:
                type: integer
                minimum: 0
                maximum: 99
            required:
              - id
              - visible
              - order
        tiles:
          minItems: 1
          maxItems: 50
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                enum:
                  - overview
                  - blood-pressure
                  - pulse
                  - oxygen
                  - body-temperature
                  - respiratory-rate
                  - weight
                  - bmi
                  - body-water
                  - bone-mass
                  - fat-free-mass
                  - fat-mass
                  - muscle-mass
                  - visceral-fat
                  - lean-body-mass
                  - steps
                  - active-energy
                  - workouts
                  - flights-climbed
                  - walking-distance
                  - walking-steadiness
                  - walking-heart-rate
                  - walking-asymmetry
                  - double-support-time
                  - step-length
                  - walking-speed
                  - cardio-fitness
                  - falls
                  - six-minute-walk
                  - stair-ascent-speed
                  - stair-descent-speed
                  - sleep
                  - breathing-disturbances
                  - resting-pulse
                  - hrv
                  - pulse-wave-velocity
                  - vascular-age
                  - cardio-recovery
                  - environmental-audio
                  - headphone-audio
                  - audio-events
                  - daylight
                  - blood-glucose
                  - skin-temperature
                  - wrist-temperature
                  - mood
                  - medications
                  - blutdruck
                  - puls
                  - sauerstoff
                  - koerpertemperatur
                  - gewicht
                  - aktive-energie
                  - schlaf
                  - ruhepuls
                  - stimmung
                  - medikamente
              visible:
                type: boolean
              order:
                type: integer
                minimum: 0
                maximum: 99
            required:
              - id
              - visible
              - order
      required:
        - version
      description: "Per-user Insights layout (v2). `tiles` is the per-metric pill list (ordered, with a visibility flag);
        `sections` is the additive v2 list of the overview's big semantic blocks (wellness-scores, daily-briefing,
        vitals, trends, period-review, cycle-summary, signals, rhythm-events), each with order + visibility. `version`
        is the layout schema version: BOTH 1 and 2 are accepted on input (a pre-v2 iOS client still PUTs `version: 1`);
        the server always normalises to the canonical v2 blob before persisting, and GET responses always carry
        `version: 2`. Both arrays are optional on input — a client sending only `tiles` (the pre-v2 contract) still
        validates, and the server fills missing defaults; a v1 blob with no `sections` resolves forward with all
        sections default-visible. Tile ids are a closed enum: the canonical ids are English (matching the routed
        `/insights/<slug>` sub-pages). The legacy German tile ids (blutdruck, puls, sauerstoff, koerpertemperatur,
        gewicht, aktive-energie, schlaf, ruhepuls, stimmung, medikamente) remain accepted on input for backward
        compatibility and are normalised to their English equivalents before persisting; GET responses always carry the
        canonical English ids. Section ids are English-only. The legacy tile ids are deprecated and will be removed in a
        future major version."
    CoachReminderCreate:
      type: object
      properties:
        note:
          type: string
          minLength: 1
          maxLength: 280
        when:
          type: string
          minLength: 1
          maxLength: 32
        metric:
          type: string
          minLength: 1
          maxLength: 60
          pattern: ^[A-Za-z][A-Za-z0-9_]*$
      required:
        - note
      additionalProperties: false
      description: "Create a Coach reminder manually. `note` is free text (the only writable content). `when` is an optional
        closed grammar token — an ISO date (YYYY-MM-DD), a relative offset (+Nd / +Nw), or a context cue
        (NEXT_BP_LOGGED, NEXT_WEIGHT_LOGGED, NEXT_SLEEP_LOGGED, NEXT_APP_OPEN) — resolved into the trigger server-side.
        Omit `when` for a recall-only note. Strict: unknown keys 422."
    CoachReminderPatch:
      type: object
      properties:
        status:
          type: string
          enum:
            - proposed
            - active
            - due
            - surfaced
            - done
            - dismissed
        when:
          anyOf:
            - type: string
              minLength: 1
              maxLength: 32
            - type: "null"
      additionalProperties: false
      description: "Update a Coach reminder's lifecycle. `status` confirms (proposed → active), or marks done / dismissed.
        `when` re-schedules via the closed grammar (null clears the due moment). Never carries the note text. Strict:
        unknown keys 422."
    CoachSuggestedAction:
      oneOf:
