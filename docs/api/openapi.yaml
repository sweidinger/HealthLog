        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkMedicationIntakeRequest"
      responses:
        "200":
          description: Batch processed (always 200 on a well-formed body).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMedicationIntakeResponseEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
