  /api/share-links:
    post:
      tags:
        - Export
      summary: Create a clinician share link (v1.11.0)
      description: "Owner-only. Mints an `hls_` token (192-bit), stores only its HMAC hash, and returns the raw token EXACTLY
        ONCE in the response. v1.18.7 also mints a passphrase second factor (returned once as `passphrase`, with
        `shareUrl` and a `qrUrl` carrying the passphrase in the URL fragment); a leaked URL without the passphrase
        cannot open the record. Every scope column (window, sections, FHIR resource types, API toggle) is frozen
        write-once. `expiresAt` is required and capped at 90 days. Auth via cookie or Bearer; rate-limited
        (`share-link:<userId>`, 20/h). Strict: unknown keys 422."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  minLength: 1
                  maxLength: 120
                rangeStart:
                  type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                rangeEnd:
                  anyOf:
                    - type: string
                      format: date-time
                      pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                    - type: "null"
                sections:
                  type: object
                  properties:
                    vitals:
                      type: object
                      properties:
                        weight:
                          type: boolean
                        bp:
                          type: boolean
                        pulse:
                          type: boolean
                        oxygenSaturation:
                          type: boolean
                        bodyFat:
                          type: boolean
                        bodyComposition:
                          type: boolean
                    cardioFitness:
                      type: object
                      properties:
                        restingHeartRate:
                          type: boolean
                        hrv:
                          type: boolean
                        vo2max:
                          type: boolean
                    activity:
                      type: object
                      properties:
                        steps:
                          type: boolean
                        distance:
                          type: boolean
                        energy:
                          type: boolean
                        sleep:
                          type: boolean
                    glucose:
                      type: boolean
                    medications:
                      type: object
                      properties:
                        list:
                          type: boolean
                        compliance:
                          type: boolean
                        glp1:
                          type: boolean
                        sideEffects:
                          type: boolean
                    mood:
                      type: boolean
                    bmi:
                      type: boolean
                    cycle:
                      type: boolean
                    labs:
                      type: boolean
                resourceTypes:
                  maxItems: 8
                  type: array
                  items:
                    type: string
                    enum:
                      - Patient
                      - Observation
                      - MedicationStatement
                      - MedicationAdministration
                allowFhirApi:
                  type: boolean
                expiresAt:
                  type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
              required:
                - label
                - rangeStart
                - expiresAt
              additionalProperties: false
      responses:
        "201":
          description: Share link created. `token` carries the raw `hls_` value and is unrecoverable after this response.
          content:
            application/json:
              schema:
