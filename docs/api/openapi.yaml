    MeasurementsSeriesResponse:
      type: object
      properties:
        kind:
          type: string
          enum:
            - weight
            - bloodPressure
            - pulse
            - bodyFat
            - glucose
            - sleep
            - steps
            - totalBodyWater
            - boneMass
            - oxygenSaturation
            - restingHeartRate
            - heartRateVariability
            - vo2Max
        unit:
          type: string
          description: Resolved unit token for `value`. `glucose` follows the user's mg/dL|mmol/L preference; `sleep` is `h`
            (per-night time-asleep in hours).
        points:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: Measurement row id, or `sleep:<wake-day>` for a sleep night.
              at:
                type: string
                format: date-time
                pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                description: Point timestamp (ISO-8601).
              value:
                type: number
                description: Primary value in the top-level `unit`.
              secondary:
                anyOf:
                  - type: number
                  - type: "null"
                description: Diastolic value for `kind=bloodPressure` (paired within ±5 min); null for every other kind.
              sleepStages:
                description: Per-stage hours for a `kind=sleep` night (CORE/DEEP/REM/…); null/absent for non-sleep kinds.
                anyOf:
                  - type: object
                    propertyNames:
                      type: string
                    additionalProperties:
                      type: number
                  - type: "null"
              valueMin:
                description: "v1.19.2 (iOS #34 extension) — per-point MINIMUM for `kind=pulse`. On an aggregated hourly heart-rate
                  bucket `value` is the hour's average and this is the hour's low; null on a per-sample PULSE row and
                  absent for every other kind."
                anyOf:
                  - type: number
                  - type: "null"
              valueMax:
                description: "v1.19.2 (iOS #34 extension) — per-point MAXIMUM for `kind=pulse`. On an aggregated hourly heart-rate
                  bucket `value` is the hour's average and this is the hour's high; null on a per-sample PULSE row and
                  absent for every other kind."
                anyOf:
                  - type: number
                  - type: "null"
            required:
              - id
              - at
              - value
              - secondary
            additionalProperties: false
        stats:
          type: object
          properties:
            mean:
              type: number
            min:
              type: number
            max:
              type: number
            stdDev:
              type: number
            count:
              type: integer
              minimum: 0
              maximum: 9007199254740991
          required:
            - mean
            - min
            - max
            - stdDev
            - count
          additionalProperties: false
          description: Summary over the returned points; all-zero when empty.
      required:
        - kind
        - unit
        - points
        - stats
      additionalProperties: false
      description: "iOS-friendly per-kind time series: one point per reading (or per reconstructed night for `sleep`), an
        explicit `unit` token, and a summary `stats` block."
