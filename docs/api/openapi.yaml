  /api/c/{token}/unlock:
    post:
      tags:
        - Export
      summary: Verify a share-link passphrase (v1.18.7, public)
      description: Anonymous, no-session passphrase gate for a protected share link. The raw path token plus the submitted
        passphrase are the only credentials. On success the server sets a short-lived (30 min), token-scoped, httpOnly
        cookie so `/c/<token>` renders the record. Rate-limited (`share-unlock:<tokenHash>:<ip>`); every failure class
        (bad token, no passphrase set, wrong passphrase) answers one blunt 401.
      parameters:
        - in: path
          name: token
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
                  minLength: 1
                  maxLength: 64
              required:
                - passphrase
              additionalProperties: false
      responses:
        "200":
          description: Passphrase accepted; short-lived token-scoped unlock cookie set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLinkUnlock"
        "401":
          description: Invalid passphrase (blunt — no failure detail leaked).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /c/{token}/d/{id}:
    get:
      tags:
        - Export
      summary: Serve a shared document blob (v1.28, public)
      description: "Anonymous, no-session share-scoped document serve route. The raw `hls_` share token in the path is the
        ONLY credential — never a session; it never elevates a normal authed route. Serves ONLY a document id present in
        the link's frozen `documentIds` set (a guessed / foreign / soft-deleted id → flat 404). A passphrase-protected
        link additionally requires the short-lived, token-scoped unlock cookie; revocation and expiry collapse to the
        same flat 404. The serving-class posture is identical to the owner `/api/documents/inbound/{id}/original` route:
        Class A (PDF/JPEG/PNG/WebP/GIF) inline with its true type, everything else `application/octet-stream` +
        `Content-Disposition: attachment` + `X-Content-Type-Options: nosniff`; `Cache-Control: private, no-store`.
        Images (JPEG/PNG/WebP) are EXIF/XMP/GPS-stripped at egress (the stored original is untouched);
        PDF/TIFF/HEIC/Office metadata passes through. Per-link rate-limited."
      parameters:
        - in: path
          name: token
          schema:
            type: string
            description: Raw `hls_` share token.
          required: true
          description: Raw `hls_` share token.
        - in: path
          name: id
          schema:
            type: string
            description: A document id on the link's frozen set.
          required: true
          description: A document id on the link's frozen set.
      responses:
        "200":
          description: The document bytes. Content-Type is the true stored type for Class A (inline) or `application/octet-stream`
            for Class B (attachment).
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Flat 404 for every miss class (unknown/revoked/expired token, locked passphrase gate, or an id not on the
            frozen set).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Per-link serve rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
