      type: object
      properties:
        count:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Reading count composed across buckets.
        min:
          anyOf:
            - type: number
            - type: "null"
          description: Window minimum; null when empty.
        max:
          anyOf:
            - type: number
            - type: "null"
          description: Window maximum; null when empty.
        mean:
          anyOf:
            - type: number
            - type: "null"
          description: Count-weighted mean across buckets; null when empty.
        sum:
          anyOf:
            - type: number
            - type: "null"
