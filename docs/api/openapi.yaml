        - liveActivityEnabled
        - criticalAlarmEnabled
        - atcCode
        - rxNormCode
        - pausedAt
        - snoozedUntil
        - nextDueAt
        - nextDueOverdue
        - startsOn
        - endsOn
        - oneShot
        - asNeeded
        - createdAt
        - updatedAt
        - schedules
        - category
        - lastTakenAt
        - todayEventCount
        - stockUnitsRemaining
        - stockDosesRemaining
      additionalProperties: false
