  /api/medications/{id}/schedule-revisions:
    get:
      tags:
        - Medications
      summary: List a medication's archived schedule eras
      description: Returns every archived schedule era (newest first) plus `currentSince`, the instant the live plan took
        over. The dose-history ledger and compliance tallies already mint past days against these eras; this read powers
        the Zeitplan-tab history timeline.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Era list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScheduleRevisionsResponse"
        "401": *a1
        "404":
          description: Medication not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
    post:
      tags:
        - Medications
      summary: Append a manual schedule era (pre-tracking history)
      description: Records that the medication dosed at the given daily times during `[validFrom, validUntil)` — history from
        before the schedule was edited in the app. The era must end at or before the start of the live plan and must not
        overlap an existing era; violations return 422. The snapshot is shaped exactly like a write-path archive
        (`FREQ=DAILY`, window pulled to the min/max of the times), so every historical surface reads it transparently.
        Audits as `medication.schedule_revision.created`.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleRevisionRequest"
      responses:
        "201":
          description: Manual era created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScheduleRevisionResponse"
        "401": *a1
        "404":
          description: Medication not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/medications/{id}/schedule-revisions/{revisionId}:
    patch:
      tags:
        - Medications
      summary: Correct a recorded schedule era
      description: "Replaces an era's bounds and daily times. A `MANUAL` era updates in place; an `ARCHIVED` era stays as the
        immutable audit record and the correction is minted as a superseding `MANUAL` revision that takes its place in
        every historical surface (the response carries the correction's id). Validation mirrors the sibling POST: the
        era must end at or before the start of the live plan and must not overlap another active era; violations return
        422. An era that has already been corrected refuses with 409. Audits as `medication.schedule_revision.updated`."
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
        - in: path
          name: revisionId
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleRevisionRequest"
      responses:
        "200":
          description: Era corrected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScheduleRevisionResponse"
        "401": *a1
        "404":
          description: Medication or revision not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: The revision has already been superseded by a correction.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
    delete:
      tags:
        - Medications
      summary: Delete a manually added schedule era
      description: "Removes a `MANUAL` era — one appended through the sibling POST, or a correction minted by PATCH (deleting
        a correction restores the archived original it superseded). Write-path archives (`source: ARCHIVED`) are
        immutable history and refuse with 409. Audits as `medication.schedule_revision.deleted`."
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
        - in: path
          name: revisionId
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Deletion succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteScheduleRevisionResponse"
        "401": *a1
        "404":
          description: Medication or revision not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: The revision is a write-path archive (`ARCHIVED`) and cannot be deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
