  /api/user/avatar:
    post:
      tags:
        - Auth
      summary: Upload the calling user's avatar
      description: "Multipart upload (field `file`). Accepts image/jpeg, image/png, image/webp; rejects anything else at the
        magic-byte sniff (the multipart Content-Type header is informational only). Hard caps: 2 MiB body, 2048×2048
        dimensions. Replaces the v1.4.22 Gravatar leak by storing the bytes on the User row + serving them from
        same-origin."
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  description: Binary image payload (JPEG / PNG / WebP). Hard-capped at 2 MiB and 2048×2048.
              required:
                - file
      responses:
        "201":
          description: Avatar saved. `avatarUrl` is the same value the /me payload returns; the `?v=` suffix busts client caches
            on re-upload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadAvatarResponse"
        "401": *a1
        "413":
          description: Upload exceeds the 2 MiB byte limit or the 2048×2048 dimension limit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          description: Image format is not one of JPEG / PNG / WebP (magic-byte sniff).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a2
        "429": *a3
    delete:
      tags:
        - Auth
      summary: Clear the calling user's avatar
      description: Resets the avatar columns to null. Idempotent — a delete on an already-empty row returns 204 with no
        audit-log row.
      responses:
        "204":
          description: Avatar cleared (or already empty).
        "401": *a1
        "422": *a2
        "429": *a3
  /api/user/avatar/{id}:
    get:
      tags:
        - Auth
      summary: Serve a user's avatar bytes
      description: Owner-scoped. The `{id}` path segment must match the calling user's id — cross-user reads return 403.
        Response body is the raw image bytes with the persisted `Content-Type`; the /me payload appends
        `?v={updatedAtMs}` so clients can cache aggressively.
      parameters:
        - in: path
          name: id
          schema:
            type: string
            description: User id (must match the calling user).
          required: true
          description: User id (must match the calling user).
      responses:
        "200":
          description: Avatar bytes.
          content:
            image/jpeg:
              schema:
                type: string
                description: Raw JPEG bytes.
            image/png:
              schema:
                type: string
                description: Raw PNG bytes.
            image/webp:
              schema:
                type: string
                description: Raw WebP bytes.
        "401": *a1
        "403":
          description: Caller is not the avatar's owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: The user has no uploaded avatar.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a2
        "429": *a3
  /api/insights/chat/messages/{id}/feedback:
    post:
      tags:
        - Insights
      summary: Rate a Coach assistant message
      description: Persists a helpful/unhelpful rating for a single Coach reply. Reuses the v1.4.16 RecommendationFeedback
        table via the polymorphic `targetType` column. The aggregator buckets ratings by (promptVersion, tone,
        verbosity).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachMessageFeedbackRequest"
      responses:
        "201":
          description: Feedback saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachMessageFeedbackResponse"
        "401": *a1
        "404":
          description: Message not found or not owned by the caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Caller has already rated this message text.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a2
        "429": *a3
  /api/admin/notifications/diagnostic:
    get:
      tags:
        - Admin
      summary: Admin notification diagnostic snapshot
      description: "Admin-only. Returns what the dispatcher would see when targeting the calling admin's account: registered
        devices (APNs tokens masked to prefix + suffix), per-channel enabled + configPresent flags, and recent push
        attempts (currently always `[]` pending the v1.4.48+ PushAttempt table). Cookie auth only — never Bearer."
      responses:
        "200":
          description: Diagnostic snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDiagnosticResponse"
        "401": *a1
        "403":
          description: Caller is not an admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a2
        "429": *a3
  /api/insights/comprehensive:
    get:
      tags:
        - Insights
      summary: Comprehensive AI insights bundle
      description: Full Insights surface — daily briefing, recommendations with rationale, optional weekly report + storyboard
        annotations. Strict-schema validated server-side.
      responses:
        "200":
          description: Insights bundle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightsComprehensiveResponseEnvelope"
        "401": *a1
        "422": *a2
        "429": *a3
components:
  schemas:
    PasskeyLoginVerifyRequest:
      type: object
      properties:
        challengeId:
          type: string
          minLength: 1
          description: Server-issued WebAuthn challenge id.
        credential:
          type: object
          properties:
            id:
              type: string
            rawId:
              type: string
            type:
              type: string
              const: public-key
            response:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
            authenticatorAttachment:
              type: string
              enum:
                - platform
                - cross-platform
            clientExtensionResults:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
          required:
            - id
            - rawId
            - type
            - response
          description: SimpleWebAuthn-style assertion response payload.
      required:
        - challengeId
        - credential
      description: Passkey assertion verification. Same native-client token issuance as the password path.
    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
          description: Caller-presented refresh token (`hlr_<64hex>`).
        revoke:
          description: When true, revoke the supplied token instead of rotating.
          type: boolean
      required:
        - refreshToken
      description: Exchange a one-time-use refresh token for a fresh access + refresh pair.
    AppleHealthBatchRequest:
      type: object
      properties:
        entries:
          minItems: 1
          maxItems: 500
          type: array
          items:
            $ref: "#/components/schemas/AppleHealthBatchEntry"
      required:
        - entries
      description: Apple Health batch ingest. ≤500 entries per call; idempotent via `Idempotency-Key`.
    AppleHealthBatchEntry:
      type: object
      properties:
        hkIdentifier:
          type: string
          minLength: 1
          maxLength: 120
          description: HealthKit identifier (e.g. `HKQuantityTypeIdentifierBodyMass`).
        value:
          type: number
        unit:
          type: string
          minLength: 1
          maxLength: 60
        startDate:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        endDate:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        sleepStage:
          description: HKCategoryValueSleepAnalysis codepoint; only for sleep samples.
          type: integer
          minimum: 0
          maximum: 20
        externalId:
          type: string
          minLength: 1
          maxLength: 120
          description: HKSample.uuid string — the dedup key.
        externalSourceVersion:
          type: string
          minLength: 1
          maxLength: 120
        deviceType:
          description: Device class mapped from `HKDevice.model`. Used by the analytics aggregator to break ties when the same
            source contributed multiple devices for the same day. Omit (or send null) on legacy clients — the server
            treats it as `unknown` and the picker falls through.
          anyOf:
            - type: string
              enum:
                - watch
                - band
                - ring
                - phone
                - scale
                - other
                - unknown
            - type: "null"
      required:
        - hkIdentifier
        - value
        - unit
        - startDate
        - endDate
        - externalId
    MeasurementsDeleteByExternalIdsRequest:
      type: object
      properties:
        externalIds:
          minItems: 0
          maxItems: 500
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 120
      required:
        - externalIds
      description: iOS deletion-sync. Up to 500 externalIds per call; matching rows owned by other users are silently skipped
        (cross-user 404 guard).
    DeviceRegisterRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 8
          maxLength: 512
          pattern: ^[A-Za-z0-9+/=._:-]+$
          description: Generic device identifier (legacy; APNs token below).
        bundleId:
          type: string
          minLength: 1
          maxLength: 128
        locale:
          type: string
          minLength: 2
          maxLength: 16
        appVersion:
          type: string
          minLength: 1
          maxLength: 32
        model:
          type: string
          minLength: 1
          maxLength: 64
        apnsToken:
          description: Hex-encoded APNs device token. Must be paired with `apnsEnvironment`.
          type: string
          minLength: 8
          maxLength: 256
          pattern: ^[A-Fa-f0-9]+$
        apnsEnvironment:
          description: Gateway the iOS client received `apnsToken` from. Server never auto-detects.
          type: string
          enum:
            - sandbox
            - production
      required:
        - token
        - bundleId
      description: Native device registration. Re-registering an APNs token belonging to another user returns 409
        (cross-user-hijack guard).
    CreateMedicationRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        dose:
          type: string
          minLength: 1
          maxLength: 50
        category:
          type: string
          enum:
            - BLOOD_PRESSURE
            - VITAMIN
            - SUPPLEMENT
            - PAIN_RELIEF
            - ALLERGY
            - DIGESTIVE
            - THYROID
            - HORMONE
            - SKIN
            - SLEEP_AID
            - DIABETES
            - ANTIBIOTIC
            - OTHER
        treatmentClass:
          type: string
          enum:
            - GENERIC
            - GLP1
        dosesPerUnit:
          type: integer
          minimum: 1
          maximum: 100
        notificationsEnabled:
          type: boolean
        startsOn:
          description: Date the medication course begins (ISO `YYYY-MM-DD`). Anchors RRULE BYDAY / BYMONTHDAY patterns and the
            rolling-interval countdown's first window. NULL = active from creation (the legacy implicit behaviour).
            Required when `oneShot` is true.
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: "null"
        endsOn:
          description: Date the medication course ends (ISO `YYYY-MM-DD`). NULL = no end date (chronic). When `oneShot` is true
            the route normalises `endsOn` to equal `startsOn`.
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: "null"
        oneShot:
          description: Single-administration medication (e.g. flu shot, post-op single dose). When true the medication has at most
            one schedule with no `rrule` / `rollingIntervalDays`, and `active` auto-flips to false once the dose is
            logged (non-skipped).
          type: boolean
        schedules:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/MedicationScheduleInput"
      required:
        - name
        - dose
        - schedules
      description: 'Create-medication body. The route enforces the v1.5 cross-field invariants on top of the per-schedule
        `rrule_xor_rolling` Zod refine: a `oneShot:true` medication may carry at most one schedule and that schedule
        must not declare a recurrence; `endsOn` is normalised to equal `startsOn` for one-shot doses; a recurring
        schedule with no `rrule`, `rollingIntervalDays`, or legacy `daysOfWeek` defaults to `rrule = "FREQ=DAILY"`; and
        `timesOfDay` is dual-written from `windowStart` when the caller omits it.'
    MedicationScheduleInput:
      type: object
      properties:
        windowStart:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
          description: Legacy single-time-of-intake (HH:mm, user local). v1.5 keeps the field for backwards compatibility with
            pre-wizard iOS clients; the new `timesOfDay` array supersedes it.
        windowEnd:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
          description: Legacy reminder-window upper bound (HH:mm). Used to derive the late-classification grace span when
            `reminderGraceMinutes` is null.
        label:
          description: Optional human label (e.g. "Morning", "Evening").
          type: string
          maxLength: 50
        dose:
          description: Per-schedule dose override. NULL means the schedule inherits `Medication.dose`.
          type: string
          maxLength: 50
        daysOfWeek:
          description: Legacy day-of-week filter (0=Sunday..6=Saturday). v1.5 reads new writes through `rrule` first; this field
            is preserved for pre-v1.5 rows and is the input the route serialises into the persisted `days_of_week`
            string.
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 6
        intervalWeeks:
          description: Legacy multi-week stride (1..4). Bi-weekly + tri-weekly were broken in the pre-v1.5 reminder worker; new
            writes encode the same intent via `rrule` (e.g. `FREQ=WEEKLY;INTERVAL=2;BYDAY=WE`).
          type: integer
          minimum: 1
          maximum: 4
        timesOfDay:
          description: v1.5 first-class points-in-time the dose is taken (HH:mm, user local). Up to 8 entries. Absent or empty
            means the route stamps `[windowStart]` so the new engine always sees a populated array.
          maxItems: 8
          type: array
          items:
            type: string
            pattern: ^([01]\d|2[0-3]):([0-5]\d)$
        reminderGraceMinutes:
          description: Reminder grace window in minutes. Caps at 24h. NULL falls back to the legacy `windowEnd - windowStart` span.
          type: integer
          minimum: 1
          maximum: 1440
        rrule:
          description: "RFC 5545 RRULE string (subset). Use for daily / weekly-with-BYDAY / multi-week / monthly / yearly
            cadences. Mutually exclusive with `rollingIntervalDays`. Examples: `FREQ=DAILY`,
            `FREQ=WEEKLY;BYDAY=MO,WE,FR`, `FREQ=WEEKLY;INTERVAL=2;BYDAY=WE`, `FREQ=MONTHLY;BYMONTHDAY=1`,
            `FREQ=YEARLY;BYMONTH=1;BYMONTHDAY=1`."
          type: string
          maxLength: 200
          pattern: ^FREQ=(?:DAILY|WEEKLY|MONTHLY|YEARLY)(?:;(?:INTERVAL=\d{1,3}|BYDAY=(?:MO|TU|WE|TH|FR|SA|SU)(?:,(?:MO|TU|WE|TH|FR|SA|SU))*|BYMONTHDAY=-?\d{1,2}(?:,-?\d{1,2})*|BYMONTH=\d{1,2}(?:,\d{1,2})*|COUNT=\d{1,4}|UNTIL=\d{8}T\d{6}Z))*$
        rollingIntervalDays:
          description: Flexible-rolling interval in days, counted forward from the latest `MedicationIntakeEvent.takenAt` (the
            dose re-anchors when logged). Mutually exclusive with `rrule`. Range 1..365.
          type: integer
          minimum: 1
          maximum: 365
      required:
        - windowStart
        - windowEnd
      description: Single schedule entry on a medication. v1.5 introduces `timesOfDay`, `rrule`, `rollingIntervalDays`, and
        `reminderGraceMinutes` as first-class fields; `windowStart`, `windowEnd`, `daysOfWeek`, and `intervalWeeks` are
        preserved through the v1.5.x line for backwards compatibility. **`rrule` and `rollingIntervalDays` are mutually
        exclusive** — supplying both fails 422 (`rrule_xor_rolling`). The DB enforces the same invariant via a CHECK
        constraint.
    UpdateMedicationRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        dose:
          type: string
          minLength: 1
          maxLength: 50
        category:
          type: string
          enum:
            - BLOOD_PRESSURE
            - VITAMIN
            - SUPPLEMENT
            - PAIN_RELIEF
            - ALLERGY
            - DIGESTIVE
            - THYROID
            - HORMONE
            - SKIN
            - SLEEP_AID
            - DIABETES
            - ANTIBIOTIC
            - OTHER
        treatmentClass:
          type: string
          enum:
            - GENERIC
            - GLP1
        dosesPerUnit:
          anyOf:
            - type: integer
              minimum: 1
              maximum: 100
            - type: "null"
        active:
          type: boolean
        notificationsEnabled:
          type: boolean
        startsOn:
          description: Date the medication course begins (ISO `YYYY-MM-DD`). Anchors RRULE BYDAY / BYMONTHDAY patterns and the
            rolling-interval countdown's first window. NULL = active from creation (the legacy implicit behaviour).
            Required when `oneShot` is true.
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: "null"
        endsOn:
          description: Date the medication course ends (ISO `YYYY-MM-DD`). NULL = no end date (chronic). When `oneShot` is true
            the route normalises `endsOn` to equal `startsOn`.
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: "null"
        oneShot:
          description: Single-administration medication (e.g. flu shot, post-op single dose). When true the medication has at most
            one schedule with no `rrule` / `rollingIntervalDays`, and `active` auto-flips to false once the dose is
            logged (non-skipped).
          type: boolean
        schedules:
          type: array
          items:
            $ref: "#/components/schemas/MedicationScheduleInput"
      description: Update-medication body. Every field is optional; omitted fields are left untouched. Supplying `schedules`
        REPLACES the medication's full schedule list (the route deletes existing rows before re-creating). Flipping
        `active` to false records the current timestamp on `pausedAt`; flipping back to true clears it. v1.5 invariants
        on the `schedules` array match the create path.
    MedicationIntakeRequest:
      type: object
      properties:
        medicationId:
          type: string
          minLength: 1
          description: Server-narrowed from the URL path. The route layer overwrites whatever the body supplies before Zod parsing
            so a caller cannot log an intake against another medication.
        scheduledFor:
          description: Slot the dose belongs to. Defaults to `takenAt` (or `now()` when both are absent) so the compliance pairing
            logic can pin the dose to a schedule slot.
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        takenAt:
          description: When the dose was actually taken. NULL when `skipped` is true; defaults to `now()` for non-skipped intakes.
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        skipped:
          default: false
          description: True to log a skipped slot (no consumption, no inventory decrement, one-shot medications stay active).
          type: boolean
        idempotencyKey:
          description: Caller-issued de-dup key. A second POST with the same key returns the original event without creating a new
            row.
          type: string
          maxLength: 128
      required:
        - medicationId
      description: Per-medication intake log body. Idempotent via `idempotencyKey`; the server also dedupes by a 60-second
        sliding window when the key is absent. Non-skipped intakes auto-decrement pen inventory (best-effort), refresh
        the per-day compliance rollup, and — for one-shot medications — flip `active` to false.
    MedicationExtractRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 2000
          description: Free-text medication description (any locale). Up to 2 000 characters. The model never echoes the text back
            into another tenant — it is only used to produce the structured fields.
        locale:
          description: Optional UI locale hint for the model.
          type: string
          enum:
            - en
            - de
            - es
            - fr
            - it
            - pl
        today:
          description: "Optional override of the reference date used to resolve relative phrases (\"tomorrow\", \"next Monday\").
            Format: `YYYY-MM-DD`. Defaults to the server's UTC day."
          type: string
          pattern: ^\d{4}-\d{2}-\d{2}$
      required:
        - text
      description: Free-text medication description payload. The route runs the text through the Coach provider chain and
        returns a partial structured payload the wizard merges. Rate-limited 10 requests / 5 minutes / user;
        budget-gated against the daily Coach token ceiling.
    DisableCoachFlag:
      type: object
      properties:
        disableCoach:
          type: boolean
      required:
        - disableCoach
      description: Per-account Coach opt-out toggle (v1.4.47 W3). `true` hides the Coach FAB and short-circuits its API gates.
    CoachMessageFeedbackRequest:
      type: object
      properties:
        rating:
          type: string
          enum:
            - helpful
            - unhelpful
        reason:
          type: string
          minLength: 1
          maxLength: 200
      required:
        - rating
      description: Per-message helpful/unhelpful feedback (v1.4.23 H7). Optional `reason` is free-form prose, capped at 200 chars.
    MedicationTreatmentClass:
      type: string
      enum:
        - GENERIC
        - GLP1
      description: Prisma-level treatment-class discriminator. `GLP1` unlocks the GLP-1 specialist surfaces (injection-site
        rotation, titration history, pen inventory, GLP-1-aware Coach).
    MedicationSchedule:
      type: object
      properties:
        id:
          type: string
        medicationId:
          type: string
        windowStart:
          type: string
          description: Legacy single-time-of-intake (HH:mm, user local). Preserved for backwards compatibility; the new
            `timesOfDay` array supersedes it.
        windowEnd:
          type: string
          description: Legacy reminder-window upper bound (HH:mm). Used to derive the late-classification grace span when
            `reminderGraceMinutes` is null.
        label:
          anyOf:
            - type: string
            - type: "null"
        dose:
          anyOf:
            - type: string
            - type: "null"
          description: Per-schedule dose override. NULL means the schedule inherits `Medication.dose`.
        daysOfWeek:
          anyOf:
            - type: string
            - type: "null"
          description: Legacy persisted recurrence encoding (`null` | `1,3,5` | `i2;1,3,5`). v1.5 readers consult `rrule` first;
            the field is kept for pre-v1.5 rows. v1.6.0 drops the column.
        timesOfDay:
          type: array
          items:
            type: string
          description: v1.5 first-class points-in-time the dose is taken (HH:mm, user local). Backfilled to `[windowStart]` for
            every pre-v1.5 row.
        reminderGraceMinutes:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
          description: Reminder grace window in minutes. NULL falls back to the legacy `windowEnd - windowStart` span.
        rrule:
          anyOf:
            - type: string
            - type: "null"
          description: RFC 5545 RRULE string (subset). Used for calendar-anchored cadences. **Mutually exclusive with
            `rollingIntervalDays`** — exactly one of the two is non-null on any v1.5+ schedule (or both are null on
            legacy rows that haven't been touched since the migration).
        rollingIntervalDays:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
          description: Flexible-rolling interval in days, counted forward from the latest `MedicationIntakeEvent.takenAt`.
            **Mutually exclusive with `rrule`.**
      required:
        - id
        - medicationId
        - windowStart
        - windowEnd
        - label
        - dose
        - daysOfWeek
        - timesOfDay
        - reminderGraceMinutes
        - rrule
        - rollingIntervalDays
      description: Schedule entry attached to a medication. v1.5 promotes `timesOfDay` to first-class and introduces `rrule`
        (calendar-anchored cadences) and `rollingIntervalDays` (flexible-rolling cadences). The two recurrence
        primitives are mutually exclusive — enforced by the Zod refine on writes, the route layer, and a DB CHECK
        constraint (`medication_schedules_rrule_xor_rolling`).
