  /api/auth/me/disable-coach:
    get:
      tags:
        - Auth
      summary: Read per-user Coach opt-out flag
      description: Returns the user's per-account Coach opt-out flag. Default `false` (Coach visible). Powers the Settings →
        Insights "Hide Coach" Switch and the layout FAB short-circuit.
      responses:
        "200":
          description: Resolved flag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDisableCoachResponse"
        "401": *a1
        "422": *a3
        "429": *a4
    patch:
      tags:
        - Auth
      summary: Toggle per-user Coach opt-out flag
      description: Flips the per-account Coach opt-out flag. Idempotent — the DB write fires even when the value matches so
        the audit-log row mirrors the API call. Rate-limit 60/min per user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisableCoachFlag"
      responses:
        "200":
          description: Resolved next-state echoed back for optimistic-update consumers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchDisableCoachResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/auth/me/diabetes:
    get:
      tags:
        - Auth
      summary: Read per-user diabetes opt-in flag
      description: Returns the user's per-account diabetes opt-in flag. Default `false`. When `true`, the glucose target
        resolver applies the tighter ADA glycemic GOAL bands (fasting 80–130, postprandial < 180) instead of the general
        non-diabetic bands. Powers the Settings "I have diabetes / clinician glucose targets" toggle. Never inferred
        from a reading; asserts no diagnosis.
      responses:
        "200":
          description: Resolved flag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDiabetesResponse"
        "401": *a1
        "422": *a3
        "429": *a4
    patch:
      tags:
        - Auth
      summary: Toggle per-user diabetes opt-in flag
      description: Sets the per-account diabetes opt-in flag. Idempotent — the DB write fires even when the value matches so
        the audit-log row mirrors the API call. Always returns the resolved next-state. `userId` is never accepted from
        the body. Rate-limit 60/min per user.
      requestBody:
        required: true
