        text:
          anyOf:
            - type: string
            - type: "null"
          description: The assessment narrative (plain text, rendered as React text children). Null while a first generation is
            preparing, or when the metric has insufficient data.
        cached:
          type: boolean
          description: True when `text` is served from cache (incl. last-good).
        updatedAt:
          anyOf:
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
            - type: "null"
          description: When the served assessment was generated; null when none.
        preparing:
          description: True when a first assessment is being generated out of band and no prior text exists yet — the client polls
            until it lands.
          type: boolean
        revalidating:
          description: True when `text` is served from last-good cache (stale-while-revalidate) while a fresh generation is in
            flight. The payload is otherwise terminal; the client keeps polling on `preparing || revalidating` (bounded)
            so the open card upgrades to the warmed assessment without a remount.
          type: boolean
        insufficient:
          description: True when the metric has no readings; no assessment is generated (no LLM call). The card shows its
            insufficient-data state.
          type: boolean
      required:
        - hasProvider
        - text
        - cached
        - updatedAt
      additionalProperties: false
      description: "Generic per-metric assessment envelope. Identical shape to the seven specialised `*-status` cards so the
        `InsightStatusCard` consumes it unchanged. Read-only + stale-while-revalidate: a cache miss warms a generation
        out of band and serves the last-good text meanwhile."
