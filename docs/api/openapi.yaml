        layout); `extras` (BD-in-target + per-context glucose) is null on a rollup-coverage miss so the strip never
        waits on the slowest read. `briefing` is lifted read-only from the pre-generated insight cache — never generated
        synchronously — and reports `ready` / `preparing` / `disabled` / `no-provider` via `briefingState`
        (`no-provider` = stale-or-missing cache with no AI provider configured anywhere, so no warm pass will fill it;
