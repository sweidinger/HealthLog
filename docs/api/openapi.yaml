openapi: 3.1.0
info:
  title: HealthLog API
  version: 1.21.4
  description: >-
    Self-hosted personal-health-tracking PWA — public API surface for the iOS native client and external ingest.


    ## Date-time contract


    Every field marked `format: date-time` is an ISO-8601 instant. The schema pattern accepts both `Z` (UTC) and
    `±HH:MM` (offset) suffixes; clients must accept either. Server responses since v1.4.25 emit timestamps with the
    requesting user's display-timezone offset when a user context exists (exports, doctor-report PDF).
    Background-job-authored payloads (backups, admin tools) emit `Z`. Native iOS clients should always parse via a
    Foundation ISO-8601 formatter with the `withInternetDateTime` + `withTimeZone` options enabled.
  license:
    name: PolyForm-Noncommercial-1.0.0
    url: https://github.com/MBombeck/HealthLog/blob/main/LICENSE
  contact:
    name: HealthLog
    url: https://healthlog.dev
servers:
  - url: https://healthlog.example.com
    description: Your self-hosted instance
  - url: http://localhost:3000
    description: Local dev
tags:
  - name: Auth
  - name: Measurements
  - name: Medications
  - name: Mood
  - name: Analytics
  - name: Insights
  - name: Consent
  - name: Dashboard
  - name: Notifications
  - name: Devices
  - name: Export
  - name: Sync
  - name: Cycle
  - name: MeasurementReminders
  - name: Labs
  - name: Illness
  - name: Admin
  - name: Meta
paths:
  /api/cycle/day-logs:
    get:
      tags:
        - Cycle
      summary: Read a single day's cycle day-log (v1.15.0)
      description: Returns the full `CycleDayLogDTO` for the tz-anchored `date`, or `null` when nothing is logged that day.
        Lets a client pre-fill an edit sheet. Gated; owner-scoped; soft-deleted rows excluded.
      parameters:
        - in: query
          name: date
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          required: true
      responses:
        "200":
          description: The day-log for that date, or null.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleDayLogReadEnvelope"
        "401": &a1
          description: Authentication required or invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403": &a2
          description: Cycle tracking is not enabled for this account (errorCode `cycle.disabled`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": &a3
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429": &a4
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      tags:
        - Cycle
      summary: Capture a single cycle day-log (v1.15.0)
      description: "Upserts on `(userId, source, externalId)` when externalId present, else `(userId, date)`. `note` encrypts
        at rest. 201 on insert, 200 on update. Gated: `cycle.disabled` 403 when the feature is off."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  pattern: ^\d{4}-\d{2}-\d{2}$
                flow:
                  type: string
                  enum:
                    - NONE
                    - SPOTTING
                    - LIGHT
                    - MEDIUM
                    - HEAVY
                intermenstrualBleeding:
                  type: boolean
                basalBodyTempC:
                  type: number
                  minimum: 30
                  maximum: 45
                temperatureExcluded:
                  type: boolean
                ovulationTest:
                  type: string
                  enum:
                    - NEGATIVE
                    - POSITIVE_LH_SURGE
                    - ESTROGEN_SURGE
                    - INDETERMINATE
                cervicalMucus:
                  type: string
                  enum:
                    - DRY
                    - STICKY
                    - CREAMY
                    - WATERY
                    - EGG_WHITE
                cervixPosition:
                  type: string
                  enum:
                    - LOW
                    - HIGH
                cervixFirmness:
                  type: string
                  enum:
                    - FIRM
                    - SOFT
                cervixOpening:
                  type: string
                  enum:
                    - CLOSED
                    - OPEN
                sexualActivity:
                  type: boolean
                protectedSex:
                  anyOf:
                    - type: boolean
                    - type: "null"
                pregnancyTest:
                  type: string
                  enum:
                    - NEGATIVE
                    - POSITIVE
                    - INDETERMINATE
                progesteroneTest:
                  type: string
                  enum:
                    - NEGATIVE
                    - POSITIVE
                    - INDETERMINATE
                contraceptive:
                  type: string
                  enum:
                    - NONE
                    - UNSPECIFIED
                    - IMPLANT
                    - INJECTION
                    - IUD
                    - INTRAVAGINAL_RING
                    - ORAL
                    - PATCH
                    - EMERGENCY
                symptoms:
                  maxItems: 40
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                        minLength: 1
                        maxLength: 80
                      severity:
                        type: integer
                        minimum: 1
                        maximum: 4
                    required:
                      - key
                note:
                  type: string
                  maxLength: 500
                loggedAt:
                  type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                source:
                  default: MANUAL
                  type: string
                  enum:
                    - MANUAL
                    - APPLE_HEALTH
                externalId:
                  type: string
                  minLength: 1
                  maxLength: 120
              required:
                - date
                - loggedAt
      responses:
        "200":
          description: Existing day-log updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleDayLogEnvelope"
        "201":
          description: New day-log created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleDayLogCreatedEnvelope"
        "401": *a1
        "403": *a2
        "422": *a3
        "429": *a4
  /api/cycle/day-logs/{id}:
    patch:
      tags:
        - Cycle
      summary: Edit a single cycle day-log (v1.15.0)
      description: Partial edit; an omitted field is left untouched. Owner-scoped (a cross-user id 404s). Gated.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                flow:
                  anyOf:
                    - type: string
                      enum:
                        - NONE
                        - SPOTTING
                        - LIGHT
                        - MEDIUM
                        - HEAVY
                    - type: "null"
                intermenstrualBleeding:
                  type: boolean
                basalBodyTempC:
                  anyOf:
                    - type: number
                      minimum: 30
                      maximum: 45
                    - type: "null"
                temperatureExcluded:
                  type: boolean
                ovulationTest:
                  anyOf:
                    - type: string
                      enum:
                        - NEGATIVE
                        - POSITIVE_LH_SURGE
                        - ESTROGEN_SURGE
                        - INDETERMINATE
                    - type: "null"
                cervicalMucus:
                  anyOf:
                    - type: string
                      enum:
                        - DRY
                        - STICKY
                        - CREAMY
                        - WATERY
                        - EGG_WHITE
                    - type: "null"
                cervixPosition:
                  anyOf:
                    - type: string
                      enum:
                        - LOW
                        - HIGH
                    - type: "null"
                cervixFirmness:
                  anyOf:
                    - type: string
                      enum:
                        - FIRM
                        - SOFT
                    - type: "null"
                cervixOpening:
                  anyOf:
                    - type: string
                      enum:
                        - CLOSED
                        - OPEN
                    - type: "null"
                sexualActivity:
                  type: boolean
                protectedSex:
                  anyOf:
                    - type: boolean
                    - type: "null"
                pregnancyTest:
                  anyOf:
                    - type: string
                      enum:
                        - NEGATIVE
                        - POSITIVE
                        - INDETERMINATE
                    - type: "null"
                progesteroneTest:
                  anyOf:
                    - type: string
                      enum:
                        - NEGATIVE
                        - POSITIVE
                        - INDETERMINATE
                    - type: "null"
                contraceptive:
                  anyOf:
                    - type: string
                      enum:
                        - NONE
                        - UNSPECIFIED
                        - IMPLANT
                        - INJECTION
                        - IUD
                        - INTRAVAGINAL_RING
                        - ORAL
                        - PATCH
                        - EMERGENCY
                    - type: "null"
                symptoms:
                  maxItems: 40
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                        minLength: 1
                        maxLength: 80
                      severity:
                        type: integer
                        minimum: 1
                        maximum: 4
                    required:
                      - key
                note:
                  anyOf:
                    - type: string
                      maxLength: 500
                    - type: "null"
                loggedAt:
                  type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
      responses:
        "200":
          description: Day-log updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleDayLogPatchEnvelope"
        "401": *a1
        "403": *a2
        "404":
          description: Day-log not found / not owned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
    delete:
      tags:
        - Cycle
      summary: Soft-delete a cycle day-log (v1.15.0)
      description: Sets `deletedAt` + bumps `syncVersion`; surfaces as a tombstone on the next `/api/sync/changes` page. 204.
        Idempotent.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "204":
          description: Soft-deleted (no body).
        "401": *a1
        "403": *a2
        "404":
          description: Day-log not found / not owned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/cycle/day-logs/bulk:
    post:
      tags:
        - Cycle
      summary: Bulk drain cycle day-logs (Outbox / HealthKit) (v1.15.0)
      description: "Up to 500 entries; `withIdempotency`; rate-limited `cycle:day-logs:bulk:<userId>` 60/min. Per-entry
        status: inserted | duplicate | updated | skipped. Always 200."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  minItems: 1
                  maxItems: 500
                  type: array
                  items:
                    type: object
                    properties:
                      date:
                        type: string
                        pattern: ^\d{4}-\d{2}-\d{2}$
                      flow:
                        type: string
                        enum:
                          - NONE
                          - SPOTTING
                          - LIGHT
                          - MEDIUM
                          - HEAVY
                      intermenstrualBleeding:
                        type: boolean
                      basalBodyTempC:
                        type: number
                        minimum: 30
                        maximum: 45
                      temperatureExcluded:
                        type: boolean
                      ovulationTest:
                        type: string
                        enum:
                          - NEGATIVE
                          - POSITIVE_LH_SURGE
                          - ESTROGEN_SURGE
                          - INDETERMINATE
                      cervicalMucus:
                        type: string
                        enum:
                          - DRY
                          - STICKY
                          - CREAMY
                          - WATERY
                          - EGG_WHITE
                      cervixPosition:
                        type: string
                        enum:
                          - LOW
                          - HIGH
                      cervixFirmness:
                        type: string
                        enum:
                          - FIRM
                          - SOFT
                      cervixOpening:
                        type: string
                        enum:
                          - CLOSED
                          - OPEN
                      sexualActivity:
                        type: boolean
                      protectedSex:
                        anyOf:
                          - type: boolean
                          - type: "null"
                      pregnancyTest:
                        type: string
                        enum:
                          - NEGATIVE
                          - POSITIVE
                          - INDETERMINATE
                      progesteroneTest:
                        type: string
                        enum:
                          - NEGATIVE
                          - POSITIVE
                          - INDETERMINATE
                      contraceptive:
                        type: string
                        enum:
                          - NONE
                          - UNSPECIFIED
                          - IMPLANT
                          - INJECTION
                          - IUD
                          - INTRAVAGINAL_RING
                          - ORAL
                          - PATCH
                          - EMERGENCY
                      symptoms:
                        maxItems: 40
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                              minLength: 1
                              maxLength: 80
                            severity:
                              type: integer
                              minimum: 1
                              maximum: 4
                          required:
                            - key
                      note:
                        type: string
                        maxLength: 500
                      loggedAt:
                        type: string
                        format: date-time
                        pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
                      source:
                        default: MANUAL
                        type: string
                        enum:
                          - MANUAL
                          - APPLE_HEALTH
                      externalId:
                        type: string
                        minLength: 1
                        maxLength: 120
                    required:
                      - date
                      - loggedAt
              required:
                - entries
      responses:
        "200":
          description: Batch processed (per-entry results).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleBulkEnvelope"
        "401": *a1
        "403": *a2
        "422": *a3
        "429": *a4
  /api/cycle/period:
    post:
      tags:
        - Cycle
      summary: Period-boundary shortcut (v1.15.0)
      description: One-tap started/ended period. `start` opens a new cycle (closing the prior); `end` stamps periodEndDate.
        Writes the boundary day-log. Gated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum:
                    - start
                    - end
                date:
                  type: string
                  pattern: ^\d{4}-\d{2}-\d{2}$
                externalId:
                  type: string
                  minLength: 1
                  maxLength: 120
                loggedAt:
                  type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
              required:
                - action
                - date
                - loggedAt
      responses:
        "200":
          description: Cycle + boundary day-log.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CyclePeriodEnvelope"
        "401": *a1
        "403": *a2
        "422": *a3
        "429": *a4
  /api/cycle/calendar:
    get:
      tags:
        - Cycle
      summary: Predicted cycle calendar (v1.15.0)
      description: "Runs the deterministic engine to build `{ profile, prediction, days }`. Fertile-window fields are
        server-suppressed unless goal is TRYING_TO_CONCEIVE. Default range: today − 90d … +180d. Gated."
      parameters:
        - in: query
          name: from
          schema:
            type: string
        - in: query
          name: to
          schema:
            type: string
      responses:
        "200":
          description: Calendar grid + forecast.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleCalendarEnvelope"
        "401": *a1
        "403": *a2
        "422": *a3
        "429": *a4
  /api/cycle/cycles:
    get:
      tags:
        - Cycle
      summary: Cycle history + stats (v1.15.0)
      description: Most-recent cycles (newest first) + `{ avgLengthDays, lengthVariabilityDays (MAD), avgPeriodLengthDays,
        regularity }`. `limit` default 24. Gated.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 60
      responses:
        "200":
          description: Cycle history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleHistoryEnvelope"
        "401": *a1
        "403": *a2
        "422": *a3
        "429": *a4
  /api/cycle/insights:
    get:
      tags:
        - Cycle
      summary: Cycle-phase correlation insights (v1.15.0)
      description: "FDR-guarded luteal-vs-follicular phase contrast per outcome metric (RHR / HRV / sleep / steps / weight /
        temperatures), plus the single headline finding (resting-heart-rate-by-phase, falling back to HRV). The same
        Welch t-test + Benjamini-Hochberg machinery the mood-factor crosstab runs; only rows with p < 0.05 AND q ≤ 0.10
        surface. Strictly gender-gated — phase never appears on the general `/api/insights/correlations` route.
        Observational only, never causal. Gated: `cycle.disabled` 403 when the feature is off."
      responses:
        "200":
          description: Phase-correlation rows + headline.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleInsightsEnvelope"
        "401": *a1
        "403": *a2
        "422": *a3
        "429": *a4
  /api/cycle/cycles/{id}:
    delete:
      tags:
        - Cycle
      summary: Soft-delete a menstrual cycle (v1.15.0)
      description: Sets `deletedAt` + bumps `syncVersion`; tombstones on the next sync page. 204. Idempotent.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "204":
          description: Soft-deleted (no body).
        "401": *a1
        "403": *a2
        "404":
          description: Cycle not found / not owned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/cycle/all:
    delete:
      tags:
        - Cycle
      summary: Hard-purge all cycle data (v1.15.0)
      description: "One-click privacy purge: HARD-deletes every cycle day-log (+ symptom links by cascade), menstrual cycle,
        prediction, the cycle audit trail, and the cycle reminder rows in the push-attempts ledger — no dated
        reproductive trace survives. The CycleProfile row is left in place. Gated + owner-scoped + audited."
      responses:
        "200":
          description: Purge counts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CyclePurgeEnvelope"
        "401": *a1
        "403": *a2
        "422": *a3
        "429": *a4
  /api/cycle/profile:
    get:
      tags:
        - Cycle
      summary: Read the full cycle profile (v1.15.0)
      description: Returns the resolved CycleProfileDTO. Gated.
      responses:
        "200":
          description: Cycle profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleProfileEnvelope"
        "401": *a1
        "403": *a2
        "422": *a3
        "429": *a4
  /api/auth/me/cycle-prefs:
    get:
      tags:
        - Cycle
      summary: Read cycle preferences (v1.15.0)
      description: Returns the resolved CycleProfileDTO. NOT gated — this is the surface that flips the gate.
      responses:
        "200":
          description: Cycle preferences.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CyclePrefsGetEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
    patch:
      tags:
        - Cycle
      summary: Update cycle preferences (v1.15.0)
      description: Deep-merges the supplied fields. `enabled` flips `cycleTrackingEnabled`. Returns the merged
        CycleProfileDTO. NOT gated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                goal:
                  type: string
                  enum:
                    - GENERAL_HEALTH
                    - AVOID_PREGNANCY
                    - TRYING_TO_CONCEIVE
                    - PERIMENOPAUSE
                    - OFF
                secondarySymptom:
                  type: string
                  enum:
                    - MUCUS
                    - CERVIX
                rawChartMode:
                  type: boolean
                predictionEnabled:
                  type: boolean
                discreetNotifications:
                  type: boolean
                sensitiveCategoryEncryption:
                  type: boolean
                typicalCycleLength:
                  anyOf:
                    - type: integer
                      minimum: 15
                      maximum: 60
                    - type: "null"
                typicalPeriodLength:
                  anyOf:
                    - type: integer
                      minimum: 1
                      maximum: 15
                    - type: "null"
                lutealPhaseLength:
                  anyOf:
                    - type: integer
                      minimum: 10
                      maximum: 16
                    - type: "null"
      responses:
        "200":
          description: Merged cycle preferences.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CyclePrefsPatchEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/meta/capabilities:
    get:
      tags:
        - Meta
      summary: Live server capability / id-vocabulary discovery
      description: Returns the server's REAL id vocabularies (derived-metric ids, vitals-baseline types, layout tile-ids,
        metric-status ids, the HealthKit ingest mapping, the FHIR coding constants) plus the running API contract
        version. Every list is derived server-side from the canonical registry it documents, so a client can gate its UI
        / decoder against what the server actually ships rather than a hand-maintained copy. Auth via cookie or Bearer
        (not admin).
      responses:
        "200":
          description: Capability snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/export/health-record:
    post:
      tags:
        - Export
      summary: Generate a health-record export (PDF / FHIR / package)
      description: "v1.7.0 flagship export. Returns the doctor-handover artefact in the requested `format`: `pdf` →
        application/pdf, `fhir` → application/fhir+json (HL7 FHIR R4 document Bundle), `package` → application/zip (PDF
        + FHIR + README). Auth via cookie or Bearer; shared `export:<userId>` rate bucket (10/h). Strict validation:
        unknown keys 422."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                format:
                  type: string
                  enum:
                    - pdf
                    - fhir
                    - package
                range:
                  type: object
                  properties:
                    startDate:
                      type: string
                      format: date-time
