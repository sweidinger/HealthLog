        - deltaPct
      additionalProperties: false
      description: Single-metric period-over-period aggregate. Reads the current and previous comparable windows from the WMY
        rollup tier and composes a count-weighted-mean delta. `count/min/max/mean/sum` are linearly composable across
        buckets; SD/slope/r² are intentionally excluded (not composable).
