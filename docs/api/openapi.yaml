          type: object
          properties:
            state:
              type: string
              enum:
                - partial
                - ready
            averageMinutes:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: Mean asleep minutes per scorable night (0 while partial).
            nightsCounted:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            nightsUntilReady:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: Scorable nights still needed before the average is asserted.
          required:
            - state
            - averageMinutes
            - nightsCounted
            - nightsUntilReady
          additionalProperties: false
