        "429": *a4
  /api/insights/chat:
    get:
      tags:
        - Insights
      summary: List the caller's Coach conversations
      description: v1.18.0 — cursor-paginated list of the caller's Coach conversations for the history rail, most-recent
        activity first. Metadata only (id, title, timestamps, message count); message bodies are not decrypted here.
        `limit` defaults to 20, capped at 50; pass the returned `nextCursor` back as `cursor` for the next page (null at
        the end). v1.30.2 — optional `q` narrows the page to conversations whose TITLE contains the text
        (case-insensitive substring, capped at 200 chars); message bodies are encrypted at rest and are not searched.
        Coach-gated (`requireAssistantSurface("coach")`); a disabled surface 403s. Auth via cookie or Bearer; the owner
        is narrowed from the session.
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Id of the last conversation on the previous page. Omit for the first page.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
          description: Page size. Defaults to 20, capped at 50.
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
          description: v1.30.2 — case-insensitive substring filter over the conversation TITLE only (message bodies are encrypted
            and not searched). Omit for the unfiltered list.
      responses:
        "200":
          description: A page of the caller's conversations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachConversationsPageResponse"
        "401": *a1
        "422": *a3
        "429": *a4
    post:
      tags:
        - Insights
      summary: Send a Coach turn (streaming reply)
      description: "v1.18.0 — sends a user turn and streams the assistant reply as Server-Sent Events. The response is
        `text/event-stream`, not JSON: one `data: <json>\\n\\n` frame per event. Frame `type` is one of `token` (a chunk
        of reply text: `{ type, token }`), `provenance` (the evidence envelope: `{ type, metricSource }`), `suggestion`
        (a cadence-suggestion card: `{ type, suggestion }`), `reasoning` (v1.18.9, optional reasoning-summary text: `{
        type, text }` — emitted only by reasoning-capable providers; absent otherwise), `done` (`{ type, conversationId,
        messageId, usage? }` — v1.18.9 adds the optional `usage` envelope `{ totalTokens, promptTokens?,
        completionTokens?, model? }`, server-authoritative; clients display it, never recompute), or `error` (`{ type,
        code, message }`). The HTTP status is 200 even for a provider/refusal outcome — clients dispatch on the `error`
        frame, not the status. Clients ignore unknown frame types (additive evolution). Omitting `conversationId` starts
        a new conversation. Coach-gated; budget- and rate-limited. Auth via cookie or Bearer."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversationId:
                  type: string
                  minLength: 1
                  maxLength: 64
                message:
                  type: string
                  minLength: 1
                  maxLength: 4000
                prefill:
                  type: string
                  maxLength: 2000
                locale:
                  type: string
                  enum:
                    - en
                    - de
                scope:
                  type: object
                  properties:
                    sources:
                      maxItems: 40
                      type: array
                      items:
                        type: string
                        enum:
                          - bp
                          - weight
                          - pulse
                          - mood
                          - compliance
                          - hrv
                          - sleep
                          - resting_hr
                          - steps
                          - active_energy
                          - flights
                          - distance
                          - vo2_max
                          - body_temp
                          - walking_hr
                          - respiratory_rate
                          - spo2
                          - pulse_wave_velocity
                          - vascular_age
                          - body_fat
                          - fat_mass
                          - fat_free_mass
                          - muscle_mass
                          - lean_body_mass
                          - bone_mass
                          - total_body_water
                          - bmi
                          - visceral_fat
                          - glucose
                          - walking_steadiness
                          - walking_asymmetry
                          - walking_double_support
                          - walking_step_length
                          - walking_speed
                          - audio_env
                          - audio_headphone
                          - audio_event
                          - daylight
                          - skin_temp
                          - workouts
                    window:
                      type: string
                      enum:
                        - last7days
                        - last30days
                        - last90days
                        - lastYear
                        - allTime
                guidedQuestion:
                  type: string
                  minLength: 1
                  maxLength: 500
              required:
                - message
      responses:
        "200":
          description: Server-Sent Events stream of `token` / `provenance` / `done` / `error` frames.
          content:
            text/event-stream:
              schema:
                type: string
                description: "SSE frames: `data: <json>\\n\\n`. See the operation description for the per-`type` frame shapes."
        "401": *a1
        "403":
          description: "Coach surface disabled (`errorCode: assistant.disabled.coach`) or AI consent required (`errorCode:
            consent.ai.required`)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: Request body exceeds the 64 KB cap.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/insights/chat/{id}:
    get:
      tags:
