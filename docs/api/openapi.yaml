  /api/nutrients/water:
    post:
      tags:
        - Nutrients
      summary: Manual water quick-add (v1.29)
      description: "Writes ONLY the `source=\"MANUAL\"` row for `(day, \"water\")` — never the `source=\"APPLE_HEALTH\"` row
        the batch endpoint owns, so a manual entry and an Apple sync coexist instead of one clobbering the other. `mode:
        \"add\"` increments the manual day total (quick-add chips); `mode: \"set\"` overwrites it (the \"edit today's
        total\" undo path — there is no per-entry ledger). `day` defaults to the caller's current local day when
        omitted. Idempotency-Key supported; rate limit 60/min. Behind the opt-in `nutrients` module."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NutrientWaterWriteRequest"
      responses:
        "200":
          description: The MANUAL water row after the write.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutrientWaterWriteEnvelope"
        "401": *a1
        "403": *a17
        "422": *a3
        "429": *a4
  /api/integrations/healthkit:
    get:
      tags:
        - Integrations
      summary: Read the HealthKit integration config
      description: Returns the resolved per-metric HealthKit config — the default metric set merged with the user's stored
        overrides — plus the last HealthKit sync instant. Auth via cookie or Bearer.
      responses:
        "200":
          description: Resolved HealthKit config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthKitConfigEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
    patch:
      tags:
        - Integrations
      summary: Update the HealthKit integration config
      description: Merges the supplied entries into the stored config by `id` (unknown ids are ignored) and returns the
        resolved config (defaults merged) so the client always sees a complete metric list. `lastSyncedAt` is null on
        the echo. Auth via cookie or Bearer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HealthKitConfigPatchRequest"
      responses:
        "200":
          description: Updated + resolved HealthKit config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthKitConfigPatchEnvelope"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/daily/digest:
    get:
      tags:
        - Insights
      summary: The unified daily digest
      description: "Assembles the day's read from already-cached data: the nightly briefing lifted read-only from the insights
        cache, the dashboard-snapshot health score / meds-today / sleep freshness, plus deterministic integration-status
        and Vorsorge reads for the 'worth a look' rail. No provider call, no warm-on-mount. Requires the insights
        module. Cookie or Bearer auth."
      responses:
        "200":
          description: The daily digest.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyDigestEnvelope"
        "401": *a1
        "403": *a5
        "422": *a3
        "429": *a4
  /api/daily/digest/dismiss:
    post:
      tags:
        - Insights
      summary: Dismiss a Today rail item
      description: "\"Dismiss / mark seen\" for the Today rail's OBSERVATIONAL PriorityItem kinds only — milestone,
        ecg_new_recording, tension_window. The ACTIONABLE kinds (dose_window, sync_issue, preventive_care,
        coach_checkin) are structurally unreachable: itemKey must be namespaced under one of the three dismissible kinds
        or the request 422s before any lookup runs. Persisted server-side so the dismissal survives reload / a second
        device; an upsert, so a repeat dismiss of the same instance is a no-op. Requires the insights module. Cookie or
        Bearer auth."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                itemKey:
                  type: string
                  minLength: 1
                  maxLength: 200
              required:
                - itemKey
              additionalProperties: false
      responses:
        "200":
          description: The item is dismissed (idempotent).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DismissPriorityItemEnvelope"
        "401": *a1
        "403": *a5
        "422": *a3
        "429": *a4
components:
  schemas:
    EncryptedExportRequest:
      type: object
      properties:
        passphrase:
          type: string
          minLength: 12
          maxLength: 1024
          description: User-chosen passphrase (>= 12 chars). Derives the archive key via Argon2id; never stored, never logged, no
            server-side recovery.
      required:
        - passphrase
    CheckUserRequest:
      type: object
      properties:
        identifier:
          type: string
          minLength: 1
          maxLength: 254
          description: The typed identifier — either an email or a username. Queried verbatim (no case-folding), never echoed back.
      required:
        - identifier
      description: "Discovery lookup for the iOS onboarding flow: given a typed email or username, resolve the next sign-in step."
    MfaVerifyRequest:
      type: object
      properties:
        mfaTicket:
          type: string
          minLength: 1
          description: The opaque single-use ticket from the login response.
        method:
          default: totp
          type: string
          enum:
            - totp
            - recovery
        code:
          type: string
          minLength: 6
          maxLength: 32
        rememberDevice:
          description: Opt in to trusting this device for 30 days — subsequent logins skip the second factor (the password is
            still required).
          type: boolean
      required:
        - mfaTicket
        - code
      description: Complete a second-factor login challenge and receive the same token bundle the password path issues.
    OidcNativeTokenRequest:
      type: object
      properties:
        code:
          type: string
          pattern: ^hlh_[A-Za-z0-9_-]{43}$
          description: One-time handoff code from the healthlog://oidc-callback?code= redirect.
        codeVerifier:
          type: string
          pattern: ^[A-Za-z0-9\-._~]{43,128}$
          description: The app's PKCE code_verifier (RFC 7636).
      required:
        - code
        - codeVerifier
      description: Exchange a one-time native OIDC handoff code (+ its PKCE verifier) for the standard native token bundle.
    MfaDisableRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 32
        method:
          default: totp
          type: string
          enum:
            - totp
            - recovery
      required:
        - code
      description: Disable the second factor. Requires fresh step-up plus a current TOTP or recovery code.
    MfaWebauthnRegisterVerifyRequest:
      type: object
      properties:
        challengeId:
          type: string
          minLength: 1
        credential:
          type: object
          properties:
            id:
              type: string
            rawId:
              type: string
            type:
              type: string
              const: public-key
            response:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
            authenticatorAttachment:
              type: string
              enum:
                - platform
                - cross-platform
            clientExtensionResults:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
          required:
            - id
            - rawId
            - type
            - response
          description: SimpleWebAuthn ceremony response payload.
        name:
          type: string
          minLength: 1
          maxLength: 64
      required:
        - challengeId
        - credential
      description: Finish registering a WebAuthn security key as a second factor.
    MfaWebauthnRenameRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
      required:
        - name
    MfaWebauthnLoginOptionsRequest:
      type: object
      properties:
        mfaTicket:
          type: string
          minLength: 1
          description: The opaque single-use ticket from the login response.
      required:
        - mfaTicket
    MfaWebauthnLoginVerifyRequest:
      type: object
      properties:
        mfaTicket:
          type: string
          minLength: 1
        challengeId:
          type: string
          minLength: 1
        credential:
          type: object
          properties:
            id:
              type: string
            rawId:
              type: string
            type:
              type: string
              const: public-key
            response:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
            authenticatorAttachment:
              type: string
              enum:
                - platform
                - cross-platform
            clientExtensionResults:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
          required:
            - id
            - rawId
            - type
            - response
          description: SimpleWebAuthn ceremony response payload.
        rememberDevice:
          description: Opt in to trusting this device for 30 days — subsequent logins skip the second factor (the password is
            still required).
          type: boolean
      required:
        - mfaTicket
        - challengeId
        - credential
      description: Complete a second-factor login challenge with a WebAuthn security key and receive the same token bundle the
        password path issues.
    PasskeyLoginVerifyRequest:
      type: object
      properties:
        challengeId:
          type: string
          minLength: 1
          description: Server-issued WebAuthn challenge id.
        credential:
          type: object
          properties:
            id:
              type: string
            rawId:
              type: string
            type:
              type: string
              const: public-key
            response:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
            authenticatorAttachment:
              type: string
              enum:
                - platform
                - cross-platform
            clientExtensionResults:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
          required:
            - id
            - rawId
            - type
            - response
          description: SimpleWebAuthn-style assertion response payload.
      required:
        - challengeId
        - credential
      description: Passkey assertion verification. Same native-client token issuance as the password path.
    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
          description: Caller-presented refresh token (`hlr_<64hex>`).
        revoke:
          description: When true, revoke the supplied token instead of rotating.
          type: boolean
      required:
        - refreshToken
      description: Exchange a one-time-use refresh token for a fresh access + refresh pair.
    AppleHealthBatchRequest:
      type: object
      properties:
        entries:
          minItems: 1
          maxItems: 500
          type: array
          items:
            $ref: "#/components/schemas/AppleHealthBatchEntry"
      required:
        - entries
      description: Apple Health batch ingest. ≤500 entries per call; idempotent via `Idempotency-Key`.
    AppleHealthBatchEntry:
      type: object
      properties:
        hkIdentifier:
          type: string
          minLength: 1
          maxLength: 120
          description: HealthKit identifier (e.g. `HKQuantityTypeIdentifierBodyMass`).
        value:
          type: number
          description: Raw HealthKit reading in Apple's native unit; the server applies any canonical scaling at ingest. For a
            10-minute heart-rate bucket (see `externalId`) this is the bucket's AVERAGE bpm; the bucket's spread rides
            `valueMin` / `valueMax`.
        valueMin:
          description: "v1.19.2 (iOS #34 extension) — the bucket's MINIMUM bpm for a 10-minute heart-rate bucket (see
            `externalId`). Persisted ONLY on a well-formed `stats:HKQuantityTypeIdentifierHeartRate:<bucket-start>` row;
            ignored (stored null) on every other entry. Omit on a pre-v1.19.2 client — the bucket keeps the avg-only
            contract."
          type: number
        valueMax:
          description: "v1.19.2 (iOS #34 extension) — the bucket's MAXIMUM bpm for a 10-minute heart-rate bucket (see
            `externalId`). Persisted ONLY on a well-formed `stats:HKQuantityTypeIdentifierHeartRate:<bucket-start>` row;
            ignored (stored null) on every other entry. Omit on a pre-v1.19.2 client — the bucket keeps the avg-only
            contract."
          type: number
        unit:
          type: string
          minLength: 1
          maxLength: 60
        startDate:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        endDate:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        sleepStage:
          description: HKCategoryValueSleepAnalysis codepoint; only for sleep samples.
          type: integer
          minimum: 0
          maximum: 20
        categoryValue:
          description: v1.10.0 — `HKCategoryValue` codepoint for an EVENT-class category sample (irregular-rhythm, high/low-HR,
            walking-steadiness, breathing-disturbance). Carries the device's own classification verdict / severity,
            which the server resolves to a stored `rhythmClassification`. HealthLog stores ONLY the device's result — it
            never re-classifies. Ignored for non-event identifiers.
          type: integer
          minimum: 0
          maximum: 20
        externalId:
          type: string
          minLength: 1
          maxLength: 120
          description: >-
            Dedup key for the `(userId, type, source, externalId)` composite index. Three shapes:

            • `HKSample.uuid` — a per-sample reading. First-write-wins: a re-post returns `duplicate` and the stored row
            is immutable.

            • `stats:<HKQuantityTypeIdentifier>:<YYYY-MM-DD>` — a per-day cumulative total (Steps, Active Energy, Sleep
            Duration, Walking/Running Distance, Flights Climbed). A re-post OVERWRITES the row and returns `updated`.

            • `stats:HKQuantityTypeIdentifierHeartRate:<bucket-start>` — v1.19.0 (iOS #34), refined to 10-minute
            granularity in v1.30.7, heart-rate bucket carrying the bucket's AVERAGE bpm as one PULSE row.
            `<bucket-start>` is the ISO-8601 UTC 10-minute boundary — zeroed seconds/millis, minutes ∈
            {00,10,20,30,40,50}, trailing `Z` (e.g. `2026-06-21T14:10:00.000Z`). A re-post OVERWRITES the row and
            returns `updated`, so iOS uploads ~144 rows/day instead of one per raw HR sample. A row that targets this
            prefix with a malformed bucket-start suffix is `skipped` with reason `malformed_hr_bucket_id`.
        externalSourceVersion:
          type: string
          minLength: 1
          maxLength: 120
        source:
          description: Source attribution for the row. Defaults to `APPLE_HEALTH` when omitted. Send `MANUAL` to tag rows the user
            entered by hand on-device (e.g. the standalone adopt-on-pair backfill). Part of the `(userId, type, source,
            externalId)` dedup key, so the same externalId under a different source is a distinct row. `WITHINGS` /
            `IMPORT` are not accepted here.
          type: string
          enum:
            - APPLE_HEALTH
            - MANUAL
        deviceType:
          description: Device class mapped from `HKDevice.model`. Used by the analytics aggregator to break ties when the same
            source contributed multiple devices for the same day. Omit (or send null) on legacy clients — the server
            treats it as `unknown` and the picker falls through.
          anyOf:
            - type: string
              enum:
                - watch
                - band
                - ring
                - phone
                - scale
                - other
                - unknown
            - type: "null"
      required:
        - hkIdentifier
        - value
        - unit
        - startDate
        - endDate
        - externalId
    MeasurementsDeleteByExternalIdsRequest:
      type: object
      properties:
        externalIds:
          minItems: 0
          maxItems: 500
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 120
      required:
        - externalIds
      description: iOS deletion-sync. Up to 500 externalIds per call; matching rows owned by other users are silently skipped
        (cross-user 404 guard).
    MeasurementsBulkDeleteRequest:
      type: object
      properties:
        ids:
          minItems: 1
          maxItems: 200
          type: array
          items:
            type: string
            minLength: 1
      required:
        - ids
      description: 1..200 measurement ids, scoped to the caller. Forged / foreign ids are silently skipped (no existence leak).
    MeasurementsRestoreRequest:
      type: object
      properties:
        ids:
          minItems: 1
          maxItems: 200
          type: array
          items:
            type: string
            minLength: 1
      required:
        - ids
      description: 1..200 measurement ids, scoped to the caller. Forged / foreign / not-deleted ids are silently skipped (no
        existence leak).
    DeviceRegisterRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 8
          maxLength: 512
          pattern: ^[A-Za-z0-9+/=._:-]+$
          description: Generic device identifier (legacy; APNs token below).
        bundleId:
          type: string
          minLength: 1
          maxLength: 128
        locale:
          type: string
          minLength: 2
          maxLength: 16
        appVersion:
          type: string
          minLength: 1
          maxLength: 32
        model:
          type: string
          minLength: 1
          maxLength: 64
        apnsToken:
          description: Hex-encoded APNs device token. Must be paired with `apnsEnvironment`.
          type: string
          minLength: 8
          maxLength: 256
          pattern: ^[A-Fa-f0-9]+$
        apnsEnvironment:
          description: Gateway the iOS client received `apnsToken` from. Server never auto-detects.
          type: string
          enum:
            - sandbox
            - production
        medicationDelivery:
          description: v1.7.0 per-device medication-delivery override. NULL / omitted = inherit the user-level roaming default.
            "server" forces server APNs for this device; "client" forces local. Stored + echoed; cron suppression stays
            user-level.
          anyOf:
            - type: string
              enum:
                - server
                - client
            - type: "null"
        liveActivityPushToken:
          description: v1.17.1 (#22) hex-encoded ActivityKit Live Activity push token (distinct from the device APNs token). The
            server addresses a Live Activity update / end push on a medication-intake mutation. Omitted = keep the prior
            value; null = clear it when the Activity ends.
          anyOf:
            - type: string
              minLength: 8
              maxLength: 256
              pattern: ^[A-Fa-f0-9]+$
            - type: "null"
      required:
        - token
        - bundleId
      description: Native device registration. Re-registering an APNs token belonging to another user returns 409
        (cross-user-hijack guard).
    BulkMedicationIntakeRequest:
      type: object
      properties:
        entries:
          minItems: 1
          maxItems: 500
          type: array
          items:
            $ref: "#/components/schemas/BulkMedicationIntakeEntry"
      required:
        - entries
      description: iOS SyncMode bulk intake backfill. 1–500 entries per call; idempotent via `Idempotency-Key` and per-entry
        `idempotencyKey` / `externalId`.
    BulkMedicationIntakeEntry:
      type: object
      properties:
        medicationId:
          type: string
          minLength: 1
        scheduledFor:
          description: ISO instant; defaults to `takenAt` then now() when omitted.
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        takenAt:
          description: ISO instant of the take; omit + `skipped:false` = pending.
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        skipped:
          description: Default false.
          type: boolean
        idempotencyKey:
          type: string
          minLength: 1
          maxLength: 128
        injectionSite:
          description: Per-entry injection site; a disallowed site marks THIS entry skipped without failing the batch.
          type: string
          enum:
            - ABDOMEN_LEFT
            - ABDOMEN_RIGHT
            - ABDOMEN_UPPER_LEFT
            - ABDOMEN_UPPER_RIGHT
            - THIGH_LEFT
            - THIGH_RIGHT
            - UPPER_ARM_LEFT
            - UPPER_ARM_RIGHT
        forceSlotInstant:
          description: Pin a taken entry onto a named real scheduled slot; ignored on non-taken entries.
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
        doseTaken:
          description: Per-entry dose override; persisted only on a taken entry.
          type: string
          minLength: 1
          maxLength: 50
        source:
          description: v1.28 — Apple Health dose-event import. Must be supplied together with `externalId`, and may only target a
            medication mirrored from Apple Health (else the whole batch 422s).
          type: string
          const: APPLE_HEALTH
        externalId:
          description: The HealthKit dose-event UUID. Drives the idempotent re-sync dedup (first-write-wins per Apple dose).
          type: string
          minLength: 1
          maxLength: 128
      required:
        - medicationId
      description: One bulk medication-intake entry. `source` + `externalId` are both-or-neither.
    CreateMedicationRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        dose:
          type: string
          minLength: 1
          maxLength: 50
        category:
          type: string
          enum:
            - BLOOD_PRESSURE
            - VITAMIN
            - SUPPLEMENT
            - PAIN_RELIEF
            - ALLERGY
            - DIGESTIVE
            - THYROID
            - HORMONE
            - SKIN
            - SLEEP_AID
            - DIABETES
            - ANTIBIOTIC
            - OTHER
        treatmentClass:
          type: string
          enum:
            - GENERIC
            - GLP1
        dosesPerUnit:
          type: integer
          minimum: 1
          maximum: 1000
        unitsPerDose:
          description: Inventory units consumed per dose. A whole number 1–100 (e.g. 2 tablets of 2 mg for a 4 mg dose) or a
            supported fraction for a split pill (¼ / ⅓ / ½ / ⅔ / ¾). Default 1. The intake consumption hook decrements
            this many units per taken dose; dose-derived readouts divide unit counts by it.
          type: number
        reorderLeadDays:
          description: Per-medication reorder lead time in days (0–60). The low-stock alert fires the supply early enough to
            reorder before the last dose. Omitted = inherit the user-level reorderLeadDays default (10).
          type: integer
          minimum: 0
          maximum: 60
        deliveryForm:
          type: string
          enum:
            - ORAL
            - INJECTION
            - OTHER
        trackInjectionSites:
          description: Per-medication injection-site tracking opt-in. Default false. Only meaningful for an INJECTION delivery
            form; when true the client prompts (skippably) for the site after a taken dose.
          type: boolean
        allowedInjectionSites:
          description: Per-medication allowed / preferred injection sites. Empty array = no per-medication restriction (every site
            offered). The effective pickable set is this list minus the user's global exclusion.
          maxItems: 8
          type: array
          items:
            type: string
            enum:
              - ABDOMEN_LEFT
              - ABDOMEN_RIGHT
              - ABDOMEN_UPPER_LEFT
              - ABDOMEN_UPPER_RIGHT
              - THIGH_LEFT
              - THIGH_RIGHT
              - UPPER_ARM_LEFT
              - UPPER_ARM_RIGHT
        notificationsEnabled:
          type: boolean
        liveActivityEnabled:
          description: iOS Live Activity opt-in for this medication's reminders. Default false. The iOS client owns the
            ActivityKit lifecycle; the server only stores + echoes the flag.
          type: boolean
        criticalAlarmEnabled:
          description: iOS 26 AlarmKit critical-reminder opt-in. Default false. Critical alarms bypass the device mute switch /
            Focus; the server stores the preference only and hangs no server-side behaviour off it.
          type: boolean
        atcCode:
          description: Optional WHO ATC classification code (active-substance class, 7 chars, e.g. `A10BX10`).
            User/clinician-asserted; never machine-guessed. Emitted on the FHIR `medicationCodeableConcept` under
            `http://www.whocc.no/atc`. NULL clears it; absent leaves it untouched.
          anyOf:
            - type: string
              pattern: ^[A-Z]\d{2}[A-Z]{2}\d{2}$
            - type: "null"
        rxNormCode:
          description: Optional RxNorm RxCUI (numeric, US identifier, e.g. `2601723`). Secondary coding emitted under
            `http://www.nlm.nih.gov/research/umls/rxnorm` alongside any ATC code, never instead of the free-text name.
            NULL clears it; absent leaves it untouched.
          anyOf:
            - type: string
              maxLength: 20
              pattern: ^\d+$
            - type: "null"
        externalSource:
          description: "Marks the medication as MIRRORED from an external medication list. Only `APPLE_HEALTH` (the iOS 26+
            HealthKit Medications sync) is accepted. Must be supplied together with `externalId`. A mirrored medication
            is source-exclusive: dose events from that source attach only to it, and the app's own dose-logging UI stays
            off it."
          type: string
          const: APPLE_HEALTH
        externalId:
          description: "Stable external identifier of the mirrored medication (the HealthKit `medicationConceptIdentifier`, max
            128 chars). Must be supplied together with `externalSource`. Idempotent: re-posting the same pair returns
            the existing medication with status 200 instead of minting a duplicate."
          type: string
          minLength: 1
          maxLength: 128
        startsOn:
          description: Date the medication course begins (ISO `YYYY-MM-DD`). Anchors RRULE BYDAY / BYMONTHDAY patterns and the
            rolling-interval countdown's first window. NULL = active from creation (the legacy implicit behaviour).
            Required when `oneShot` is true.
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: "null"
        endsOn:
          description: Date the medication course ends (ISO `YYYY-MM-DD`). NULL = no end date (chronic). When `oneShot` is true
            the route normalises `endsOn` to equal `startsOn`.
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: "null"
        oneShot:
          description: Single-administration medication (e.g. flu shot, post-op single dose). When true the medication has at most
            one schedule with no `rrule` / `rollingIntervalDays`, and `active` auto-flips to false once the dose is
            logged (non-skipped).
          type: boolean
        asNeeded:
          description: "As-needed (PRN) medication (pain relief, rescue inhaler). When true the medication carries NO schedules
            (supplying any schedule entry is a 422): it is never due, never reminded, and excluded from compliance
            rates/streaks, but intakes still log (ad-hoc), inventory still consumes, and the history renders. Stays
            active indefinitely. Mutually exclusive with `oneShot`."
          type: boolean
        schedules:
          type: array
          items:
            $ref: "#/components/schemas/MedicationScheduleInput"
      required:
        - name
        - dose
      description: 'Create-medication body. The route enforces the v1.5 cross-field invariants on top of the per-schedule
        `rrule_xor_rolling` Zod refine: a `oneShot:true` medication may carry at most one schedule and that schedule
        must not declare a recurrence; `endsOn` is normalised to equal `startsOn` for one-shot doses; a recurring
        schedule with no `rrule`, `rollingIntervalDays`, or legacy `daysOfWeek` defaults to `rrule = "FREQ=DAILY"`; and
        `timesOfDay` is dual-written from `windowStart` when the caller omits it. v1.16.11 — `asNeeded: true` creates a
        PRN medication with ZERO schedules (`schedules` must be absent or empty, 422 otherwise); a scheduled medication
        still requires at least one schedule entry. v1.28 — `externalSource` + `externalId` (both-or-neither) mark the
        medication as mirrored from Apple Health; re-posting the same pair is idempotent and returns the existing
        medication with status 200.'
    MedicationScheduleInput:
      type: object
      properties:
        windowStart:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
          description: Legacy single-time-of-intake (HH:mm, user local). v1.5 keeps the field for backwards compatibility with
            pre-wizard iOS clients; the new `timesOfDay` array supersedes it.
        windowEnd:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
          description: Legacy reminder-window upper bound (HH:mm). Used to derive the late-classification grace span when
            `reminderGraceMinutes` is null.
        label:
          description: Optional human label (e.g. "Morning", "Evening").
          type: string
          maxLength: 50
        dose:
          description: Per-schedule dose override. NULL means the schedule inherits `Medication.dose`.
          type: string
          maxLength: 50
        daysOfWeek:
          description: Legacy day-of-week filter (0=Sunday..6=Saturday). v1.5 reads new writes through `rrule` first; this field
            is preserved for pre-v1.5 rows and is the input the route serialises into the persisted `days_of_week`
            string.
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 6
        intervalWeeks:
          description: Legacy multi-week stride (1..4). Bi-weekly + tri-weekly were broken in the pre-v1.5 reminder worker; new
            writes encode the same intent via `rrule` (e.g. `FREQ=WEEKLY;INTERVAL=2;BYDAY=WE`).
          type: integer
          minimum: 1
          maximum: 4
        timesOfDay:
          description: v1.5 first-class points-in-time the dose is taken (HH:mm, user local). Up to 8 entries. Absent or empty
            means the route stamps `[windowStart]` so the new engine always sees a populated array.
          maxItems: 8
          type: array
          items:
            type: string
            pattern: ^([01]\d|2[0-3]):([0-5]\d)$
        reminderGraceMinutes:
          description: Reminder grace window in minutes. Caps at 24h. NULL falls back to the legacy `windowEnd - windowStart` span.
          type: integer
          minimum: 1
          maximum: 1440
        rrule:
          description: "RFC 5545 RRULE string (subset). Use for daily / weekly-with-BYDAY / multi-week / monthly / yearly
            cadences. Mutually exclusive with `rollingIntervalDays`. Examples: `FREQ=DAILY`,
            `FREQ=WEEKLY;BYDAY=MO,WE,FR`, `FREQ=WEEKLY;INTERVAL=2;BYDAY=WE`, `FREQ=MONTHLY;BYMONTHDAY=1`,
            `FREQ=YEARLY;BYMONTH=1;BYMONTHDAY=1`."
          type: string
          maxLength: 200
          pattern: ^FREQ=(?:DAILY|WEEKLY|MONTHLY|YEARLY)(?:;(?:INTERVAL=\d{1,3}|BYDAY=(?:MO|TU|WE|TH|FR|SA|SU)(?:,(?:MO|TU|WE|TH|FR|SA|SU))*|BYMONTHDAY=-?\d{1,2}(?:,-?\d{1,2})*|BYMONTH=\d{1,2}(?:,\d{1,2})*|COUNT=\d{1,4}|UNTIL=\d{8}T\d{6}Z))*$
        rollingIntervalDays:
          description: Flexible-rolling interval in days, counted forward from the latest `MedicationIntakeEvent.takenAt` (the
            dose re-anchors when logged). Mutually exclusive with `rrule`. Range 1..365.
          type: integer
          minimum: 1
          maximum: 365
        scheduleType:
          description: Schedule type. SCHEDULED (default) = rrule / rolling / legacy cadence. PRN = as-needed (never projected,
            reminded, or counted in compliance expected; still loggable via the intake route). CYCLIC = N weeks on / M
            weeks off, gating whichever inner cadence the rrule / legacy fields describe.
          type: string
          enum:
            - SCHEDULED
            - PRN
            - CYCLIC
        cyclicOnWeeks:
          description: Cyclic "on" weeks (1..52). Required when `scheduleType` is CYCLIC; ignored otherwise.
          type: integer
          minimum: 1
          maximum: 52
        cyclicOffWeeks:
          description: Cyclic "off" weeks (0..52). Required when `scheduleType` is CYCLIC; ignored otherwise.
          type: integer
          minimum: 0
          maximum: 52
        doseWindows:
          description: Per-dose on-time intake windows. Each `{ timeOfDay, start, end }` HH:mm triple sets the explicit on-time
            band for the matching dose time; a dose time with no entry keeps the symmetric ±1h default. `timeOfDay` must
            match one of `timesOfDay` (or `windowStart`); `start <= end`. Up to 8 entries. Absent leaves every slot on
            the default derivation. The late tail stays cadence-derived.
          maxItems: 8
          type: array
          items:
            $ref: "#/components/schemas/DoseWindowEntry"
      required:
        - windowStart
        - windowEnd
      description: Single schedule entry on a medication. v1.5 introduces `timesOfDay`, `rrule`, `rollingIntervalDays`, and
        `reminderGraceMinutes` as first-class fields; `windowStart`, `windowEnd`, `daysOfWeek`, and `intervalWeeks` are
        preserved through the v1.5.x line for backwards compatibility. **`rrule` and `rollingIntervalDays` are mutually
        exclusive** — supplying both fails 422 (`rrule_xor_rolling`). The DB enforces the same invariant via a CHECK
        constraint.
    DoseWindowEntry:
      type: object
      properties:
        timeOfDay:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
          description: The dose time this window applies to (matches a `timesOfDay` entry).
        start:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
          description: On-time band lower bound (HH:mm, user local).
        end:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
          description: On-time band upper bound (HH:mm, user local). Must be >= `start`.
      required:
        - timeOfDay
        - start
        - end
      description: One explicit per-dose on-time intake window. `timeOfDay` matches a schedule dose time; `[start, end]`
        (HH:mm, user local, `start <= end`) is the on-time band. Outside it the cadence-derived late tail applies, then
        ad-hoc.
    MedicationListLayout:
      type: object
      properties:
        version:
          type: number
          const: 1
        view:
          description: Which presentation /medications renders in. Default "cards". Optional on PUT — when omitted the stored
            value is preserved (preserve-when-absent, like `chartOverlayPrefs` on the dashboard layout). Always present
            on responses.
          type: string
          enum:
            - cards
            - table
        order:
          description: User-defined manual medication order (medication ids, first = top), shared by both views. Display-only —
            unknown / deleted ids are ignored at render time, never 422. Optional on PUT (preserve-when-absent); always
            present on responses.
          maxItems: 200
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 64
      required:
        - version
      description: "Per-user /medications presentation: the card/table view choice plus the manual medication order shared by
        both views. Mirrors the dashboard-widgets / insights-layout contract."
    UpdateMedicationRequest:
      type: object
