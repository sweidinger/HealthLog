        samplingFrequency:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Signal sampling rate in Hz (300 for a ScanWatch).
        averageHeartRate:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
