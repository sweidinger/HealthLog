      description: "Owner-only. Mints an `hls_` token (192-bit), stores only its HMAC hash, and returns the raw token EXACTLY
        ONCE in the response. v1.18.7 also mints a passphrase second factor (returned once as `passphrase`, with
        `shareUrl` and a `qrUrl` carrying the passphrase in the URL fragment); a leaked URL without the passphrase
        cannot open the record. Every scope column (window, sections, FHIR resource types, API toggle) is frozen
        write-once. v1.28 accepts an optional `documentIds` array (bounded ≤50): each id is validated as the caller's
        own live document and frozen onto the link at create (a foreign/deleted id → 422); the summary DTO then reports
        `documentCount`. A documents-only share (empty report sections + non-empty `documentIds`) is valid. `expiresAt`
        is required and capped at 90 days. Auth via cookie or Bearer; rate-limited (`share-link:<userId>`, 20/h).
        Strict: unknown keys 422."
