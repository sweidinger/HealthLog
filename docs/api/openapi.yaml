  /api/user/avatar:
    post:
      tags:
        - Auth
      summary: Upload the calling user's avatar
      description: "Multipart upload (field `file`). Accepts image/jpeg, image/png, image/webp; rejects anything else at the
        magic-byte sniff (the multipart Content-Type header is informational only). Hard caps: 2 MiB body, 2048×2048
        dimensions. Replaces the v1.4.22 Gravatar leak by storing the bytes on the User row + serving them from
        same-origin."
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  description: Binary image payload (JPEG / PNG / WebP). Hard-capped at 2 MiB and 2048×2048.
              required:
                - file
      responses:
        "201":
          description: Avatar saved. `avatarUrl` is the same value the /me payload returns; the `?v=` suffix busts client caches
            on re-upload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadAvatarResponse"
        "401": *a1
        "413":
          description: Upload exceeds the 2 MiB byte limit or the 2048×2048 dimension limit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          description: Image format is not one of JPEG / PNG / WebP (magic-byte sniff).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
    delete:
      tags:
        - Auth
      summary: Clear the calling user's avatar
      description: Resets the avatar columns to null. Idempotent — a delete on an already-empty row returns 204 with no
        audit-log row.
      responses:
        "204":
          description: Avatar cleared (or already empty).
        "401": *a1
        "422": *a3
        "429": *a4
  /api/user/avatar/{id}:
    get:
      tags:
        - Auth
      summary: Serve a user's avatar bytes
      description: Owner-scoped. The `{id}` path segment must match the calling user's id — cross-user reads return 403.
        Response body is the raw image bytes with the persisted `Content-Type`; the /me payload appends
        `?v={updatedAtMs}` so clients can cache aggressively.
      parameters:
        - in: path
          name: id
          schema:
            type: string
            description: User id (must match the calling user).
          required: true
          description: User id (must match the calling user).
      responses:
        "200":
          description: Avatar bytes.
          content:
            image/jpeg:
              schema:
                type: string
                description: Raw JPEG bytes.
            image/png:
              schema:
                type: string
                description: Raw PNG bytes.
            image/webp:
              schema:
                type: string
                description: Raw WebP bytes.
        "401": *a1
        "403":
          description: Caller is not the avatar's owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: The user has no uploaded avatar.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/user/profile:
    get:
      tags:
        - Auth
      summary: Read the calling user's profile
      description: Flattened profile fields for the native client. Aliased over the same data exposed by /api/auth/me. The
        KVNR is decrypted server-side; the IKNR (v1.8.6) is returned plaintext.
      responses:
        "200":
          description: The calling user's profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProfileResponse"
        "401": *a1
        "422": *a3
        "429": *a4
    patch:
      tags:
        - Auth
      summary: Update the calling user's profile
      description: Partial profile update — every field is optional. An explicit null (or empty string) clears a field. A
        non-empty `insurerIkNumber` must be exactly 9 digits (422 otherwise); a non-empty `insuranceNumber` (KVNR) must
        pass the mod-10 check. `userId` is never accepted from the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: Saved profile echoed back.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchProfileResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/auth/me/notification-prefs:
    get:
      tags:
        - Notifications
      summary: Read per-user notification preferences
      description: Returns the fully-resolved preferences with the documented defaults filled in. A null persisted row
        resolves to the defaults (server-managed reminders, low-stock threshold 7 days, mood reminder 22:00, Coach
        nudges on).
      responses:
        "200":
          description: Resolved preferences.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNotificationPrefsResponse"
        "401": *a1
        "422": *a3
        "429": *a4
    patch:
      tags:
        - Notifications
      summary: Update per-user notification preferences
      description: 'Deep-merges the supplied partial shape over the persisted row — a PATCH touching only one category leaves
        the siblings intact. Always returns the fully-resolved next state so clients can hard-set their optimistic
        update. `medication.clientManaged: true` (or `deliveryDefault: "client"`) suppresses server-side
        MEDICATION_REMINDER APNs; `medication.lowStockRunwayDays` (1–60, nullable, default 7) tunes the low-stock alert
        — null switches it off. Rate-limit 60/min per user.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPrefsPatchRequest"
      responses:
        "200":
          description: Resolved next-state preferences echoed back.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchNotificationPrefsResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/insights/chat:
    get:
      tags:
        - Insights
      summary: List the caller's Coach conversations
      description: v1.18.0 — cursor-paginated list of the caller's Coach conversations for the history rail, most-recent
        activity first. Metadata only (id, title, timestamps, message count); message bodies are not decrypted here.
        `limit` defaults to 20, capped at 50; pass the returned `nextCursor` back as `cursor` for the next page (null at
        the end). Coach-gated (`requireAssistantSurface("coach")`); a disabled surface 403s. Auth via cookie or Bearer;
        the owner is narrowed from the session.
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Id of the last conversation on the previous page. Omit for the first page.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
          description: Page size. Defaults to 20, capped at 50.
      responses:
        "200":
          description: A page of the caller's conversations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachConversationsPageResponse"
        "401": *a1
        "422": *a3
        "429": *a4
    post:
      tags:
        - Insights
      summary: Send a Coach turn (streaming reply)
      description: "v1.18.0 — sends a user turn and streams the assistant reply as Server-Sent Events. The response is
        `text/event-stream`, not JSON: one `data: <json>\\n\\n` frame per event. Frame `type` is one of `token` (a chunk
        of reply text: `{ type, token }`), `provenance` (the evidence envelope: `{ type, metricSource }`), `suggestion`
        (a cadence-suggestion card: `{ type, suggestion }`), `reasoning` (v1.18.9, optional reasoning-summary text: `{
        type, text }` — emitted only by reasoning-capable providers; absent otherwise), `done` (`{ type, conversationId,
        messageId, usage? }` — v1.18.9 adds the optional `usage` envelope `{ totalTokens, promptTokens?,
        completionTokens?, model? }`, server-authoritative; clients display it, never recompute), or `error` (`{ type,
        code, message }`). The HTTP status is 200 even for a provider/refusal outcome — clients dispatch on the `error`
        frame, not the status. Clients ignore unknown frame types (additive evolution). Omitting `conversationId` starts
        a new conversation. Coach-gated; budget- and rate-limited. Auth via cookie or Bearer."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversationId:
                  type: string
                  minLength: 1
                  maxLength: 64
                message:
                  type: string
                  minLength: 1
                  maxLength: 4000
                prefill:
                  type: string
                  maxLength: 2000
                locale:
                  type: string
                  enum:
                    - en
                    - de
                scope:
                  type: object
                  properties:
                    sources:
                      maxItems: 40
                      type: array
                      items:
                        type: string
                        enum:
                          - bp
                          - weight
                          - pulse
                          - mood
                          - compliance
                          - hrv
                          - sleep
                          - resting_hr
                          - steps
                          - active_energy
                          - flights
                          - distance
                          - vo2_max
                          - body_temp
                          - walking_hr
                          - respiratory_rate
                          - spo2
                          - pulse_wave_velocity
                          - vascular_age
                          - body_fat
                          - fat_mass
                          - fat_free_mass
                          - muscle_mass
                          - lean_body_mass
                          - bone_mass
                          - total_body_water
                          - bmi
                          - visceral_fat
                          - glucose
                          - walking_steadiness
                          - walking_asymmetry
                          - walking_double_support
                          - walking_step_length
                          - walking_speed
                          - audio_env
                          - audio_headphone
                          - audio_event
                          - daylight
                          - skin_temp
                          - workouts
                    window:
                      type: string
                      enum:
                        - last7days
                        - last30days
                        - last90days
                        - lastYear
                        - allTime
                guidedQuestion:
                  type: string
                  minLength: 1
                  maxLength: 500
              required:
                - message
      responses:
        "200":
          description: Server-Sent Events stream of `token` / `provenance` / `done` / `error` frames.
          content:
            text/event-stream:
              schema:
                type: string
                description: "SSE frames: `data: <json>\\n\\n`. See the operation description for the per-`type` frame shapes."
        "401": *a1
        "403":
          description: "Coach surface disabled (`errorCode: assistant.disabled.coach`) or AI consent required (`errorCode:
            consent.ai.required`)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: Request body exceeds the 64 KB cap.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
