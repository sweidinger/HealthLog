      required:
        - day
        - nutrient
        - unit
        - amount
      description: One nutrient day total. day = YYYY-MM-DD in the user's IANA timezone; unit must equal the catalog's
        canonical unit for the code (mg | ug | ml) or the entry is skipped unit_mismatch.
    NutrientCode:
