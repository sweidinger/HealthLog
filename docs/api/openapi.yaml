      summary: Act on a Coach cadence suggestion
      description: 'v1.18.1 — accept / dismiss / stop a Coach-proposed measurement cadence. Coach-gated
        (`requireModuleEnabled("coach")`); a disabled surface 403s. `accept` resolves the cadence from the closed
        server-side catalog and creates a `MeasurementReminder` with `origin: COACH` (201), or returns 200 with
        `duplicate: true` when a live COACH reminder for that metric already exists — idempotent against a re-tapped or
        stale card, with a partial unique index as the structural backstop. Per-user rate-limited (429 on excess). Auth
