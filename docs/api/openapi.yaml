        error:
          type: "null"
        meta:
          type: object
          properties:
            requestId:
              type: string
          additionalProperties: false
      required:
        - data
        - error
      additionalProperties: false
    DailyDigest:
      type: object
      properties:
        generatedAt:
          type: string
          description: ISO-8601 instant the digest was read.
        phase:
          type: string
          enum:
            - provisional
            - final
          description: Freshness lifecycle — 'final' once last night's sleep is in.
        sleepPending:
          type: boolean
