        - in: query
          name: metrics
          schema:
            type: string
            minLength: 1
            maxLength: 1024
            description: Comma-separated derived-metric tokens. Each is a `<DERIVED_METRIC_ID>` or
              `<DERIVED_METRIC_ID>:<MeasurementType>` (the colon sub-targets a VITALS_BASELINE vital). An unknown id
              422s; a `type` outside the MeasurementType enum 422s; at most 24 tokens; duplicates collapse.
          required: true
          description: Comma-separated derived-metric tokens. Each is a `<DERIVED_METRIC_ID>` or
            `<DERIVED_METRIC_ID>:<MeasurementType>` (the colon sub-targets a VITALS_BASELINE vital). An unknown id 422s;
            a `type` outside the MeasurementType enum 422s; at most 24 tokens; duplicates collapse.
      responses:
