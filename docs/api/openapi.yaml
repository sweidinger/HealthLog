components:
  schemas:
    AccessRefreshBundle:
      additionalProperties: false
      description: Native-client token bundle returned by login + refresh. Web cookie-only callers see only `user`.
      properties:
        refreshToken:
          description: Refresh token (`hlr_<64hex>`); only present for native-policy callers.
          type: string
        refreshTokenExpiresAt:
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
          type: string
        token:
          description: Access token (`hlk_<64hex>`).
          type: string
        tokenExpiresAt:
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
          type: string
        user:
          additionalProperties: false
          properties:
            id:
              type: string
            username:
              type: string
          required:
            - id
            - username
          type: object
      required:
        - token
        - tokenExpiresAt
      type: object
    AppleHealthBatchEntry:
      properties:
        deviceType:
          anyOf:
            - enum:
                - watch
                - band
                - ring
                - phone
                - scale
                - other
                - unknown
              type: string
            - type: "null"
          description: Device class mapped from `HKDevice.model`. Used by the analytics aggregator to break ties when the same
            source contributed multiple devices for the same day. Omit (or send null) on legacy clients — the server
            treats it as `unknown` and the picker falls through.
        endDate:
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
          type: string
        externalId:
          description: HKSample.uuid string — the dedup key.
          maxLength: 120
          minLength: 1
          type: string
        externalSourceVersion:
          maxLength: 120
          minLength: 1
          type: string
        hkIdentifier:
          description: HealthKit identifier (e.g. `HKQuantityTypeIdentifierBodyMass`).
          maxLength: 120
          minLength: 1
          type: string
        sleepStage:
          description: HKCategoryValueSleepAnalysis codepoint; only for sleep samples.
          maximum: 20
          minimum: 0
          type: integer
        startDate:
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
          type: string
        unit:
          maxLength: 60
          minLength: 1
          type: string
        value:
          type: number
      required:
        - hkIdentifier
        - value
        - unit
        - startDate
        - endDate
        - externalId
      type: object
    AppleHealthBatchEntryResult:
      additionalProperties: false
      properties:
        index:
          maximum: 9007199254740991
          minimum: 0
          type: integer
        reason:
          type: string
        status:
          enum:
            - inserted
            - duplicate
            - skipped
          type: string
      required:
        - index
        - status
      type: object
    AppleHealthBatchRequest:
      description: Apple Health batch ingest. ≤500 entries per call; idempotent via `Idempotency-Key`.
      properties:
        entries:
          items:
            $ref: "#/components/schemas/AppleHealthBatchEntry"
          maxItems: 500
          minItems: 1
          type: array
      required:
        - entries
      type: object
    AppleHealthBatchResponse:
      additionalProperties: false
      properties:
        duplicate:
          maximum: 9007199254740991
          minimum: 0
          type: integer
        entries:
          items:
            $ref: "#/components/schemas/AppleHealthBatchEntryResult"
          type: array
        inserted:
          maximum: 9007199254740991
          minimum: 0
          type: integer
        skipped:
          maximum: 9007199254740991
          minimum: 0
          type: integer
      required:
        - inserted
        - duplicate
        - skipped
        - entries
      type: object
    BatchMeasurementsResponse:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/AppleHealthBatchResponse"
        error:
          type: "null"
        meta:
          additionalProperties: false
          properties:
            requestId:
              type: string
          type: object
      required:
        - data
        - error
      type: object
    BatchWorkoutsResponse:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/WorkoutBatchResponse"
        error:
          type: "null"
        meta:
          additionalProperties: false
          properties:
            requestId:
              type: string
          type: object
      required:
        - data
        - error
      type: object
    CoachMessageFeedbackRequest:
      description: Per-message helpful/unhelpful feedback (v1.4.23 H7). Optional `reason` is free-form prose, capped at 200 chars.
      properties:
        rating:
          enum:
            - helpful
            - unhelpful
          type: string
        reason:
          maxLength: 200
          minLength: 1
          type: string
      required:
