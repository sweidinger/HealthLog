    MedicationSupplySummary:
      type: object
      properties:
        unitsRemaining:
          type: number
          description: Pooled units across available (ACTIVE / IN_USE, units left) containers. Floored at 0 — a corrupt / legacy
            negative row can never surface a negative Bestand.
