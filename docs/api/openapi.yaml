          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
          description: v1.16.10 — usable inventory units left across the medication's containers (sum of `unitsRemaining` over
            ACTIVE / IN_USE items with units left). NULL = inventory tracking off (no items ever registered); 0 =
            tracking on, supply ran out. Read-only — aggregated, not stored.
        stockDosesRemaining:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
          description: "v1.16.10 — dose-derived stock: `floor(stockUnitsRemaining / unitsPerDose)`, where `unitsPerDose` may be a
            fraction (½ tablet ⇒ twice the doses). Stays a whole-dose count. NULL when inventory tracking is off. Drives
            the table view's Bestand column. Read-only — aggregated, not stored."
