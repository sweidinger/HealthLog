        shortDays:
          type: integer
          exclusiveMinimum: 0
          maximum: 9007199254740991
        longDays:
          type: integer
          exclusiveMinimum: 0
          maximum: 9007199254740991
        expectedShort:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        expectedLong:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        minStableDoses:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        short:
          type: object
          properties:
            rate:
              type: integer
              minimum: 0
              maximum: 100
            taken:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            expected:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: v1.15.9 rate denominator over the short window (`taken + missed`); user skips are excluded. Render `taken /
                expected · rate%`.
            missed:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: v1.15.9 doses counted against the rate over the short window — includes forgotten doses the auto-miss cron
                flipped.
            streak:
              type: integer
              minimum: 0
              maximum: 9007199254740991
          required:
            - rate
            - taken
            - expected
            - missed
            - streak
          additionalProperties: false
        long:
          type: object
          properties:
            rate:
              type: integer
              minimum: 0
              maximum: 100
            taken:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            expected:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: v1.15.9 rate denominator over the long window (`taken + missed`).
            missed:
              type: integer
              minimum: 0
              maximum: 9007199254740991
              description: v1.15.9 doses counted against the rate over the long window.
          required:
            - rate
            - taken
            - expected
            - missed
          additionalProperties: false
