            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/medications/extract:
    post:
      tags:
        - Medications
      summary: Extract scheduling fields from a free-text medication description
      description: Runs the user's free-text description through the Coach provider chain and returns a citation-guarded
        partial payload the wizard merges onto whatever the user already typed. `name` and `dose` are dropped when not
        substring-matched in the original text so the wizard cannot land a hallucinated brand or dose. `cadenceKind` /
        `doseUnit` / `weekdays` are closed enums; numeric fields are clamped. Rate-limited 10 requests / 5 minutes /
        user, gated against the daily Coach token budget.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicationExtractRequest"
      responses:
        "200":
          description: Citation-guarded partial extraction.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationExtractResponse"
        "401": *a1
        "422": *a3
        "429": *a4
        "502":
          description: Upstream provider returned an empty, unparseable, or off-schema reply.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: No AI provider configured for the calling user (or operator).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/medications/{id}/cadence:
    get:
      tags:
        - Medications
      summary: Cadence + compliance read for a medication
      description: Returns the expected-vs-actual dose timeline for the requested window plus the four compliance chip values
        that drive the detail-page section. Pure computation — no writes. Day boundaries are resolved in the user's IANA
        timezone so a Tokyo user and a Berlin user see the same chips for the same medication. The `days` query
        parameter caps at 180.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
        - in: query
          name: days
          schema:
            description: Window size in days (default 30, max 180).
            type: integer
            minimum: 1
            maximum: 180
          description: Window size in days (default 30, max 180).
      responses:
        "200":
          description: Cadence response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMedicationCadenceResponse"
        "401": *a1
        "404":
          description: Medication not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/medications/compliance:
    get:
      tags:
        - Medications
      summary: Batched adherence read for every medication of the caller
      description: Returns one compact adherence row per medication the caller owns (active + paused), ordered by `createdAt
        DESC` — the single round trip the medication cards consume instead of fanning out one
        `/api/medications/{id}/compliance` request per card. Each row carries the 7-/30-day summaries and the
        cadence-scaled display block; the per-day grid stays on the per-medication endpoint. Pure computation — no
        writes. Served through the same per-medication server cache as the per-id read, so the two endpoints warm each
        other.
      responses:
        "200":
          description: One adherence row per medication.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMedicationComplianceResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/medications/{id}/compliance:
    get:
      tags:
        - Medications
      summary: Adherence read for a medication
      description: Returns the 7- and 30-day adherence summaries, the per-day compliance grid for the history glyph track, and
        the two-row display block. Pure computation — no writes. Day boundaries are resolved in the user's IANA
        timezone, and the expected-dose denominator is cadence-aware (RRULE / rolling / one-shot / PRN / cyclic) and
        clamped to the medication's `createdAt`. Read `compliance30` for the headline 30-day taken-vs-expected
        percentage; build the per-day glyph track from `dailyCompliance` (draw a cell only where `due === true`).
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Compliance response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMedicationComplianceResponse"
        "401": *a1
        "404":
          description: Medication not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/medications/{id}/schedule-revisions:
    get:
      tags:
        - Medications
      summary: List a medication's archived schedule eras
      description: Returns every archived schedule era (newest first) plus `currentSince`, the instant the live plan took
        over. The dose-history ledger and compliance tallies already mint past days against these eras; this read powers
        the Zeitplan-tab history timeline.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Era list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScheduleRevisionsResponse"
        "401": *a1
        "404":
          description: Medication not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
    post:
      tags:
        - Medications
      summary: Append a manual schedule era (pre-tracking history)
      description: Records that the medication dosed at the given daily times during `[validFrom, validUntil)` — history from
        before the schedule was edited in the app. The era must end at or before the start of the live plan and must not
        overlap an existing era; violations return 422. The snapshot is shaped exactly like a write-path archive
        (`FREQ=DAILY`, window pulled to the min/max of the times), so every historical surface reads it transparently.
        Audits as `medication.schedule_revision.created`.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleRevisionRequest"
      responses:
        "201":
          description: Manual era created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScheduleRevisionResponse"
        "401": *a1
        "404":
          description: Medication not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/medications/{id}/schedule-revisions/{revisionId}:
    patch:
      tags:
        - Medications
      summary: Correct a recorded schedule era
      description: "Replaces an era's bounds and daily times. A `MANUAL` era updates in place; an `ARCHIVED` era stays as the
        immutable audit record and the correction is minted as a superseding `MANUAL` revision that takes its place in
        every historical surface (the response carries the correction's id). Validation mirrors the sibling POST: the
        era must end at or before the start of the live plan and must not overlap another active era; violations return
        422. An era that has already been corrected refuses with 409. Audits as `medication.schedule_revision.updated`."
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
        - in: path
          name: revisionId
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleRevisionRequest"
      responses:
        "200":
          description: Era corrected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScheduleRevisionResponse"
        "401": *a1
        "404":
          description: Medication or revision not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: The revision has already been superseded by a correction.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
    delete:
      tags:
        - Medications
      summary: Delete a manually added schedule era
      description: "Removes a `MANUAL` era — one appended through the sibling POST, or a correction minted by PATCH (deleting
        a correction restores the archived original it superseded). Write-path archives (`source: ARCHIVED`) are
        immutable history and refuse with 409. Audits as `medication.schedule_revision.deleted`."
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
        - in: path
          name: revisionId
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Deletion succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteScheduleRevisionResponse"
        "401": *a1
        "404":
          description: Medication or revision not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: The revision is a write-path archive (`ARCHIVED`) and cannot be deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/user/ai-provider:
    get:
      tags:
        - Auth
      summary: Read the calling user's AI-provider configuration
      description: "Returns the user's selected provider/model/baseUrl plus the effective availability: `aiAvailable` is true
        when any provider can serve the user (BYOK, self-hosted, or the operator's server-managed key), and `managedBy`
        reports which. iOS gates Coach visibility off these two fields. Key material is reported as presence + a 4-char
        masked preview only."
      responses:
        "200":
          description: Resolved AI-provider configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAiProviderResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/auth/me/coach-prefs:
    get:
      tags:
        - Auth
      summary: Read per-user Coach prompt-tuning preferences
      description: Returns the persisted preferences with defaults filled in. Null persisted state resolves to the legacy
        v1.4.22 defaults.
      responses:
        "200":
          description: Resolved preferences.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCoachPrefsResponse"
        "401": *a1
        "422": *a3
        "429": *a4
    put:
      tags:
        - Auth
      summary: Replace per-user Coach prompt-tuning preferences
      description: Persists the supplied prefs. Body is validated against `CoachPrefs`; missing keys fall back to the
        documented defaults.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tone:
                  default: warm
                  type: string
                  enum:
                    - warm
                    - neutral
                    - concise
                verbosity:
                  default: default
                  type: string
                  enum:
                    - brief
                    - default
                    - detailed
                excludeMetrics:
                  default: []
                  maxItems: 11
                  type: array
                  items:
                    type: string
                    enum:
                      - bp
                      - weight
                      - pulse
                      - mood
                      - compliance
                      - hrv
                      - sleep
                      - resting_hr
                      - steps
                      - medications
                      - anthropometrics
                showEvidenceByDefault:
                  default: false
                  type: boolean
                defaultWindow:
                  default: allTime
                  type: string
                  enum:
                    - last7days
                    - last30days
                    - last90days
                    - allTime
                dataClusters:
                  maxItems: 10
                  type: array
                  items:
                    type: string
                    enum:
                      - cardio
                      - body
                      - activity
                      - workouts
                      - sleep
                      - mood
                      - glucose
                      - medication
                      - mobility
                      - environment
                reminderSuggestions:
                  type: object
                  properties:
                    enabled:
                      default: true
                      type: boolean
                    stopped:
                      default: false
                      type: boolean
                    dismissedCadences:
                      default: []
                      maxItems: 32
                      type: array
                      items:
                        type: string
                        maxLength: 64
                    lastSuggestedAt:
                      default: null
                      anyOf:
                        - type: string
                          maxLength: 40
                        - type: "null"
      responses:
        "200":
          description: Saved preferences echoed back.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutCoachPrefsResponse"
        "401": *a1
        "422": *a3
        "429": *a4
  /api/auth/me/disable-coach:
    get:
      tags:
        - Auth
      summary: Read per-user Coach opt-out flag
