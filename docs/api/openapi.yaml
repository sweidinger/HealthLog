        physiological returns (incl. the user-logged symptom-burden track, `type:FUNCTIONAL_IMPACT`), the headline
        recovery-gap (median of per-track gaps), the driving metric (`gapDriverType`), any red flags, and an optional
        sleep-as-context observation (`sleepContext`, never in the gap)."
