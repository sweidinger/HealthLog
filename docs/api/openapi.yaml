          description: Pairs surviving n ≥ 20, p < 0.05, AND the BH-FDR control.
        pairsTested:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Behaviour × outcome pairs assessed (for the honest footer).
        fdrQ:
          type: number
          description: The FDR target the surface used.
        minPairs:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Minimum paired-day count enforced per pair.
        emerging:
          description: v1.22 — rolling early-detection pass over the trailing window; emerging pairs not yet established
            retrospectively (no double-count).
          $ref: "#/components/schemas/EmergingCorrelationResult"
        labCorrelations:
          description: v1.22 — labs ↔ outcome associations (each draw vs the contemporaneous outcome window-mean), FDR-controlled;
            absent-degrading on sparse draws.
          $ref: "#/components/schemas/LabCorrelationResult"
      required:
        - discovered
        - pairsTested
        - fdrQ
        - minPairs
      additionalProperties: false
      description: v1.10.0 — FDR-controlled correlation discovery over a curated behaviour × outcome matrix, lagged behaviour
        → next-day outcome. Only statistically-defensible pairs surface; descriptive, never causal.
    DiscoveredCorrelation:
      type: object
      properties:
        behaviour:
          type: string
          description: Behaviour channel (lag source), e.g. TIME_IN_DAYLIGHT, MOOD.
        outcome:
          type: string
          description: Outcome channel (lag target), e.g. SLEEP_DURATION, HEART_RATE_VARIABILITY.
        n:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Paired-day count after the day+1 lag join (≥ 20).
        r:
          type: number
          description: Pearson r over the lag-joined daily series.
        pValue:
          type: number
          description: Two-sided exact Student-t p-value (< 0.05).
        qValue:
          type: number
          description: Benjamini-Hochberg FDR-adjusted q-value (≤ the surface threshold).
        interpretation:
          type: string
          description: Conservative, descriptive interpretation — never causal.
        lagDays:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Lag in days applied (1).
        window:
          description: v1.22 — which window surfaced the pair. Absent on the 180-day scan (retrospective default); `recent` for an
            emerging early-detection pair.
          type: string
          enum:
            - retrospective
            - recent
        provisional:
          description: "v1.22 — true for an emerging recent-window pair: fewer days, hedged as provisional rather than established."
          type: boolean
      required:
        - behaviour
        - outcome
        - n
        - r
        - pValue
        - qValue
        - interpretation
        - lagDays
      additionalProperties: false
    EmergingCorrelationResult:
      type: object
      properties:
        emerging:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveredCorrelation"
          description: Recent-window pairs NOT already established retrospectively — the emerging signals (provisional, hedged).
        windowDays:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Trailing window (days) the early pass scanned.
        minPairs:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Paired-day floor enforced for the early pass.
        fdrQ:
          type: number
          description: FDR target the early pass used (tighter than the main scan).
        pairsTested:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Pairs tested in the early window.
      required:
        - emerging
        - windowDays
        - minPairs
        - fdrQ
        - pairsTested
      additionalProperties: false
    LabCorrelationResult:
      type: object
      properties:
        discovered:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveredLabCorrelation"
          description: Lab ↔ outcome associations surviving the per-pair floor + BH-FDR.
        pairsTested:
