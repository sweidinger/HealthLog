            - type: number
            - type: "null"
          description: Window maximum; null when empty.
        mean:
          anyOf:
            - type: number
            - type: "null"
          description: Count-weighted mean across buckets; null when empty.
        sum:
          anyOf:
            - type: number
            - type: "null"
          description: Cumulative total for cumulative metrics (steps, energy, distance); null when no bucket carries a sum.
