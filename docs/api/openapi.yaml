            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
    post:
      tags:
        - Medications
      summary: Register a new supply container
      description: Creates an ACTIVE inventory item with `unitsRemaining = unitsTotal`. The request's `unitsTotal` field
        carries UNITS (1–1000). Rate-limited 30/min/user. Audits as `medication.inventory.create`.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationInventoryItemRequest"
      responses:
        "201":
          description: Created inventory item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMedicationInventoryItemResponse"
        "401": *a1
        "404":
          description: Medication not found (or owned by another user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": *a3
        "429": *a4
  /api/medications/{id}/inventory/{itemId}:
    patch:
      tags:
        - Medications
      summary: Mutate a supply container
      description: "Per-item operations: manual first-use (`markAsFirstUseAt`), used-up override (`markAsUsedUp`),
        printed-expiry correction, absolute remaining-unit correction (`unitsRemaining`, clamped to the item's
        capacity), notes. The canonical state machine re-derives the state after every mutation. Audits as
        `medication.inventory.update`."
      parameters:
        - in: path
