<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">HealthLog self-hosting topology</title>
  <desc id="desc">Internet traffic terminates at a reverse proxy (Caddy, Traefik or Nginx) for TLS, then reaches the Next.js app on port 3000. The app shares a Postgres 16 database with the pg-boss worker process for reminders, insights, backups and the Apple Health import. GHCR ships the multi-arch image; Coolify watches the digest and pulls; off-host S3-compatible storage is optional for backups.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#282a36" />

  <text x="600" y="40" fill="#f8f8f2" font-size="22" font-weight="700" text-anchor="middle">Self-hosting topology</text>
  <text x="600" y="64" fill="#6272a4" font-size="13" text-anchor="middle">What runs where on a single-host install — and what the optional pieces add.</text>

  <!-- Outer: Your host -->
  <g>
    <rect x="220" y="100" width="760" height="440" rx="14" fill="none" stroke="#bd93f9" stroke-width="1.5" stroke-dasharray="6 4" />
    <text x="600" y="124" text-anchor="middle" fill="#bd93f9" font-size="13" font-weight="600">Your host (NAS · homelab · VPS)</text>
  </g>

  <!-- Internet (cyan) -->
  <g>
    <ellipse cx="120" cy="280" rx="80" ry="50" fill="#44475a" stroke="#8be9fd" stroke-width="1.5" />
    <text x="120" y="276" text-anchor="middle" fill="#f8f8f2" font-size="14" font-weight="600">Internet</text>
    <text x="120" y="296" text-anchor="middle" fill="#bd93f9" font-size="11">browsers · iOS app</text>
  </g>

  <!-- Reverse proxy (orange) -->
  <g>
    <rect x="260" y="240" width="180" height="80" rx="10" fill="#44475a" stroke="#ffb86c" stroke-width="1.5" />
    <text x="350" y="266" text-anchor="middle" fill="#f8f8f2" font-size="14" font-weight="600">Reverse proxy</text>
    <text x="350" y="286" text-anchor="middle" fill="#bd93f9" font-size="11">Caddy · Traefik · Nginx</text>
    <text x="350" y="302" text-anchor="middle" fill="#6272a4" font-size="11">TLS · HSTS · CSP</text>
  </g>

  <!-- Next.js app (pink) -->
  <g>
    <rect x="480" y="200" width="220" height="80" rx="10" fill="#44475a" stroke="#ff79c6" stroke-width="1.5" />
    <text x="590" y="226" text-anchor="middle" fill="#f8f8f2" font-size="14" font-weight="600">Next.js app</text>
    <text x="590" y="246" text-anchor="middle" fill="#bd93f9" font-size="11">port 3000 · App Router</text>
    <text x="590" y="262" text-anchor="middle" fill="#6272a4" font-size="11">HEALTHLOG_PROCESS_TYPE=web</text>
  </g>

  <!-- pg-boss worker (pink) -->
  <g>
    <rect x="480" y="300" width="220" height="80" rx="10" fill="#44475a" stroke="#ff79c6" stroke-width="1.5" />
    <text x="590" y="326" text-anchor="middle" fill="#f8f8f2" font-size="14" font-weight="600">pg-boss worker</text>
    <text x="590" y="346" text-anchor="middle" fill="#bd93f9" font-size="11">reminders · insights · imports</text>
    <text x="590" y="362" text-anchor="middle" fill="#6272a4" font-size="11">HEALTHLOG_PROCESS_TYPE=worker</text>
  </g>

  <!-- Postgres (green) -->
  <g>
    <rect x="760" y="250" width="200" height="80" rx="10" fill="#44475a" stroke="#50fa7b" stroke-width="1.5" />
    <text x="860" y="276" text-anchor="middle" fill="#f8f8f2" font-size="14" font-weight="600">PostgreSQL 16</text>
    <text x="860" y="296" text-anchor="middle" fill="#bd93f9" font-size="11">26 Prisma models</text>
    <text x="860" y="312" text-anchor="middle" fill="#6272a4" font-size="11">+ pg-boss queues</text>
  </g>

  <!-- GHCR (purple) -->
  <g>
    <rect x="260" y="420" width="220" height="80" rx="10" fill="#44475a" stroke="#bd93f9" stroke-width="1.5" />
    <text x="370" y="446" text-anchor="middle" fill="#f8f8f2" font-size="14" font-weight="600">GitHub Container Registry</text>
    <text x="370" y="466" text-anchor="middle" fill="#bd93f9" font-size="11">multi-arch image (amd64/arm64)</text>
    <text x="370" y="482" text-anchor="middle" fill="#6272a4" font-size="11">ghcr.io/mbombeck/healthlog</text>
  </g>

  <!-- Coolify (purple) -->
  <g>
    <rect x="520" y="420" width="180" height="80" rx="10" fill="#44475a" stroke="#bd93f9" stroke-width="1.5" />
    <text x="610" y="446" text-anchor="middle" fill="#f8f8f2" font-size="14" font-weight="600">Coolify (optional)</text>
    <text x="610" y="466" text-anchor="middle" fill="#bd93f9" font-size="11">watch digest · pull · deploy</text>
    <text x="610" y="482" text-anchor="middle" fill="#ff5555" font-size="11">pull_policy: always</text>
  </g>

  <!-- S3 backup (orange) -->
  <g>
    <rect x="740" y="420" width="220" height="80" rx="10" fill="#44475a" stroke="#ffb86c" stroke-width="1.5" />
    <text x="850" y="446" text-anchor="middle" fill="#f8f8f2" font-size="14" font-weight="600">S3-compatible backup</text>
    <text x="850" y="466" text-anchor="middle" fill="#bd93f9" font-size="11">R2 · B2 · MinIO · AWS</text>
    <text x="850" y="482" text-anchor="middle" fill="#6272a4" font-size="11">AES-GCM weekly off-host</text>
  </g>

  <!-- Test result probe (right side) -->
  <g>
    <rect x="1010" y="240" width="160" height="100" rx="10" fill="#44475a" stroke="#8be9fd" stroke-width="1.5" stroke-dasharray="4 4" />
    <text x="1090" y="266" text-anchor="middle" fill="#f8f8f2" font-size="13" font-weight="600">Withings</text>
    <text x="1090" y="282" text-anchor="middle" fill="#6272a4" font-size="11">Apple Health</text>
    <text x="1090" y="298" text-anchor="middle" fill="#6272a4" font-size="11">moodLog.app</text>
    <text x="1090" y="314" text-anchor="middle" fill="#6272a4" font-size="11">AI provider</text>
    <text x="1090" y="332" text-anchor="middle" fill="#bd93f9" font-size="11">(per-user)</text>
  </g>

  <!-- Arrows -->
  <g stroke="#8be9fd" stroke-width="1.5" fill="none" marker-end="url(#a3-c)">
    <path d="M200 280 L 260 280" />
  </g>
  <text x="220" y="270" fill="#6272a4" font-size="10">HTTPS</text>

  <g stroke="#ffb86c" stroke-width="1.5" fill="none" marker-end="url(#a3-o)">
    <path d="M440 270 C 460 260, 470 240, 480 240" />
  </g>

  <g stroke="#ff79c6" stroke-width="1.5" fill="none" marker-end="url(#a3-p)">
    <path d="M700 240 L 760 270" />
    <path d="M700 340 L 760 310" />
    <path d="M590 280 L 590 300" />
  </g>
  <text x="510" y="295" fill="#6272a4" font-size="10">shared DB</text>

  <g stroke="#bd93f9" stroke-width="1.5" fill="none" marker-end="url(#a3-pu)">
    <path d="M480 460 L 520 460" />
    <path d="M700 440 C 680 380, 640 360, 590 360" />
  </g>
  <text x="700" y="395" fill="#6272a4" font-size="10">image pull</text>

  <g stroke="#ffb86c" stroke-width="1.5" fill="none" marker-end="url(#a3-o2)">
    <path d="M860 420 L 860 330" />
  </g>
  <text x="870" y="385" fill="#6272a4" font-size="10">nightly dump</text>

  <g stroke="#8be9fd" stroke-width="1.5" stroke-dasharray="4 4" fill="none" marker-end="url(#a3-c2)">
    <path d="M700 220 C 800 200, 1000 220, 1080 240" />
  </g>
  <text x="900" y="195" fill="#6272a4" font-size="10">outbound integrations</text>

  <text x="600" y="585" fill="#6272a4" font-size="11" text-anchor="middle">Single-process default: web + worker share one container. Split via HEALTHLOG_PROCESS_TYPE for horizontal scale.</text>

  <defs>
    <marker id="a3-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#8be9fd" /></marker>
    <marker id="a3-o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ffb86c" /></marker>
    <marker id="a3-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ff79c6" /></marker>
    <marker id="a3-pu" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#bd93f9" /></marker>
    <marker id="a3-o2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ffb86c" /></marker>
    <marker id="a3-c2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#8be9fd" /></marker>
  </defs>
</svg>
